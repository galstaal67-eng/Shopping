/* פאנל ניהול גרסאות - בראש מודולים 1 ו-2 */
function renderVersionControls(type, label) {
  const versions = state.versions[type] || [];
  let html = '<div class="version-controls">';
  html += '<span class="label-text">📦 שמירת גרסה ל' + label + ':</span>';
  html += '<input id="version-name-' + type + '" type="text" placeholder="שם גרסה (לדוגמה: מאי 2026)" />';
  html += '<button class="version-btn" data-save-version="' + type + '">💾 שמור גרסה</button>';
  if (versions.length > 0) {
    html += '<button class="version-btn ghost" data-toggle-versions="' + type + '">' +
      (state['_show_versions_' + type] ? '🔼 הסתר גרסאות' : '🗂️ ' + versions.length + ' גרסאות שמורות') +
      '</button>';
  }
  html += '</div>';

  if (state['_show_versions_' + type] && versions.length > 0) {
    html += '<div class="version-list">';
    versions.slice().reverse().forEach(function(v) {
      html += '<div class="version-row">';
      html += '<span class="name">' + escapeHtml(v.name) + '</span>';
      html += '<span class="date">' + escapeHtml(v.date) + '</span>';
      html += '<button class="restore-btn" data-restore-version="' + escapeHtml(type + ':' + v.id) + '">↩ שחזר</button>';
      html += '<button class="delete-btn" data-delete-version="' + escapeHtml(type + ':' + v.id) + '">🗑️ מחק</button>';
      html += '</div>';
    });
    html += '</div>';
  }
  return html;
}

function getRegionSeverity(scenarioId, regionId) {
  var scenario = state.scenarios[scenarioId];
  if (!scenario) return 1;
  var regs = scenario.mapRegions || [];
  var found = regs.find(function(r){ return r.id === regionId; });
  return found ? (found.intensity || 1) : 1;
}

function setRegionSeverity(scenarioId, regionId, val) {
  var scenario = state.scenarios[scenarioId];
  if (!scenario) return;
  if (!scenario.mapRegions) scenario.mapRegions = [];
  var existing = scenario.mapRegions.find(function(r){ return r.id === regionId; });
  if (existing) {
    existing.intensity = val;
  } else {
    var reg = ISRAEL_REGIONS.find(function(r){ return r.id === regionId; });
    scenario.mapRegions.push({ id: regionId, name: reg ? reg.name : regionId, intensity: val });
  }
  xlScheduleSave();
}


/* Override initSectorImpact to use research data */
function initSectorImpactFromResearch() {
  Object.keys(RESEARCH_SECTOR_IMPACT).forEach(function(scenId) {
    if (!state.sectorImpact[scenId]) state.sectorImpact[scenId] = {};
    Object.keys(RESEARCH_SECTOR_IMPACT[scenId]).forEach(function(sector) {
      if (!state.sectorImpact[scenId][sector]) state.sectorImpact[scenId][sector] = {};
      Object.keys(RESEARCH_SECTOR_IMPACT[scenId][sector]).forEach(function(catId) {
        // Only set if not already customized (Excel load will override)
        if (!state.sectorImpact[scenId][sector][catId] ||
            state.sectorImpact[scenId][sector][catId].rationale === '') {
          state.sectorImpact[scenId][sector][catId] = RESEARCH_SECTOR_IMPACT[scenId][sector][catId];
        }
      });
    });
  });
}


/* דירוג שיטפון לנחל הנגזר מעמודת "דירוג שיטפון" באקסל:
   ממוצע ה-floodScore של הנקודות שה"נחל סמוך לנקודה" שלהן תואם לנחל. */
var _excelRiverFlood = {};
function computeExcelRiverFlood() {
  _excelRiverFlood = {};
  if (typeof ISRAEL_RIVERS === 'undefined' || !MAP_POINTS || !MAP_POINTS.length) return;
  var sums = {}, counts = {};
  MAP_POINTS.forEach(function(p) {
    if (!p.floodScore || !p.nearStream) return;
    var ns = String(p.nearStream).trim();
    ISRAEL_RIVERS.forEach(function(rv) {
      var core = rv.name.replace(/^(נחל|נהר)\s+/, '').trim();
      if (core && (ns.indexOf(core) !== -1 || core.indexOf(ns) !== -1)) {
        sums[rv.id]   = (sums[rv.id]   || 0) + p.floodScore;
        counts[rv.id] = (counts[rv.id] || 0) + 1;
      }
    });
  });
  Object.keys(sums).forEach(function(id) {
    _excelRiverFlood[id] = Math.max(1, Math.min(5, Math.round(sums[id] / counts[id])));
  });
}

function getFloodRisk(riverId) {
  var scenario = state.scenarios['flood'];
  if (!scenario || !scenario.mapRegions) return getDefaultFloodRisk(riverId);
  var found = scenario.mapRegions.find(function(r){ return r.id === riverId; });
  return found ? (found.intensity || getDefaultFloodRisk(riverId)) : getDefaultFloodRisk(riverId);
}
function getDefaultFloodRisk(riverId) {
  // קודם דירוג מהאקסל (אם קיימות נקודות תואמות), אחרת ברירת המחדל הקבועה
  if (_excelRiverFlood[riverId] >= 1) return _excelRiverFlood[riverId];
  var r = ISRAEL_RIVERS.find(function(rv){ return rv.id === riverId; });
  return r ? r.defaultRisk : 2;
}
function setFloodRisk(riverId, val) {
  var scenario = state.scenarios['flood'];
  if (!scenario) return;
  if (!scenario.mapRegions) scenario.mapRegions = [];
  var existing = scenario.mapRegions.find(function(r){ return r.id === riverId; });
  if (existing) { existing.intensity = val; }
  else {
    var rv = ISRAEL_RIVERS.find(function(r){ return r.id === riverId; });
    scenario.mapRegions.push({ id: riverId, name: rv ? rv.name : riverId, intensity: val });
  }
  xlScheduleSave();
}

function riverRiskColor(risk) {
  var colors = { 1:'#93c5fd', 2:'#3b82f6', 3:'#f59e0b', 4:'#ef4444', 5:'#7f1d1d' };
  return colors[risk] || '#3b82f6';
}
function riverRiskWidth(risk) { return [0, 0.8, 1.2, 1.8, 2.5, 3.5][risk] || 1.5; }

function polylinePoints(pts) {
  return pts.map(function(p){ return p[0]+','+p[1]; }).join(' ');
}

function sectorAvgExposure(scenarioId, sectorName) {
  var cos = COMPANIES.filter(function(c){ return c.sector === sectorName; });
  if (!cos.length) return 2;
  var sum = cos.reduce(function(acc, c) {
    var e = state.exposure[c.ticker] && state.exposure[c.ticker][scenarioId];
    return acc + (e ? e.exposure : 2);
  }, 0);
  return Math.round(sum / cos.length);
}

function isExposureFromSector(ticker, scenarioId) {
  var e = state.exposure[ticker] && state.exposure[ticker][scenarioId];
  return e && e.fromSector === true;
}

    html += '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px">אין קטגוריות. הוסף קטגוריה חדשה כדי להתחיל.</div>';
  } else {
    IMPACT_CATEGORIES.forEach(function(c) {
      const cell = (state.sectorImpact[scenarioId] && state.sectorImpact[scenarioId][sector] && state.sectorImpact[scenarioId][sector][c.id]) || {impact:0, importance:0};
      html += '<div class="profile-bar-row">';
      html += '<div class="header"><span>' + escapeHtml(c.label) + '</span><span>' + cell.impact + ' / ' + cell.importance + '</span></div>';
      html += '<div class="bars">';
      html += '<div class="bar-set"><div class="bar-fill" style="width:' + (cell.impact*20) + '%;background:#dc2626"></div></div>';
      html += '<div class="bar-set"><div class="bar-fill" style="width:' + (cell.importance*20) + '%;background:#1e40af"></div></div>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  html += '</div>';
  return html;
}

/* ----------- Companies ----------- */
function renderCompanies() {
  const filtered = COMPANIES.filter(function(c) {
    return (state.filter.sector === 'all' || c.sector === state.filter.sector) &&
           (state.filter.subSector === 'all' || c.subSector === state.filter.subSector) &&
           (state.filter.index === 'all' || c.index === state.filter.index) &&
           (state.filter.search === '' || c.name.indexOf(state.filter.search) !== -1);
  });

  let selected = COMPANIES.find(function(c) { return c.ticker === state.selectedTicker; }) || COMPANIES[0];
  const rawScore = rawRisk(selected);
  const rawRounded = Math.round(rawScore);
  const finalScore = finalRisk(selected);
  const finalRounded = Math.round(finalScore);
  const prepScore = companyPrepScore(selected);
  const reduction = rawScore > 0 ? ((rawScore - finalScore) / rawScore * 100) : 0;
  const meta = (state.exposure[selected.ticker] && state.exposure[selected.ticker]._meta) || {lastUpdated:'-', changeLog:[]};

  let html = '<div class="grid grid-12">';

  // List column
  html += '<div class="card col-4"><h3>חברות (' + filtered.length + ')</h3>';
  html += '<div class="search-controls">';
  html += '<input type="text" id="company-search" placeholder="חיפוש חברה..." value="' + escapeHtml(state.filter.search) + '"/>';
  html += '<select id="filter-sector"><option value="all">כל הענפים</option>';
  SECTORS.forEach(function(s) {
    html += '<option value="' + escapeHtml(s) + '"' + (state.filter.sector === s ? ' selected' : '') + '>' + escapeHtml(s) + '</option>';
  });
  html += '</select>';
  // Sub-sector dropdown — only when sector selected
  if (state.filter.sector !== 'all' && SECTOR_TAXONOMY[state.filter.sector]) {
    html += '<select id="filter-subsector"><option value="all">כל תתי-הענפים</option>';
    SECTOR_TAXONOMY[state.filter.sector].forEach(function(ss) {
      html += '<option value="' + escapeHtml(ss) + '"' + (state.filter.subSector === ss ? ' selected' : '') + '>' + escapeHtml(ss) + '</option>';
    });
    html += '</select>';
  }
  html += '<select id="filter-index"><option value="all">כל המדדים</option>';
  INDICES.forEach(function(i) {
    html += '<option value="' + escapeHtml(i) + '"' + (state.filter.index === i ? ' selected' : '') + '>' + escapeHtml(i) + '</option>';
  });
  html += '</select></div>';

  html += '<div class="list-container">';
  // Group by sub-sector
  const grouped = {};
  const ungrouped = [];
  filtered.forEach(function(c) {
    if (c.subSector) {
      if (!grouped[c.subSector]) grouped[c.subSector] = [];
      grouped[c.subSector].push(c);
    } else {
      ungrouped.push(c);
    }
  });
  // Sort sub-sectors: those with more companies first
  const subSectorOrder = Object.keys(grouped).sort(function(a,b){
    return grouped[b].length - grouped[a].length;
  });

  const renderCompanyItem = function(c) {
    const score = finalRisk(c);
    const r = Math.round(score);
    let h = '<button class="btn-list-item' + (state.selectedTicker === c.ticker ? ' active' : '') + '" data-ticker="' + escapeHtml(c.ticker) + '" style="margin-bottom:4px">';
    h += '<div class="company-item">';
    h += '<div class="company-info"><div class="name">' + escapeHtml(c.name) + '</div><div class="meta">' + escapeHtml(c.sector) + ' • ' + escapeHtml(c.index) + '</div></div>';
    h += '<div class="severity-circle" style="background:' + severityColor(r) + ';color:' + severityTextColor(r) + '">' + score.toFixed(1) + '</div>';
    h += '</div></button>';
    return h;
  };

  subSectorOrder.forEach(function(subName) {
    html += '<div class="subsector-group-header">';
    html += '<span class="subsector-name">' + escapeHtml(subName) + '</span>';
    html += '<span class="subsector-count">' + grouped[subName].length + '</span>';
    html += '</div>';
    grouped[subName].forEach(function(c) { html += renderCompanyItem(c); });
  });
  if (ungrouped.length > 0) {
    html += '<div class="subsector-group-header">';
    html += '<span class="subsector-name" style="color:#94a3b8">ללא תת-ענף</span>';
    html += '<span class="subsector-count">' + ungrouped.length + '</span>';
    html += '</div>';
    ungrouped.forEach(function(c) { html += renderCompanyItem(c); });
  }
  html += '</div></div>';

  // Detail column
  html += '<div class="col-8" style="display:flex;flex-direction:column;gap:16px">';

  // Header card - שני דירוגי סיכון + תאריך עדכון + לוג
  html += '<div class="card">';
  html += '<div class="flex items-center justify-between" style="flex-wrap:wrap;gap:16px">';

  // Company info (left side, RTL = visually right)
  html += '<div style="flex:1;min-width:240px"><h2>' + escapeHtml(selected.name) + '</h2>';
  html += '<div class="text-sm text-slate-500 mt-2">' + escapeHtml(selected.sector) + (selected.subSector ? ' • ' + escapeHtml(selected.subSector) : '') + ' • ' + escapeHtml(selected.index) + ' • ני"ע: ' + escapeHtml(selected.ticker) + '</div>';
  html += '<div class="flex gap-2 mt-2"><span class="tag tag-blue">ESG: ' + escapeHtml(selected.esg) + '</span><span class="tag tag-purple">ממשל: ' + escapeHtml(selected.governance) + '</span></div>';
  // Last updated + log
  html += '<div class="company-meta-bar">';
  html += '<div class="meta-item"><span class="meta-icon">📅</span><span class="text-xs text-slate-500">עודכן לאחרונה:</span>';
  html += '<input type="date" id="company-date-input" value="' + escapeHtml(meta.lastUpdated) + '" class="date-input" />';
  html += '</div>';
  html += '<button class="meta-link-btn" data-action="toggle-log">' + (state.showCompanyLog ? '🔼 הסתר לוג' : '🕘 לוג שינויים (' + meta.changeLog.length + ')') + '</button>';
  html += '</div>';
  html += '</div>';

  // Two risk scores side by side
  html += '<div class="dual-risk-display">';
  html += '<div class="risk-card">';
  html += '<div class="risk-card-label">דירוג שורשי</div>';
  html += '<div class="severity-circle-lg" style="background:' + severityColor(rawRounded) + ';color:' + severityTextColor(rawRounded) + '">' + rawScore.toFixed(1) + '</div>';
  html += '<div class="risk-card-sub">' + severityLabel(rawRounded) + '</div>';
  html += '<div class="risk-card-formula">לפני שקלול מוכנות</div>';
  html += '</div>';
  html += '<div class="risk-arrow">' + (reduction > 0 ? '←' : '=') + '</div>';
  html += '<div class="risk-card">';
  html += '<div class="risk-card-label">דירוג סופי</div>';
  html += '<div class="severity-circle-lg" style="background:' + severityColor(finalRounded) + ';color:' + severityTextColor(finalRounded) + '">' + finalScore.toFixed(1) + '</div>';
  html += '<div class="risk-card-sub">' + severityLabel(finalRounded) + '</div>';
  if (reduction > 0) {
    html += '<div class="risk-card-formula" style="color:#059669">↓ ' + reduction.toFixed(0) + '% הפחתה (מוכנות ' + prepScore.toFixed(1) + '/5)</div>';
  } else {
    html += '<div class="risk-card-formula">אחרי שקלול מוכנות</div>';
  }
  html += '</div>';
  html += '</div>';

  html += '</div>';

  // Change log (collapsible)
  if (state.showCompanyLog) {
    html += '<div class="change-log-box">';
    html += '<div class="text-xs font-semibold text-slate-700 mb-2">🕘 לוג שינויים (' + meta.changeLog.length + ' רשומות):</div>';
    if (meta.changeLog.length === 0) {
      html += '<div class="text-xs text-slate-500" style="padding:8px;text-align:center">עדיין אין שינויים מתועדים. כל שינוי בחשיפות, מוכנות, או תאריך - יתועד כאן אוטומטית.</div>';
    } else {
      html += '<div class="change-log-list">';
      meta.changeLog.slice().reverse().forEach(function(entry) {
        html += '<div class="change-log-entry">';
        html += '<span class="log-date">' + escapeHtml(entry.date) + '</span>';
        html += '<span class="log-field">' + escapeHtml(entry.field) + ':</span>';
        html += '<span class="log-from">' + escapeHtml(String(entry.oldValue)) + '</span>';
        html += '<span class="log-arrow">→</span>';
        html += '<span class="log-to">' + escapeHtml(String(entry.newValue)) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';

  // Exposure card - עם פירוט מלא של החישוב לכל תרחיש
  html += '<div class="card"><h3>חשיפה לתרחישים – פירוט הציון לכל תרחיש</h3>';
  html += '<div class="text-xs text-slate-500 mb-3">לכל תרחיש מוצג: <b>ציון התרחיש בענף</b> (ממודול 2) × <b>חשיפת החברה</b> (1-5) → <b>ציון מסכם של החברה לתרחיש</b> (ממוצע גיאומטרי, מנורמל ל-1-5).</div>';
  html += '<div class="space-y-3">';
  Object.values(state.scenarios).forEach(function(s) {
    const expRec = (state.exposure[selected.ticker] && state.exposure[selected.ticker][s.id]) || {exposure:1, rationale:''};
    const exp = expRec.exposure;
    const rationale = expRec.rationale || '';
    const sectorScore = sectorScenarioScore(s.id, selected.sector);
    const companyScore = companyScenarioScore(selected, s.id);
    const scoreRounded = Math.round(companyScore);
    const isExpanded = state.expandedExposure === s.id;
    const hasRationale = rationale.length > 0;

    html += '<div class="exposure-row">';
    html += '<div class="exposure-row-main">';
    html += '<span style="font-size:24px">' + s.icon + '</span>';
    html += '<div class="exposure-row-info">';
    html += '<div class="text-sm font-semibold">' + escapeHtml(s.name);
    if (hasRationale) html += ' <span style="color:#2563eb;font-size:11px" title="קיים הסבר">📝</span>';
    html += '</div>';
    html += '<div class="exposure-formula">';
    if (!exp || exp === 0) {
      html += 'דירוג ענף <b>' + escapeHtml(selected.sector) + '</b>: ';
      html += '<span class="exposure-score-badge" style="background:' + severityColor(scoreRounded) + ';color:' + severityTextColor(scoreRounded) + '">' + companyScore.toFixed(2) + '</span>';
      html += ' <span style="color:#94a3b8;font-size:10px">(ללא דירוג ידני — מאמץ ישירות)</span>';
    } else {
      html += 'ענף: <b>' + sectorScore.toFixed(2) + '</b> × ידני: <b>' + exp + '</b> → ';
      html += '<span class="exposure-score-badge" style="background:' + severityColor(scoreRounded) + ';color:' + severityTextColor(scoreRounded) + '">' + companyScore.toFixed(2) + '</span>';
    }
    html += '</div>';
    html += '</div>';
    var secScore = sectorScenarioScore(s.id, selected.sector);
    html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">';
    html += renderExposureSelector(exp, 'exp-' + s.id);
    if (!exp || exp === 0) {
      html += '<div class="exposure-origin sector">מאמץ דירוג ענף (' + secScore.toFixed(2) + ')</div>';
    } else {
      html += '<div class="exposure-origin manual">דירוג ידני • שקלול עם ענף</div>';
    }
    html += '<button class="expand-btn" data-expand-exposure="' + escapeHtml(s.id) + '" title="' + (isExpanded ? 'סגור הסבר' : 'הוסף/פתח הסבר') + '" style="font-size:11px;align-self:flex-end">';
    html += (isExpanded ? '▼ סגור הסבר' : (hasRationale ? '📝 ערוך הסבר' : '+ הוסף הסבר'));
    html += '</button>';
    html += '</div>';
    html += '</div>';

    if (isExpanded) {
      html += '<div class="exposure-rationale-box">';
      html += '<div class="label-line">📝 הסבר לדירוג חשיפה <b>' + exp + '</b> של <b>' + escapeHtml(selected.name) + '</b> לתרחיש <b>' + escapeHtml(s.name) + '</b>:</div>';
      html += '<textarea id="exposure-rationale-input" rows="3" placeholder="לדוגמה: החברה פועלת ביישובים בנגב ובאזורים החמים ביותר בארץ, מה שמגביר חשיפה לעליית טמפרטורה ופגיעה אפשרית בעובדים, בתשתיות ובפעילות.">' + escapeHtml(rationale) + '</textarea>';
      html += '<div class="text-xs text-slate-500 mt-2">ההסבר ייחודי לצירוף של החברה והתרחיש</div>';
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';

  // Preparedness card - קטגוריות דינמיות עם דירוג 5-מצבי
  const prep = (state.exposure[selected.ticker] && state.exposure[selected.ticker].preparedness) || {};
  html += '<div class="card"><div class="flex items-center justify-between mb-3">';
  html += '<h3 style="margin-bottom:0">מוכנות החברה להתמודדות</h3>';
  html += '<div class="text-xs text-slate-500">ממוצע מוכנות: <b style="color:#0f172a">' + prepScore.toFixed(2) + '</b> / 5.0</div>';
  html += '</div>';
  // טבלת קטגוריות
  html += '<table class="prep-table"><thead><tr>';
  html += '<th>קטגוריית מוכנות</th>';
  html += '<th class="text-center" style="width:42%">דירוג</th>';
  html += '<th class="text-center" style="width:22%">המלצת המדרג</th>';
  html += '<th style="width:30px"></th>';
  html += '</tr></thead><tbody>';
  const recs = (state.exposure[selected.ticker] && state.exposure[selected.ticker].recommendations) || {};
  PREP_CATEGORIES.forEach(function(cat) {
    const val = prep[cat.id] || 1;
    const isDefault = ['risk_survey','board_approval','action_plan'].indexOf(cat.id) !== -1;
    const recVal = (recs[cat.id] != null && recs[cat.id] !== '') ? recs[cat.id] : suggestRec(val);
    html += '<tr>';
    html += '<td class="prep-cat-label">' + escapeHtml(cat.label) + '</td>';
    html += '<td class="text-center">' + renderPrepSelector(val, 'prep-' + cat.id) + '</td>';
    html += '<td class="text-center">';
    html += '<select onchange="setRecommendation(\'' + cat.id + '\', this.value)" style="font-size:12px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;background:#fff;color:' + recColor(recVal) + ';font-weight:600;cursor:pointer;max-width:130px">';
    REC_OPTIONS.forEach(function(opt){
      const sel = (opt === recVal) ? ' selected' : '';
      html += '<option value="' + escapeHtml(opt) + '"' + sel + '>' + (opt===''?'— ללא':escapeHtml(opt)) + '</option>';
    });
    html += '</select></td>';
    html += '<td>';
    if (!isDefault) {
      html += '<button class="remove-cat-btn" data-remove-prep-cat="' + escapeHtml(cat.id) + '" title="הסר קטגוריה">✕</button>';
    }
    html += '</td>';
    html += '</tr>';
  });
  // שורת הוספת קטגוריה
  html += '<tr class="add-cat-row"><td colspan="4"><div class="add-cat-form">';
  html += '<input id="new-prep-cat-input" type="text" placeholder="שם קטגוריית מוכנות חדשה (לדוגמה: ביטוח אקלים, שותפויות עם הקהילה)" />';
  html += '<button class="add-cat-btn" id="add-prep-cat-btn">+ הוסף קטגוריית מוכנות</button>';
  html += '</div></td></tr>';
  html += '</tbody></table>';
  html += '</div>';

  // Assets map card
  html += renderAssetsCard(selected);

  // Benchmark card
  html += renderBenchmarkCard(selected);

  html += '</div>'; // end col-8
  html += '</div>'; // end grid

  return html;
}

/* ----------- Assets Map ----------- */
function renderAssetsCard(company) {
  const companyAssets = state.assets[company.ticker] || {domestic: [], foreign: []};
  let html = '<div class="card"><h3>נכסי החברה על המפה</h3>';

  // Toggle בין מפה אמיתית למפת SVG (רק אם Leaflet זמין)
  const leafletReady = typeof L !== 'undefined' && state._leafletAvailable !== false;
  if (leafletReady) {
    html += '<div class="map-mode-toggle">';
    html += '<button class="map-mode-btn' + (state.mapMode === 'leaflet' ? ' active' : '') + '" data-map-mode="leaflet">🗺️ מפה אינטראקטיבית</button>';
    html += '<button class="map-mode-btn' + (state.mapMode === 'svg' ? ' active' : '') + '" data-map-mode="svg">📍 תצוגה סכמטית</button>';
    html += '</div>';
  } else if (state._leafletAvailable === false) {
    html += '<div class="map-fallback-notice">המפה האינטראקטיבית לא נטענה (ייתכן שאין חיבור אינטרנט או שהקובץ נפתח מקומית). מוצגת תצוגה סכמטית.</div>';
  }

  const useLeaflet = leafletReady && state.mapMode === 'leaflet';
  if (useLeaflet) {
    html += renderLeafletMap(companyAssets);
  } else {
    html += renderSchematicMap(companyAssets);
  }

  // Legend (תמיד מוצג)
  html += '<div class="asset-legend">';
  Object.keys(ASSET_TYPES).forEach(function(k) {
    const t = ASSET_TYPES[k];
    html += '<div class="asset-legend-item"><div class="asset-legend-dot" style="background:' + t.color + '"></div><span>' + t.icon + ' ' + t.label + '</span></div>';
  });
  html += '</div>';

  // Asset list
  html += '<div class="asset-list-mini">';
  html += '<div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:6px">נכסים בישראל (' + companyAssets.domestic.length + ')</div>';
  companyAssets.domestic.forEach(function(a) {
    const ac = ASSET_TYPES[a.type];
    html += '<div class="row"><span class="icon" style="color:' + ac.color + '">' + ac.icon + '</span><span>' + escapeHtml(ac.label) + '</span><span style="color:#94a3b8">•</span><span>' + escapeHtml(a.city) + '</span></div>';
  });
  if (companyAssets.foreign.length > 0) {
    html += '<div style="font-size:12px;font-weight:700;color:#475569;margin:8px 0 6px">נכסים בחו"ל (' + companyAssets.foreign.length + ')</div>';
    companyAssets.foreign.forEach(function(a) {
      const ac = ASSET_TYPES[a.type];
      html += '<div class="row"><span class="icon" style="color:' + ac.color + '">' + ac.icon + '</span><span>' + escapeHtml(ac.label) + '</span><span style="color:#94a3b8">•</span><span>' + escapeHtml(a.location) + '</span></div>';
    });
  }
  html += '</div>';
  html += '</div>';
  return html;
}

/* מיכל ריק למפת Leaflet - האתחול האמיתי קורה ב-attachEvents() אחרי שה-DOM קיים */
function renderLeafletMap(companyAssets) {
  return '<div class="asset-map-wrapper"><div id="leaflet-map" class="leaflet-map-container" data-has-foreign="' + (companyAssets.foreign.length > 0 ? '1' : '0') + '"></div></div>';
}

/* תצוגת SVG הסכמטית הקודמת - שמורה כ-fallback */
function renderSchematicMap(companyAssets) {
  let html = '<div class="asset-map-wrapper">';
  html += '<svg viewBox="-40 -22 180 184" class="asset-map-svg" preserveAspectRatio="xMidYMid meet" style="aspect-ratio: 180/184">';
  html += '<path d="M 30 10 L 45 10 L 50 15 L 55 18 L 60 22 L 65 30 L 70 40 L 75 50 L 70 60 L 65 70 L 60 80 L 55 90 L 50 100 L 45 110 L 42 118 L 40 122 L 38 118 L 35 110 L 32 100 L 30 90 L 28 80 L 26 70 L 25 60 L 24 50 L 25 40 L 26 30 L 28 20 Z" fill="#fef3c7" stroke="#92400e" stroke-width="0.4"/>';
  html += '<text x="8" y="55" font-size="3" fill="#1e40af" opacity="0.7">הים התיכון</text>';
  html += '<text x="82" y="35" font-size="2.5" fill="#64748b" opacity="0.7">סוריה</text>';
  html += '<text x="82" y="60" font-size="2.5" fill="#64748b" opacity="0.7">ירדן</text>';
  companyAssets.foreign.forEach(function(f) {
    let bx, by;
    if (f.side === 'left')        { bx = -22; by = f.y; }
    else if (f.side === 'right')  { bx = 118; by = f.y; }
    else if (f.side === 'top')    { bx = f.x; by = -9;  }
    else                          { bx = f.x; by = 144; }
    const ac = ASSET_TYPES[f.type];
    html += '<line x1="45" y1="60" x2="' + bx + '" y2="' + by + '" stroke="' + ac.color + '" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.4"/>';
    html += '<circle cx="' + bx + '" cy="' + by + '" r="6" fill="' + ac.color + '" fill-opacity="0.9" stroke="white" stroke-width="0.7" class="asset-dot" data-asset-info="' + escapeHtml(ac.label + ' • ' + f.location) + '"/>';
    html += '<text x="' + bx + '" y="' + (by + 1.8) + '" font-size="5" text-anchor="middle" fill="white" pointer-events="none">' + ac.icon + '</text>';
    let tx = bx, ty = by, anchor = 'middle';
    if (f.side === 'left')   { tx = bx - 7;   ty = by + 1; anchor = 'end';    }
    if (f.side === 'right')  { tx = bx + 7;   ty = by + 1; anchor = 'start';  }
    if (f.side === 'top')    { ty = by - 7.5;                                  }
    if (f.side === 'bottom') { ty = by + 10;                                   }
    html += '<text x="' + tx + '" y="' + ty + '" font-size="3.2" fill="#0f172a" text-anchor="' + anchor + '" font-weight="700">' + escapeHtml(f.location) + '</text>';
  });
  companyAssets.domestic.forEach(function(a) {
    const ac = ASSET_TYPES[a.type];
    html += '<circle cx="' + a.x + '" cy="' + a.y + '" r="3" fill="' + ac.color + '" stroke="white" stroke-width="0.6" class="asset-dot" data-asset-info="' + escapeHtml(ac.label + ' • ' + a.city) + '"/>';
    html += '<text x="' + a.x + '" y="' + (a.y + 1) + '" font-size="2.5" text-anchor="middle" fill="white" pointer-events="none">' + ac.icon + '</text>';
  });
  html += '</svg></div>';
  return html;
}

/* אתחול מפת Leaflet - נקרא אחרי שהמיכל קיים ב-DOM */
function initLeafletMap(company) {
  // ניקוי המפה הקודמת אם קיימת
  if (state._leafletMap) {
    try { state._leafletMap.remove(); } catch(e) {}
    state._leafletMap = null;
  }
  const container = document.getElementById('leaflet-map');
  if (!container || typeof L === 'undefined') return;

  const companyAssets = state.assets[company.ticker] || {domestic: [], foreign: []};
  const hasForeign = companyAssets.foreign.length > 0;

  try {
    // נקודת מבט: אם יש נכסים בחו"ל - מבט עולמי, אחרת ישראל
    const initialView = hasForeign ? [25, 30] : [31.5, 35.0];
    const initialZoom = hasForeign ? 2 : 7;

    const map = L.map(container, {
      center: initialView,
      zoom: initialZoom,
      scrollWheelZoom: false,  // ימנע "חטיפת" גלילת הדף
      zoomControl: true,
      attributionControl: true
    });

    // OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 18
    }).addTo(map);

    // איסוף כל הסמנים כדי לחשב bounds
    const allLatLngs = [];

    // סמני נכסים בישראל
    companyAssets.domestic.forEach(function(a) {
      // קואורדינטת אמת/דמו אם קיימת; אחרת מרכז העיר עם jitter קטן
      let lat, lng;
      if (typeof a.lat === 'number' && typeof a.lng === 'number') { lat = a.lat; lng = a.lng; }
      else {
        const cityRecord = ISRAEL_CITIES.find(function(c) { return c.name === a.city; });
        if (!cityRecord) return;
        lat = cityRecord.lat + (Math.random() - 0.5) * 0.02;
        lng = cityRecord.lng + (Math.random() - 0.5) * 0.02;
      }
      const ac = ASSET_TYPES[a.type];
      allLatLngs.push([lat, lng]);

      const icon = L.divIcon({
        className: 'asset-marker-icon',
        html: '<div class="asset-marker-circle" style="background:' + ac.color + '">' + ac.icon + '</div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -14]
      });
      const marker = L.marker([lat, lng], { icon: icon }).addTo(map);
      const popupHtml =
        '<div class="popup-title"><span class="popup-icon">' + ac.icon + '</span>' + escapeHtml(ac.label) + '</div>' +
        '<div class="popup-meta">📍 ' + escapeHtml(a.city) + '</div>' +
        '<div class="popup-meta">חברה: ' + escapeHtml(company.name) + '</div>';
      marker.bindPopup(popupHtml);
    });

    // סמני נכסים בחו"ל
    companyAssets.foreign.forEach(function(f) {
      let flat, flng;
      if (typeof f.lat === 'number' && typeof f.lng === 'number') { flat = f.lat; flng = f.lng; }
      else {
        const locRecord = FOREIGN_LOCATIONS.find(function(l) { return l.name === f.location; });
        if (!locRecord) return;
        flat = locRecord.lat; flng = locRecord.lng;
      }
      const ac = ASSET_TYPES[f.type];
      allLatLngs.push([flat, flng]);

      const icon = L.divIcon({
        className: 'asset-marker-icon',
        html: '<div class="asset-marker-circle foreign" style="background:' + ac.color + '">' + ac.icon + '</div>',
        iconSize: [34, 34],
        iconAnchor: [17, 17],
        popupAnchor: [0, -17]
      });
      const marker = L.marker([flat, flng], { icon: icon }).addTo(map);
      const popupHtml =
        '<div class="popup-title"><span class="popup-icon">' + ac.icon + '</span>' + escapeHtml(ac.label) + '</div>' +
        '<div class="popup-meta">🌍 ' + escapeHtml(f.location) + '</div>' +
        '<div class="popup-meta">חברה: ' + escapeHtml(company.name) + '</div>';
      marker.bindPopup(popupHtml);
    });

    // התאמת תצוגה לכל הסמנים אם יש כמה
    if (allLatLngs.length >= 2) {
      try { map.fitBounds(allLatLngs, { padding: [30, 30], maxZoom: hasForeign ? 4 : 9 }); } catch(e) {}
    } else if (allLatLngs.length === 1) {
      map.setView(allLatLngs[0], 10);
    }

    state._leafletMap = map;

    // לוודא שהמפה מציגה נכון אחרי שה-container מקבל את גודלו הסופי
    setTimeout(function() { try { map.invalidateSize(); } catch(e) {} }, 100);
  } catch (err) {
    console.error('Leaflet init failed:', err);
    state._leafletAvailable = false;
    state.mapMode = 'svg';
    render();
  }
}

/* ----------- Benchmark ----------- */
function renderBenchmarkCard(company) {
  const myScore = finalRisk(company);
  // קבוצת ההשוואה
  let benchGroup, benchLabel;
  if (state.benchmarkType === 'sector') {
    benchGroup = COMPANIES.filter(function(c) { return c.sector === company.sector; });
    benchLabel = 'ענף ' + company.sector;
  } else if (state.benchmarkType === 'index') {
    benchGroup = COMPANIES.filter(function(c) { return c.index === company.index; });
    benchLabel = 'מדד ' + company.index;
  } else {
    benchGroup = COMPANIES;
    benchLabel = 'כלל החברות במאגר';
  }
  const benchScores = benchGroup.map(function(c) { return finalRisk(c); });
  const benchAvg = benchScores.reduce(function(a,b) { return a+b; }, 0) / benchScores.length;
  const benchMin = Math.min.apply(null, benchScores);
  const benchMax = Math.max.apply(null, benchScores);

  // אחוזון של החברה בתוך הקבוצה
  const better = benchScores.filter(function(s) { return s < myScore; }).length;
  const percentile = Math.round((better / benchScores.length) * 100);
  const diff = myScore - benchAvg;

  // 5 חברות הכי קרובות לדירוג שלנו לתצוגה
  const others = benchGroup
    .filter(function(c) { return c.ticker !== company.ticker; })
    .map(function(c) { return {company: c, score: finalRisk(c)}; })
    .sort(function(a,b) { return b.score - a.score; });

  // נשמור את הכי גבוה, הכי נמוך והכמה שמסביבנו
  const displayList = [];
  if (others.length > 0) displayList.push(others[0]); // הגבוה ביותר
  // 3 חברות מסביב לדירוג שלנו
  const myIdx = others.findIndex(function(o) { return o.score <= myScore; });
  const start = Math.max(0, Math.min(others.length - 3, (myIdx === -1 ? others.length - 3 : myIdx - 1)));
  for (let i = start; i < Math.min(others.length, start + 3); i++) {
    if (!displayList.includes(others[i])) displayList.push(others[i]);
  }
  if (others.length > 1 && !displayList.includes(others[others.length - 1])) {
    displayList.push(others[others.length - 1]); // הנמוך ביותר
  }

  let html = '<div class="card"><h3>בנצ\'מארק</h3>';
  // Switcher
  html += '<div class="benchmark-controls">';
  html += '<button class="benchmark-btn' + (state.benchmarkType === 'sector' ? ' active' : '') + '" data-bench="sector">השוואה לענף</button>';
  html += '<button class="benchmark-btn' + (state.benchmarkType === 'index' ? ' active' : '') + '" data-bench="index">השוואה למדד</button>';
  html += '<button class="benchmark-btn' + (state.benchmarkType === 'all' ? ' active' : '') + '" data-bench="all">השוואה לכלל החברות</button>';
  html += '</div>';

  // Summary boxes
  const diffClass = diff > 0 ? 'up' : (diff < 0 ? 'down' : '');
  const diffSign = diff > 0 ? '+' : '';
  html += '<div class="bench-summary">';
  html += '<div class="box self"><div class="label">דירוג ' + escapeHtml(company.name) + '</div><div class="val">' + myScore.toFixed(2) + '</div></div>';
  html += '<div class="box bench"><div class="label">ממוצע ' + escapeHtml(benchLabel) + '</div><div class="val">' + benchAvg.toFixed(2) + '</div></div>';
  html += '<div class="box diff"><div class="label">הפרש</div><div class="val ' + diffClass + '">' + diffSign + diff.toFixed(2) + '</div></div>';
  html += '</div>';

  // Legend
  html += '<div class="bench-legend">';
  html += '<div class="item"><div class="swatch" style="background:#0f172a"></div>' + escapeHtml(company.name) + '</div>';
  html += '<div class="item"><div class="swatch" style="background:#2563eb;opacity:0.7"></div>חברות אחרות בקבוצה</div>';
  html += '</div>';

  // ── Distribution histogram ──
  const myPct = ((myScore - 1) / 4) * 100;
  html += '<div class="benchmark-chart dist-chart-wrap">';
  html += '<div class="dist-chart-title">התפלגות ציוני סיכון — ' + escapeHtml(benchLabel) + ' (' + benchScores.length + ' חברות)</div>';

  // Build histogram buckets: 10 bins over range [1,5]
  const BINS = 16;
  const BIN_MIN = 1, BIN_MAX = 5;
  const binSize = (BIN_MAX - BIN_MIN) / BINS;
  const counts = new Array(BINS).fill(0);
  benchScores.forEach(function(s) {
    const bi = Math.min(BINS - 1, Math.floor((s - BIN_MIN) / binSize));
    counts[bi]++;
  });
  const maxCount = Math.max.apply(null, counts) || 1;

  // SVG dimensions
  const svgW = 460, svgH = 130;
  const padL = 28, padR = 10, padT = 10, padB = 36;
  const chartW = svgW - padL - padR;
  const chartH = svgH - padT - padB;
  const barW = Math.floor(chartW / BINS) - 2;

  // Which bin is self, which is avg
  const selfBin = Math.min(BINS-1, Math.floor((myScore - BIN_MIN) / binSize));
  const avgBin  = Math.min(BINS-1, Math.floor((benchAvg - BIN_MIN) / binSize));

  let svg = '<svg class="dist-svg" viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg">';

  // Y gridlines
  for (let g = 0; g <= 4; g++) {
    const gy = padT + chartH - (g / 4) * chartH;
    svg += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (svgW-padR) + '" y2="' + gy + '" stroke="#e5e7eb" stroke-width="1"/>';
    if (g > 0) svg += '<text class="dist-axis-label" x="' + (padL-4) + '" y="' + (gy+3) + '" text-anchor="end">' + Math.round(maxCount*g/4) + '</text>';
  }

  // Bars
  for (let i = 0; i < BINS; i++) {
    const bx = padL + i * (chartW / BINS) + 1;
    const bh = (counts[i] / maxCount) * chartH;
    const by = padT + chartH - bh;
    let cls = 'dist-bar';
    if (i === selfBin) cls += ' self-bar';
    else if (i === avgBin) cls += ' avg-bar';
    svg += '<rect class="' + cls + '" x="' + bx.toFixed(1) + '" y="' + by.toFixed(1) + '" width="' + barW + '" height="' + bh.toFixed(1) + '" rx="2"/>';
  }

  // X-axis labels (1,2,3,4,5)
  for (let v = 1; v <= 5; v++) {
    const lx = padL + ((v - BIN_MIN) / (BIN_MAX - BIN_MIN)) * chartW;
    svg += '<text class="dist-axis-label" x="' + lx.toFixed(1) + '" y="' + (svgH - 20) + '" text-anchor="middle">' + v + '</text>';
  }
  // X axis line
  svg += '<line x1="' + padL + '" y1="' + (padT+chartH) + '" x2="' + (svgW-padR) + '" y2="' + (padT+chartH) + '" stroke="#94a3b8" stroke-width="1.5"/>';
  // X axis title
  svg += '<text class="dist-axis-label" x="' + (svgW/2) + '" y="' + (svgH-4) + '" text-anchor="middle" font-size="10">ציון סיכון</text>';

  // Self annotation line
  const selfX = padL + ((myScore - BIN_MIN) / (BIN_MAX - BIN_MIN)) * chartW;
  const selfBinH = (counts[selfBin] / maxCount) * chartH;
  svg += '<line x1="' + selfX.toFixed(1) + '" y1="' + padT + '" x2="' + selfX.toFixed(1) + '" y2="' + (padT+chartH) + '" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>';

  // Avg annotation line
  const avgX = padL + ((benchAvg - BIN_MIN) / (BIN_MAX - BIN_MIN)) * chartW;
  svg += '<line x1="' + avgX.toFixed(1) + '" y1="' + padT + '" x2="' + avgX.toFixed(1) + '" y2="' + (padT+chartH) + '" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>';

  svg += '</svg>';
  html += svg;

  // Legend
  html += '<div class="dist-legend">';
  html += '<span><span class="swatch" style="background:#93c5fd"></span>חברות בקבוצה</span>';
  html += '<span><span class="swatch" style="background:#dc2626"></span>' + escapeHtml(company.name) + ' (' + myScore.toFixed(2) + ')</span>';
  html += '<span><span class="swatch" style="background:#f59e0b"></span>ממוצע קבוצה (' + benchAvg.toFixed(2) + ')</span>';
  html += '</div>';

  html += '</div>';

  // Detail bars - selected companies
  html += '<div style="margin-top:20px;border-top:1px solid #e5e7eb;padding-top:12px"><div style="font-size:12px;color:#475569;margin-bottom:8px;font-weight:600">השוואה לחברות נבחרות מהקבוצה</div>';
  // Self first
  html += '<div class="bench-row"><div class="label highlight">' + escapeHtml(company.name) + '</div>';
  html += '<div class="bar-track" style="position:relative"><div class="bar-marker self" style="right:' + myPct + '%"></div></div>';
  html += '<div class="value" style="color:#dc2626">' + myScore.toFixed(2) + '</div></div>';
  displayList.forEach(function(item) {
    const pct = ((item.score - 1) / 4) * 100;
    html += '<div class="bench-row">';
    html += '<div class="label">' + escapeHtml(item.company.name) + '</div>';
    html += '<div class="bar-track" style="position:relative"><div class="bar-marker bench" style="right:' + pct + '%"></div></div>';
    html += '<div class="value">' + item.score.toFixed(2) + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Percentile note
  let percMsg = '';
  if (percentile >= 75) percMsg = company.name + ' נמצאת באחוזון ה-' + percentile + ' של הקבוצה (סיכון גבוה יחסית)';
  else if (percentile >= 50) percMsg = company.name + ' נמצאת באחוזון ה-' + percentile + ' של הקבוצה (סיכון בינוני-גבוה)';
  else if (percentile >= 25) percMsg = company.name + ' נמצאת באחוזון ה-' + percentile + ' של הקבוצה (סיכון בינוני-נמוך)';
  else percMsg = company.name + ' נמצאת באחוזון ה-' + percentile + ' של הקבוצה (סיכון נמוך יחסית)';
  html += '<div style="margin-top:16px;padding:10px;background:#f8fafc;border-radius:6px;font-size:13px;color:#334155">📊 ' + escapeHtml(percMsg) + '</div>';

  html += '</div>';
  return html;
}

function renderSeveritySelector(value, key, size) {
  const cls = size === 'sm' ? 'severity-btn sm' : 'severity-btn';
  let html = '<div class="severity-selector" data-selector="' + key + '">';
  for (let n = 1; n <= 5; n++) {
    const isActive = value === n;
    const style = isActive
      ? 'background:' + severityColor(n) + ';color:' + severityTextColor(n) + ';border-color:' + severityColor(n) + ';transform:scale(1.1)'
      : '';
    html += '<button class="' + cls + '" data-val="' + n + '" style="' + style + '">' + n + '</button>';
  }
  html += '</div>';
  return html;
}

function renderExposureSelector(value, key) {
  // value=0 means "adopt sector score"; value=1-5 means manual override
  let html = '<div class="severity-selector" data-selector="' + key + '">';
  // Button 0 — לפי ענף
  const isZero = !value || value === 0;
  const zeroStyle = isZero
    ? 'background:#1e40af;color:white;border-color:#1e40af;transform:scale(1.05);font-size:9px;padding:2px 4px'
    : 'font-size:9px;padding:2px 4px;color:#475569';
  html += '<button class="severity-btn sm" data-val="0" style="' + zeroStyle + '" title="החברה מאמצת את דירוג הענף ללא שינוי">ענף</button>';
  for (let n = 1; n <= 5; n++) {
    const isActive = value === n;
    const style = isActive
      ? 'background:' + severityColor(n) + ';color:' + severityTextColor(n) + ';border-color:' + severityColor(n) + ';transform:scale(1.1)'
      : '';
    html += '<button class="severity-btn sm" data-val="' + n + '" style="' + style + '">' + n + '</button>';
  }
  html += '</div>';
  return html;
}

/* בורר מוכנות 5-מצבי - עם תוויות מילוליות. ירוק = מוכנות גבוהה, אדום = ללא */
function renderPrepSelector(value, key) {

/* ===========================================================
   6. Event handling
   =========================================================== */
function attachEvents() {
  // Overview mode tabs (climate / water)
  document.querySelectorAll('[data-ov-mode]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.overviewMode = el.getAttribute('data-ov-mode');
      state.ovSearch = '';
      render();
    });
  });

  // Companies-overview sub-tabs (market / company)
  document.querySelectorAll('[data-co-ov-mode]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.coOverviewMode = el.getAttribute('data-co-ov-mode');
      state.ovSearch = '';
      render();
    });
  });

  // Company tab sector/index filters
  var ovSectorEl = document.getElementById('ov-co-sector');
  if (ovSectorEl) ovSectorEl.addEventListener('change', function(){ state.ovSector=ovSectorEl.value; state.overviewCompany=null; state.ovSearch=''; render(); });
  var ovIndexEl = document.getElementById('ov-co-index');
  if (ovIndexEl) ovIndexEl.addEventListener('change', function(){ state.ovIndex=ovIndexEl.value; state.overviewCompany=null; state.ovSearch=''; render(); });
  var ovCoReset = document.getElementById('ov-co-reset');
  if (ovCoReset) ovCoReset.addEventListener('click', function(){ state.ovSector='all'; state.ovIndex='all'; state.overviewCompany=null; state.ovSearch=''; render(); });

  // Company search input
  var searchEl = document.getElementById('ov-co-search');
  if (searchEl) {
    searchEl.addEventListener('input', function() {
      state.ovSearch = searchEl.value;
      render();
      var el2 = document.getElementById('ov-co-search');
      if (el2) { el2.focus(); el2.setSelectionRange(el2.value.length, el2.value.length); }
    });
  }

  // Select company from dropdown
  document.querySelectorAll('[data-select-co]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.overviewCompany = el.getAttribute('data-select-co');
      state.ovSearch = '';
      render();
    });
  });

  // Select company from scatter chart
  document.querySelectorAll('[data-matrix-co]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.overviewCompany = el.getAttribute('data-matrix-co');
      state.activeTab = 'companies_overview';
      state.coOverviewMode = 'company';
      state.ovSearch = '';
      render();
    });
  });

  // Clear company
  document.querySelectorAll('[data-ov-clear-co]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.overviewCompany = null;
      state.ovSearch = '';
      render();
    });
  });

  // Sector filter buttons
  document.querySelectorAll('[data-sector-idx]').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(el.getAttribute('data-sector-idx'));
      state.overviewFilter.sector = idx === -1 ? 'all' : SECTORS[idx];
      state.overviewFilter.subSector = 'all';
      render();
    });
  });

  document.querySelectorAll('[data-subsector-idx]').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx    = parseInt(el.getAttribute('data-subsector-idx'));
      var sector = el.getAttribute('data-subsector-sector') || state.overviewFilter.sector;
      if (idx === -1) {
        state.overviewFilter.subSector = 'all';
      } else {
        var subs = SECTOR_TAXONOMY[sector] || [];
        state.overviewFilter.subSector = subs[idx] || 'all';
      }
      render();
    });
  });

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.activeTab = el.dataset.tab;
      render();
    });
  });

  // Scenarios list
  document.querySelectorAll('[data-scenario]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.activeScenarioId = el.dataset.scenario;
      render();
    });
  });

  // Scenario textarea
  const descEl = document.getElementById('scenario-desc');
  if (descEl) {
    descEl.addEventListener('input', function() {
      state.scenarios[state.activeScenarioId].description = descEl.value;
    });
  }

  // Severity selectors
  document.querySelectorAll('[data-selector]').forEach(function(group) {
    const key = group.dataset.selector;
    group.querySelectorAll('[data-val]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const val = parseInt(btn.dataset.val);
        handleSeverityChange(key, val);
      });
    });
  });

  // Sector module selects
  const selScen = document.getElementById('sel-scenario-for-sector');
  if (selScen) selScen.addEventListener('change', function() { state.activeScenarioForSector = selScen.value; render(); });

  const selSec = document.getElementById('sel-sector');
  if (selSec) selSec.addEventListener('change', function() { state.activeSector = selSec.value; render(); });

  // Expand/collapse category rationale
  document.querySelectorAll('[data-expand]').forEach(function(el) {
    el.addEventListener('click', function() {
      const catId = el.dataset.expand;
      state.expandedCategory = state.expandedCategory === catId ? null : catId;
      render();
    });
  });

  // Rationale textarea - save to state on input
  const rationaleEl = document.getElementById('rationale-input');
  if (rationaleEl && state.expandedCategory) {
    rationaleEl.addEventListener('input', function() {
      const scen = state.activeScenarioForSector;
      const sec = state.activeSector;
      const catId = state.expandedCategory;
      if (state.sectorImpact[scen] && state.sectorImpact[scen][sec] && state.sectorImpact[scen][sec][catId]) {
        state.sectorImpact[scen][sec][catId].rationale = rationaleEl.value;
        xlScheduleSave();
      }
      // Don't re-render to keep focus; the 📝 indicator will appear next time
    });
    // Auto-focus when opened
    rationaleEl.focus();
    const len = rationaleEl.value.length;
    rationaleEl.setSelectionRange(len, len);
  }

  // Expand/collapse exposure rationale (במודול 3)
  document.querySelectorAll('[data-expand-exposure]').forEach(function(el) {
    el.addEventListener('click', function() {
      const sId = el.dataset.expandExposure;
      state.expandedExposure = state.expandedExposure === sId ? null : sId;
      render();
    });
  });

  // Exposure rationale textarea - save to state on input
  const expRationaleEl = document.getElementById('exposure-rationale-input');
  if (expRationaleEl && state.expandedExposure) {
    expRationaleEl.addEventListener('input', function() {
      const ticker = state.selectedTicker;
      const sId = state.expandedExposure;
      if (state.exposure[ticker] && state.exposure[ticker][sId]) {
        state.exposure[ticker][sId].rationale = expRationaleEl.value;
        xlScheduleSave();
      }
    });
    expRationaleEl.focus();
    const len2 = expRationaleEl.value.length;
    expRationaleEl.setSelectionRange(len2, len2);
  }

  // Remove category
  document.querySelectorAll('[data-remove-cat]').forEach(function(el) {
    el.addEventListener('click', function() {
      const catId = el.dataset.removeCat;
      const cat = IMPACT_CATEGORIES.find(function(c) { return c.id === catId; });
      if (!cat) return;
      if (!confirm('האם להסיר את הקטגוריה "' + cat.label + '"?\nהפעולה תמחק את כל הערכים וההסברים שהוגדרו עבורה (בכל הענפים והתרחישים).')) return;
      // Remove from IMPACT_CATEGORIES
      IMPACT_CATEGORIES = IMPACT_CATEGORIES.filter(function(c) { return c.id !== catId; });
      // Remove from sectorImpact for all scenarios/sectors
      Object.keys(state.sectorImpact).forEach(function(s) {
        Object.keys(state.sectorImpact[s]).forEach(function(sec) {
          delete state.sectorImpact[s][sec][catId];
        });
      });
      if (state.expandedCategory === catId) state.expandedCategory = null;
      render();
    });
  });

  // Add new category
  const addBtn = document.getElementById('add-cat-btn');
  const newCatInput = document.getElementById('new-cat-input');
  if (addBtn && newCatInput) {
    const doAdd = function() {
      const label = newCatInput.value.trim();
      if (label === '') return;
      // Prevent duplicates
      const exists = IMPACT_CATEGORIES.some(function(c) { return c.label === label; });
      if (exists) {
        alert('קטגוריה בשם "' + label + '" כבר קיימת.');
        return;
      }
      // Generate unique id
      const id = 'cat_' + Date.now() + '_' + Math.floor(Math.random()*1000);
      IMPACT_CATEGORIES.push({ id: id, label: label });
      // Add to sectorImpact for all scenarios/sectors with default values
      Object.keys(state.sectorImpact).forEach(function(s) {
        Object.keys(state.sectorImpact[s]).forEach(function(sec) {
          state.sectorImpact[s][sec][id] = { impact: 1, importance: 1, rationale: '' };
        });
      });
      newCatInput.value = '';
      render();
    };
    addBtn.addEventListener('click', doAdd);
    newCatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); doAdd(); }
    });
  }

  // Companies filters
  const companySearchEl = document.getElementById('company-search');
  if (searchEl) searchEl.addEventListener('input', function() {
    state.filter.search = searchEl.value;
    render();
    // restore focus
    const el = document.getElementById('company-search');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  });

  const fsec = document.getElementById('filter-sector');
  if (fsec) fsec.addEventListener('change', function() { state.filter.sector = fsec.value; render(); });

  const fidx = document.getElementById('filter-index');
  if (fidx) fidx.addEventListener('change', function() { state.filter.index = fidx.value; render(); });

  // Company select
  document.querySelectorAll('[data-ticker]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.selectedTicker = el.dataset.ticker;
      render();
    });
  });

  // Preparedness selectors - 5-state buttons
  document.querySelectorAll('[data-prep-selector]').forEach(function(group) {
    const key = group.dataset.prepSelector;  // "prep-<catId>"
    const catId = key.substring(5);
    group.querySelectorAll('[data-val]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const val = parseInt(btn.dataset.val);
        handlePrepChange(catId, val);
      });
    });
  });

  // Add new preparedness category
  const addPrepBtn = document.getElementById('add-prep-cat-btn');
  const newPrepInput = document.getElementById('new-prep-cat-input');
  if (addPrepBtn && newPrepInput) {
    function doAddPrepCat() {
      const label = newPrepInput.value.trim();
      if (!label) return;
      const exists = PREP_CATEGORIES.some(function(c) { return c.label === label; });
      if (exists) { alert('קטגוריית מוכנות בשם זה כבר קיימת'); return; }
      const newId = 'prep_' + Date.now() + '_' + Math.floor(Math.random()*1000);
      PREP_CATEGORIES.push({id: newId, label: label});
      // Initialize for all companies with default value 1
      Object.keys(state.exposure).forEach(function(tk) {
        if (!state.exposure[tk].preparedness) state.exposure[tk].preparedness = {};
        state.exposure[tk].preparedness[newId] = 1;
      });
      newPrepInput.value = '';
      render();
    }
    addPrepBtn.addEventListener('click', doAddPrepCat);
    newPrepInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') doAddPrepCat(); });
  }

  // Remove preparedness category
  document.querySelectorAll('[data-remove-prep-cat]').forEach(function(el) {
    el.addEventListener('click', function() {
      const catId = el.dataset.removePrepCat;
      const cat = PREP_CATEGORIES.find(function(c) { return c.id === catId; });
      if (!cat) return;
      const ok = confirm('להסיר את "' + cat.label + '" מקטגוריות המוכנות? הפעולה תמחק את הערכים שלה לכל החברות.');
      if (!ok) return;
      PREP_CATEGORIES = PREP_CATEGORIES.filter(function(c) { return c.id !== catId; });
      // Remove from all companies
      Object.keys(state.exposure).forEach(function(tk) {
        if (state.exposure[tk].preparedness) delete state.exposure[tk].preparedness[catId];
      });
      render();
    });
  });

  // Company date input
  const dateInput = document.getElementById('company-date-input');
  if (dateInput) {
    dateInput.addEventListener('change', function() {
      const ticker = state.selectedTicker;
      if (!state.exposure[ticker]._meta) state.exposure[ticker]._meta = {lastUpdated: todayISO(), changeLog: []};
      const oldDate = state.exposure[ticker]._meta.lastUpdated;
      const newDate = dateInput.value;
      if (oldDate === newDate) return;  // ללא שינוי - אל תרשום
      state.exposure[ticker]._meta.lastUpdated = newDate;
      state.exposure[ticker]._meta.changeLog.push({
        date: todayISO(),
        field: 'תאריך עדכון',
        oldValue: oldDate,
        newValue: newDate
      });
      render();
    });
  }

  // Toggle change log
  document.querySelectorAll('[data-action="toggle-log"]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.showCompanyLog = !state.showCompanyLog;
      render();
    });
  });

  // Save version (scenarios or sectorImpact)
  document.querySelectorAll('[data-save-version]').forEach(function(el) {
    el.addEventListener('click', function() {
      const type = el.dataset.saveVersion;  // 'scenarios' or 'sectorImpact'
      xlScheduleSave();
      const input = document.getElementById('version-name-' + type);
      const label = input ? input.value.trim() : '';
      let ver;
      if (type === 'scenarios') ver = saveScenariosVersion(label);
      else if (type === 'sectorImpact') ver = saveSectorImpactVersion(label);
      if (input) input.value = '';
      state['_show_versions_' + type] = true;
      render();
      // Optional feedback
      setTimeout(function() {
        const status = document.createElement('div');
        status.textContent = '✓ נשמרה גרסה: ' + ver.name + ' (' + ver.date + ')';
        status.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)';
        document.body.appendChild(status);
        setTimeout(function() { status.remove(); }, 2500);
      }, 50);
    });
  });

  // Toggle versions list
  document.querySelectorAll('[data-toggle-versions]').forEach(function(el) {
    el.addEventListener('click', function() {
      const type = el.dataset.toggleVersions;
      state['_show_versions_' + type] = !state['_show_versions_' + type];
      render();
    });
  });

  // Restore version
  document.querySelectorAll('[data-restore-version]').forEach(function(el) {
    el.addEventListener('click', function() {
      const parts = el.dataset.restoreVersion.split(':');
      const type = parts[0], versionId = parts[1];
      const ver = state.versions[type].find(function(v) { return v.id === versionId; });
      if (!ver) return;
      const ok = confirm('לשחזר את הגרסה "' + ver.name + '" מתאריך ' + ver.date + '?\nהשינויים הנוכחיים שלא נשמרו - יאבדו.');
      if (!ok) return;
      let success = false;
      if (type === 'scenarios') success = restoreScenariosVersion(versionId);
      else if (type === 'sectorImpact') success = restoreSectorImpactVersion(versionId);
      if (success) render();
    });
  });

  // Delete version
  document.querySelectorAll('[data-delete-version]').forEach(function(el) {
    el.addEventListener('click', function() {
      const parts = el.dataset.deleteVersion.split(':');
      const type = parts[0], versionId = parts[1];
      const ver = state.versions[type].find(function(v) { return v.id === versionId; });
      if (!ver) return;
      const ok = confirm('למחוק את הגרסה "' + ver.name + '"?');
      if (!ok) return;
      if (type === 'scenarios') deleteScenariosVersion(versionId);
      else if (type === 'sectorImpact') deleteSectorImpactVersion(versionId);
      render();
    });
  });

  // Benchmark switcher
  document.querySelectorAll('[data-bench]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.benchmarkType = el.dataset.bench;
      if (state.activeTab === 'companies_overview' && state.coOverviewMode === 'company') {
        state.ovBenchType = el.dataset.bench;
      }
      render();
    });
  });

  // Map mode toggle (Leaflet vs SVG)
  document.querySelectorAll('[data-map-mode]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.mapMode = el.dataset.mapMode;
      render();
    });
  });

  // Asset dots - simple tooltip on hover
  document.querySelectorAll('[data-asset-info]').forEach(function(el) {
    el.addEventListener('mouseenter', function(e) {
      const info = el.dataset.assetInfo;
      const wrapper = document.querySelector('.asset-map-wrapper');
      if (!wrapper) return;
      const existing = wrapper.querySelector('.asset-tooltip');
      if (existing) existing.remove();
      const rect = el.getBoundingClientRect();
      const wrapRect = wrapper.getBoundingClientRect();
      const tip = document.createElement('div');
      tip.className = 'asset-tooltip';
      tip.textContent = info;
      tip.style.left = (rect.left - wrapRect.left + rect.width/2) + 'px';
      tip.style.top  = (rect.top  - wrapRect.top) + 'px';
      wrapper.appendChild(tip);
    });
    el.addEventListener('mouseleave', function() {
      const wrapper = document.querySelector('.asset-map-wrapper');
      if (wrapper) {
        const tip = wrapper.querySelector('.asset-tooltip');
        if (tip) tip.remove();
      }
    });
  });

  // Overview filters
  const ofs = document.getElementById('ov-filter-sector');
  if (ofs) ofs.addEventListener('change', function() { state.overviewFilter.sector = ofs.value; render(); });
  const ofi = document.getElementById('ov-filter-index');
  if (ofi) ofi.addEventListener('change', function() { state.overviewFilter.index = ofi.value; render(); });
  const ofmin = document.getElementById('ov-filter-min');
  if (ofmin) ofmin.addEventListener('change', function() {
    const v = parseFloat(ofmin.value);
    state.overviewFilter.minRisk = isNaN(v) ? 0 : Math.max(0, Math.min(5, v));
    render();
  });
  const ofmax = document.getElementById('ov-filter-max');
  if (ofmax) ofmax.addEventListener('change', function() {
    const v = parseFloat(ofmax.value);
    state.overviewFilter.maxRisk = isNaN(v) ? 5 : Math.max(0, Math.min(5, v));
    render();
  });
  const orst = document.getElementById('ov-filter-reset');
  if (orst) orst.addEventListener('click', function() {
    state.overviewFilter = { sector: 'all', subSector: 'all', index: 'all', minRisk: 0, maxRisk: 5 };
    render();
  });
}

function handleSeverityChange(key, val) {
  if (key && key.indexOf('river-') === 0) {
    const riverId = key.substring(6);
    setFloodRisk(riverId, val);
    render();
    return;
  }
  if (key && key.indexOf('region-') === 0) {
    const regionId = key.substring(7);
    setRegionSeverity(state.activeScenarioId, regionId, val);
    render();
    return;
  }
  if (key === 'main-severity') {
    const old = state.scenarios[state.activeScenarioId].severity;
    if (old === val) return;
    state.scenarios[state.activeScenarioId].severity = val;
  } else if (key.indexOf('imp-') === 0) {
    const catId = key.substring(4);
    state.sectorImpact[state.activeScenarioForSector][state.activeSector][catId].impact = val;
  } else if (key.indexOf('imt-') === 0) {
    const catId = key.substring(4);
    state.sectorImpact[state.activeScenarioForSector][state.activeSector][catId].importance = val;
  } else if (key.indexOf('exp-') === 0) {
    const scenId = key.substring(4);
    if (!state.exposure[state.selectedTicker]) state.exposure[state.selectedTicker] = {};
    if (!state.exposure[state.selectedTicker][scenId]) state.exposure[state.selectedTicker][scenId] = {exposure:0,rationale:''};
    const old = state.exposure[state.selectedTicker][scenId].exposure;
    if (old === val) return;
    state.exposure[state.selectedTicker][scenId].exposure = val;  // val=0 means "use sector"
    const scen = state.scenarios[scenId];
    const oldLabel = old === 0 ? 'לפי ענף' : String(old);
    const newLabel = val === 0 ? 'לפי ענף' : String(val);
    logCompanyChange(state.selectedTicker, 'חשיפה ל' + (scen ? scen.name : scenId), oldLabel, newLabel);
  }
  xlScheduleSave();
  render();
}

/* טיפול בשינוי דירוג מוכנות (5-מצבי) - עם רישום ללוג */
function handlePrepChange(catId, val) {
  if (!state.exposure[state.selectedTicker].preparedness) {
    state.exposure[state.selectedTicker].preparedness = {};
  }
  const old = state.exposure[state.selectedTicker].preparedness[catId] || 1;
  if (old === val) return;
  state.exposure[state.selectedTicker].preparedness[catId] = val;
  const cat = PREP_CATEGORIES.find(function(c) { return c.id === catId; });
  const catLabel = cat ? cat.label : catId;
  logCompanyChange(state.selectedTicker, 'מוכנות: ' + catLabel, PREP_LABELS[old] || old, PREP_LABELS[val] || val);
  xlScheduleSave();
  render();
}

/* ===========================================================
   7. Boot
   =========================================================== */
// בדיקת זמינות Leaflet - אם הספרייה לא נטענה, חוזרים ל-SVG
if (typeof L === 'undefined') {
  state._leafletAvailable = false;
  state.mapMode = 'svg';
  console.warn('Leaflet not available - falling back to schematic SVG map');
} else {
  state._leafletAvailable = true;
}

try {
  render();
} catch (err) {
  console.error('Dashboard error:', err);
  document.body.style.background = '#fff';
  document.getElementById('root').innerHTML = '<div style="padding:40px;background:#fee2e2;border:2px solid #dc2626;border-radius:8px;font-family:Arial,sans-serif;color:#7f1d1d;direction:rtl"><b style="font-size:16px">שגיאה בטעינת הדשבורד:</b><br><br>' + err.message + '<br><br><small>' + (err.stack||'').replace(/</g,"&lt;") + '</small></div>';
}

// אתחול אחסון: במצב אתר (IndexedDB) נטען אוטומטית; אם XLSX זמין בלבד.
if (typeof XLSX !== 'undefined') {
  xlAutoStart();
} else {
  // ממתינים לטעינת ספריית ה-XLSX מה-CDN לפני אתחול האחסון
  var _xlBootTries = 0;
  var _xlBootTimer = setInterval(function(){
    if (typeof XLSX !== 'undefined') { clearInterval(_xlBootTimer); xlAutoStart(); }
    else if (++_xlBootTries > 40) { clearInterval(_xlBootTimer); xlSetStatus('error', 'ספריית ה-Excel (XLSX) לא נטענה — בדקו חיבור אינטרנט.'); }
  }, 250);
}
</script>
</body>
</html>
