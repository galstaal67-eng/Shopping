function waterTypeColor(t) {
  if (t === 'surface') return '#2563eb';
  if (t === 'desal')   return '#7c3aed';
  if (t === 'spring')  return '#0d9488';
  if (t === 'hydro')   return '#f59e0b';
  return '#64748b';
}
function waterTypeLabel(t) {
  return {surface:'מקור עילי', desal:'מתקן התפלה', spring:'מעיין', hydro:'תחנה הידרומטרית', aquifer:'אקוויפר / מי תהום'}[t] || t;
}

var _waterMap = null;
var _waterLayerGroups = {};
var _waterLayerOn = {surface:true, desal:true, spring:true, hydro:true, aquifer:true};

function waterToggleLayer(type) {
  _waterLayerOn[type] = !_waterLayerOn[type];
  var btn = document.getElementById('wl-' + type);
  if (btn) {
    var col = type === 'aquifer' ? '#0ea5e9' : waterTypeColor(type);
    btn.style.background = _waterLayerOn[type] ? col : 'white';
    btn.style.color = _waterLayerOn[type] ? 'white' : '#475569';
    btn.style.borderColor = col;
  }
  waterDrawFeatures();
}

function waterDrawFeatures() {
  if (!_waterMap) return;
  Object.keys(_waterLayerGroups).forEach(function(k) {
    try { _waterMap.removeLayer(_waterLayerGroups[k]); } catch(e) {}
  });
  _waterLayerGroups = {};
  WATER_FEATURES.forEach(function(f) {
    if (!_waterLayerOn[f.type]) return;
    if (!_waterLayerGroups[f.type]) _waterLayerGroups[f.type] = L.layerGroup();
    var tip = '<b>' + f.name + '</b><br>' + waterTypeLabel(f.type) +
              (f.info ? '<br>' + f.info : '') +
              (f.driver ? '<br>סיכון אקלים: ' + f.driver : '');
    var marker;
    if (f.type === 'aquifer') {
      var rc = mapScoreColor(f.risk);
      marker = L.circle([f.lat, f.lng], {radius: f.radius || 16000, color: rc, fillColor: rc, fillOpacity: 0.12, weight: 1.5, opacity: 0.55});
    } else {
      var col = waterTypeColor(f.type);
      var rad = f.type === 'surface' ? 8 : f.type === 'desal' ? 7 : f.type === 'spring' ? 5 : 4;
      marker = L.circleMarker([f.lat, f.lng], {radius: rad, fillColor: col, fillOpacity: 0.85, color: '#fff', weight: 1.2});
    }
    marker.bindTooltip(tip, {sticky: true, direction: 'right'});
    marker.addTo(_waterLayerGroups[f.type]);
  });
  Object.keys(_waterLayerGroups).forEach(function(k) { _waterLayerGroups[k].addTo(_waterMap); });
}

function initWaterMap() {
  var el = document.getElementById('water-map');
  if (!el) return;
  if (typeof L === 'undefined') { setTimeout(initWaterMap, 300); return; }
  // מסירים מפה קודמת אם נשארה (מונע מצב "מפה ריקה" אחרי מעבר בין טאבים)
  if (_waterMap) { try { _waterMap.remove(); } catch(e) {} _waterMap = null; }
  _waterMap = L.map('water-map', {center:[31.7,35.0], zoom:7, zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:18
  }).addTo(_waterMap);
  waterDrawFeatures();
}

/* =================================================================
   טאב הצפות — שכבות תמ״א 1/7 (פשטי הצפה, נחלים, אתרי ויסות נגר).
   מקור הנתונים: משרד החקלאות — Feature Service חי ב-ArcGIS Online.
   הנתונים נמשכים בזמן אמת (GeoJSON) לפי תיבת התצוגה הנוכחית, עם הכללה
   (generalization) לפי רמת הזום לביצועים. דורש חיבור אינטרנט.
   ================================================================= */
var FLOOD_SERVICE = 'https://services3.arcgis.com/Fqk0gVrfcnumlR5m/arcgis/rest/services/Flood_Plains/FeatureServer';
var FLOOD_OPENDATA_URL = 'https://data1-moag.opendata.arcgis.com/maps/61b18f3b2b88455f88e119ae3232f7cb/about';
var FLOOD_APP_URL = 'https://moag.maps.arcgis.com/apps/instant/basic/index.html?appid=97277b057e424fefa169385245101561';
var FLOOD_LAYERS = [
  {id:4, name:'פשט הצפה',                 kind:'poly',  color:'#2563eb', fill:'#60a5fa', on:true},
  {id:5, name:'שטח הצפה',                 kind:'poly',  color:'#1e3a8a', fill:'#1d4ed8', on:true},
  {id:3, name:'פשט הצפה לגריעה מותנית',   kind:'poly',  color:'#d97706', fill:'#fbbf24', on:false, dash:'5,4'},
  {id:2, name:'נחלים',                    kind:'line',  color:'#0ea5e9', on:true},
  {id:0, name:'אתרי ויסות נגר',           kind:'point', color:'#16a34a', on:false},
  {id:1, name:'אתרי ויסות נגר (שטח)',     kind:'poly',  color:'#15803d', fill:'#4ade80', on:false}
];
var _floodMap = null;
var _floodLayerGroups = {};
var _floodReqSeq = {};
var _floodLayerOn = {};
var _floodInFlight = 0;
var _floodRaw = {};            // GeoJSON גולמי אחרון לכל שכבה (לצביעה מחדש ללא משיכה חוזרת)
var _floodStatuses = {};       // ערכי STATUS שהתגלו בנתונים → true
var _floodStatusOff = {};      // ערכי STATUS שכובו ע"י המשתמש (מסנן לפי סטטוס תכנית)
var _floodAssetLayer = null;   // שכבת נכסי חברות על מפת ההצפות (אופציונלית)
FLOOD_LAYERS.forEach(function(c){ _floodLayerOn[c.id] = c.on; _floodReqSeq[c.id] = 0; });

/* ── מסנן לפי סטטוס תכנית ──────────────────────────────────────────
   מאפיין STATUS מגיע מנתוני ה-ArcGIS. תכונה מוצגת אם הסטטוס שלה אינו מכובה.
   תכונה ללא סטטוס מטופלת תחת המפתח '__none__'. */
function floodStatusKey(p) {
  var s = (p && (p.STATUS || p.Status || p.status));
  s = (s == null || String(s).trim() === '') ? '' : String(s).trim();
  return s;
}
function floodFeaturePasses(p) {
  var k = floodStatusKey(p);
  return !_floodStatusOff[k === '' ? '__none__' : k];
}
function floodStatusLabel(k) { return k === '__none__' ? 'ללא סטטוס' : k; }

function floodOffsetDeg(map) {
  var c = map.getCenter(), z = map.getZoom();
  var mpp = 156543.03392 * Math.cos(c.lat * Math.PI / 180) / Math.pow(2, z);
  return (mpp * 1.5) / 111320; // סובלנות ~1.5 פיקסל, במעלות
}
function floodQueryUrl(layerId, map) {
  var b = map.getBounds();
  var env = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(',');
  var params = new URLSearchParams({
    where: '1=1', outFields: '*', geometry: env, geometryType: 'esriGeometryEnvelope',
    inSR: '4326', spatialRel: 'esriSpatialRelIntersects', outSR: '4326',
    maxAllowableOffset: String(floodOffsetDeg(map)), returnGeometry: 'true', f: 'geojson'
  });
  return FLOOD_SERVICE + '/' + layerId + '/query?' + params.toString();
}
function floodUpdateLoadingUI() {
  var el = document.getElementById('flood-loading');
  if (el) el.style.display = _floodInFlight > 0 ? 'block' : 'none';
}
function floodPopup(feature, layer) {
  var p = feature.properties || {};
  var title = p.LABEL || p.NAME || p.TYPE_NAME || 'פריט';
  var rows = [];
  if (p.TYPE_NAME && p.TYPE_NAME !== title) rows.push('סוג: ' + p.TYPE_NAME);
  if (p.STATUS) rows.push('סטטוס: ' + p.STATUS);
  if (p.PL_NUMBER) rows.push('תכנית: ' + p.PL_NUMBER);
  if (p.PLAN_NAME && !p.PL_NUMBER) rows.push('תכנית: ' + p.PLAN_NAME);
  var html = '<div style="direction:rtl;font-size:12px;min-width:140px"><b>' + escapeHtml(String(title)) + '</b>';
  rows.forEach(function(r){ html += '<br>' + escapeHtml(r); });
  if (p.PL_URL && /^https?:/i.test(String(p.PL_URL))) html += '<br><a href="' + encodeURI(String(p.PL_URL)) + '" target="_blank" rel="noopener">למסמך התכנית ↗</a>';
  html += '</div>';
  layer.bindPopup(html);
  try { layer.bindTooltip(String(title), {sticky:true, direction:'top'}); } catch(e) {}
}
/* בניית שכבת Leaflet מתוך GeoJSON, תוך החלת מסנן הסטטוס הפעיל */
function floodBuildLayer(cfg, gj) {
  var opts = { onEachFeature: floodPopup, filter: function(f){ return floodFeaturePasses(f.properties || {}); } };
  if (cfg.kind === 'point') {
    opts.pointToLayer = function(f, ll){ return L.circleMarker(ll, {radius:5, fillColor:cfg.color, fillOpacity:0.85, color:'#fff', weight:1}); };
  } else if (cfg.kind === 'line') {
    opts.style = function(){ return {color:cfg.color, weight:1.6, opacity:0.9}; };
  } else {
    opts.style = function(){ return {color:cfg.color, weight:0.8, fillColor:cfg.fill, fillOpacity:0.32, dashArray:cfg.dash||null}; };
  }
  return L.geoJSON(gj, opts);
}

/* איסוף ערכי הסטטוס שהתגלו; מחזיר true אם התגלה ערך חדש (לרענון ה-UI) */
function floodCollectStatuses(gj) {
  var changed = false;
  (gj && gj.features || []).forEach(function(f){
    var k = floodStatusKey(f.properties || {});
    var key = k === '' ? '__none__' : k;
    if (!_floodStatuses[key]) { _floodStatuses[key] = true; changed = true; }
  });
  return changed;
}

function floodFetchAndDraw(cfg) {
  if (!_floodMap) return;
  var seq = ++_floodReqSeq[cfg.id];
  _floodInFlight++; floodUpdateLoadingUI();
  fetch(floodQueryUrl(cfg.id, _floodMap)).then(function(r){
    if (!r.ok) throw new Error('HTTP ' + r.status); return r.json();
  }).then(function(gj){
    _floodInFlight = Math.max(0, _floodInFlight - 1); floodUpdateLoadingUI();
    if (seq !== _floodReqSeq[cfg.id] || !_floodMap) return; // בקשה ישנה — מתעלמים
    _floodRaw[cfg.id] = gj;
    var newStatuses = floodCollectStatuses(gj);
    if (_floodLayerGroups[cfg.id]) { try { _floodMap.removeLayer(_floodLayerGroups[cfg.id]); } catch(e) {} }
    var lyr = floodBuildLayer(cfg, gj);
    _floodLayerGroups[cfg.id] = lyr;
    if (_floodLayerOn[cfg.id]) lyr.addTo(_floodMap);
    if (newStatuses) floodSyncStatusUI();
  }).catch(function(){
    _floodInFlight = Math.max(0, _floodInFlight - 1); floodUpdateLoadingUI();
    if (seq !== _floodReqSeq[cfg.id]) return;
    var el = document.getElementById('flood-error'); if (el) el.style.display = 'block';
  });
}

/* ציור מחדש של השכבות הטעונות מתוך ה-GeoJSON השמור — ללא משיכה מהרשת.
   משמש כשמשתנה מסנן הסטטוס. */
function floodRedraw() {
  if (!_floodMap) return;
  FLOOD_LAYERS.forEach(function(cfg){
    var gj = _floodRaw[cfg.id];
    if (!gj) return;
    if (_floodLayerGroups[cfg.id]) { try { _floodMap.removeLayer(_floodLayerGroups[cfg.id]); } catch(e) {} }
    var lyr = floodBuildLayer(cfg, gj);
    _floodLayerGroups[cfg.id] = lyr;
    if (_floodLayerOn[cfg.id]) lyr.addTo(_floodMap);
  });
}

/* החלפת מצב סטטוס (מוצג/מוסתר) וציור מחדש */
function floodToggleStatus(key) {
  _floodStatusOff[key] = !_floodStatusOff[key];
  var btn = document.getElementById('fs-' + key);
  if (btn) {
    var on = !_floodStatusOff[key];
    btn.style.background = on ? '#2563eb' : 'white';
    btn.style.color = on ? 'white' : '#475569';
    btn.style.opacity = on ? '1' : '0.6';
  }
  floodRedraw();
}

/* בניית רצועת מסנני הסטטוס לפי הערכים שהתגלו בנתונים */
function floodStatusFilterHtml() {
  var keys = Object.keys(_floodStatuses);
  if (!keys.length) {
    return '<div style="font-size:11px;color:#94a3b8">המסננים יופיעו לאחר טעינת נתונים (הזז/הגדל את המפה).</div>';
  }
  // מיון: ערכים אמיתיים לפי א"ב, "ללא סטטוס" אחרון
  keys.sort(function(a,b){ if(a==='__none__')return 1; if(b==='__none__')return -1; return a.localeCompare(b,'he'); });
  var h = '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  keys.forEach(function(k){
    var on = !_floodStatusOff[k];
    h += '<button id="fs-' + escapeHtml(k) + '" onclick="floodToggleStatus(\'' + escapeHtml(k).replace(/'/g,"\\'") + '\')" '
      + 'style="padding:3px 9px;border-radius:16px;border:1.5px solid #2563eb;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;'
      + 'background:' + (on?'#2563eb':'white') + ';color:' + (on?'white':'#475569') + ';opacity:' + (on?'1':'0.6') + '">'
      + escapeHtml(floodStatusLabel(k)) + '</button>';
  });
  h += '</div>';
  return h;
}

/* רענון תוכן רצועת המסננים במקום (כשמתגלים ערכי סטטוס חדשים תוך כדי טעינה) */
function floodSyncStatusUI() {
  var el = document.getElementById('flood-status-filter');
  if (el) el.innerHTML = floodStatusFilterHtml();
}
function floodReload() {
  FLOOD_LAYERS.forEach(function(c){ if (_floodLayerOn[c.id]) floodFetchAndDraw(c); });
}
function floodToggleLayer(id) {
  _floodLayerOn[id] = !_floodLayerOn[id];
  var cfg = FLOOD_LAYERS.find(function(c){ return c.id === id; });
  var btn = document.getElementById('fl-' + id);
  if (btn && cfg) {
    btn.style.background = _floodLayerOn[id] ? cfg.color : 'white';
    btn.style.color = _floodLayerOn[id] ? 'white' : '#475569';
    btn.style.borderColor = cfg.color;
  }
  if (!_floodMap || !cfg) return;
  if (_floodLayerOn[id]) {
    if (_floodLayerGroups[id]) _floodLayerGroups[id].addTo(_floodMap); else floodFetchAndDraw(cfg);
  } else if (_floodLayerGroups[id]) {
    try { _floodMap.removeLayer(_floodLayerGroups[id]); } catch(e) {}
  }
}
/* ================================================================
   הצלבת נכסי חברות מול פשטי הצפה (תמ"א 1/7) — נתונים חיים מ-ArcGIS
   לכל עיר שבה יש נכסי חברה נבדק (פעם אחת, חי) אם בסביבתה (~5 ק"מ) יש
   פשט/שטח הצפה או נחל, ומכך נגזרת חשיפת ההצפה לכל חברה לפי נכסיה.
   הבדיקה ברמת מרכז-עיר (קירוב) — הנתונים הסכמטיים אינם ברזולוציית כתובת.
   ================================================================ */
var _floodCoState = null;       // {loading, error, byCity:{}, companies:[], ts}
var FLOOD_CO_LAYERS = [ {id:4, key:'plain'}, {id:5, key:'area'}, {id:2, key:'river'} ];

function floodLevelLabel(lv){ return lv==='high'?'גבוהה':lv==='medium'?'בינונית':lv==='low'?'נמוכה':'—'; }
function floodLevelColor(lv){ return lv==='high'?'#dc2626':lv==='medium'?'#d97706':lv==='low'?'#16a34a':'#64748b'; }

function floodCountUrl(layerId, lat, lng, d) {
  var env = [lng-d, lat-d, lng+d, lat+d].join(',');
  var params = new URLSearchParams({
    where:'1=1', geometry:env, geometryType:'esriGeometryEnvelope',
    inSR:'4326', spatialRel:'esriSpatialRelIntersects', returnCountOnly:'true', f:'json'
  });
  return FLOOD_SERVICE + '/' + layerId + '/query?' + params.toString();
}

/* מפתח מיקום לאיחוד שאילתות (קירוב ~100 מ׳) */
function floodLocKey(c) { return c.lat.toFixed(3) + ',' + c.lng.toFixed(3); }

/* אוסף מיקומים ייחודיים מנכסי כל החברות בישראל (domestic) → {key:{lat,lng,precise}} */
function floodCollectAssetLocs() {
  var map = {};
  COMPANIES.forEach(function(c){
    var a = state.assets[c.ticker]; if (!a) return;
    (a.domestic||[]).forEach(function(x){
      var co = assetCoord(x); if (!co) return;
      var k = floodLocKey(co);
      // מיקום מדויק גובר על קירוב-עיר אם שניהם ממופים לאותו מפתח
      if (!map[k] || (co.precise && !map[k].precise)) map[k] = co;
    });
  });
  return map;
}

/* רמת חשיפת נכס בודד לפי תוצאת השאילתה למיקומו */
function floodAssetLevel(asset) {
  var co = assetCoord(asset); if (!co) return 'unknown';
  var i = _floodCoState && _floodCoState.byKey[floodLocKey(co)];
  if (!i) return 'unknown';
  if (i.plain > 0 || i.area > 0) return 'high';
  if (i.river > 0) return 'medium';
  return 'low';
}

function floodComputeCompanies() {
  var rows = [], byTicker = {};
  COMPANIES.forEach(function(c){
    var a = state.assets[c.ticker]; if (!a || !(a.domestic||[]).length) return;
    var dom = a.domestic, high=0, med=0, hqExposed=false, precise=false;
    dom.forEach(function(x){
      var lv = floodAssetLevel(x);
      if (lv==='high') high++; else if (lv==='medium') med++;
      var co = assetCoord(x); if (co && co.precise) precise = true;
      if (x.type==='hq' && (lv==='high'||lv==='medium')) hqExposed = true;
    });
    var n = dom.length, exposed = high+med;
    var level = high>0 ? 'high' : (med>0 ? 'medium' : 'low');
    byTicker[c.ticker] = level;
    rows.push({co:c, n:n, high:high, med:med, exposed:exposed, hqExposed:hqExposed,
               level:level, precise:precise, score:(high*2 + med)/(n*2)});
  });
  rows.sort(function(a,b){ return (b.high-a.high) || (b.exposed-a.exposed) || (b.score-a.score); });
  _floodCoState.companies = rows;
  _floodCoState.byTicker = byTicker;
}

/* מריץ מערך של יוצרי-הבטחות עם הגבלת מקביליות (כדי לא להציף את השירות) */
function floodRunJobs(makers, concurrency) {
  return new Promise(function(resolve, reject){
    var i=0, done=0, n=makers.length, failed=false;
    if (!n) return resolve();
    function next(){
      while (i < n && (i - done) < concurrency) {
        (function(job){
          job().then(function(){ done++; if (done===n) resolve(); else next(); })
               .catch(function(e){ if (!failed){ failed=true; reject(e); } });
        })(makers[i++]);
      }
    }
    next();
  });
}

function floodAnalyzeCompanies() {
  if (_floodCoState && _floodCoState.loading) return;
  var locs = floodCollectAssetLocs();
  var keys = Object.keys(locs);
  if (!keys.length) { alert('לא נמצאו נכסי חברות לניתוח.'); return; }
  _floodCoState = { loading:true, error:null, byKey:{}, byTicker:{}, companies:[], ts:Date.now() };
  floodRenderCoPanel();
  var makers = [];
  keys.forEach(function(k){
    var loc = locs[k];
    var d = loc.precise ? 0.0015 : 0.045;   // נכס אמת ~150מ׳ • קירוב-עיר ~5ק״מ
    var info = { plain:0, area:0, river:0, precise:loc.precise };
    _floodCoState.byKey[k] = info;
    FLOOD_CO_LAYERS.forEach(function(L0){
      makers.push(function(){
        return fetch(floodCountUrl(L0.id, loc.lat, loc.lng, d))
          .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
          .then(function(j){ info[L0.key] = (j && typeof j.count==='number') ? j.count : 0; });
      });
    });
  });
  floodRunJobs(makers, 8).then(function(){
    floodComputeCompanies();
    _floodCoState.loading = false;
    floodRenderCoPanel();
    if (state.includeFloodInRisk) render();              // עדכון מלא אם החשיפה משולבת במודל
    else if (_floodMap && _floodAssetLayer) floodDrawAssets();
  }).catch(function(){
    if (_floodCoState) { _floodCoState.loading = false; _floodCoState.error = 'טעינת הנתונים מ-ArcGIS נכשלה (בדקו חיבור אינטרנט).'; }
    floodRenderCoPanel();
  });
}

/* שילוב חשיפת ההצפה הגאוגרפית במודל הסיכון (אופציונלי, מחושב מראש ב-byTicker) */
function floodRiskAdj(company) {
  if (!state.includeFloodInRisk) return 0;
  if (!_floodCoState || _floodCoState.loading || !_floodCoState.byTicker) return 0;
  var lv = _floodCoState.byTicker[company.ticker];
  return lv==='high' ? 0.5 : (lv==='medium' ? 0.25 : 0);
}
function floodToggleRiskModel(checked) {
  state.includeFloodInRisk = !!checked;
  render();
}

/* ── שכבת נכסי חברות על מפת ההצפות ── */
function floodAssetColor(lv){ return lv==='unknown' ? '#475569' : floodLevelColor(lv); }
function floodToggleAssets() {
  state.floodAssetsOn = !state.floodAssetsOn;
  var btn = document.getElementById('fl-assets');
  if (btn) {
    btn.style.background = state.floodAssetsOn ? '#0f172a' : 'white';
    btn.style.color = state.floodAssetsOn ? 'white' : '#475569';
  }
  if (!_floodMap) return;
  if (state.floodAssetsOn) floodDrawAssets();
  else if (_floodAssetLayer) { try { _floodMap.removeLayer(_floodAssetLayer); } catch(e){} _floodAssetLayer = null; }
}
function floodDrawAssets() {
  if (!_floodMap || typeof L === 'undefined') return;
  if (_floodAssetLayer) { try { _floodMap.removeLayer(_floodAssetLayer); } catch(e){} _floodAssetLayer = null; }
  var group = L.layerGroup();
  COMPANIES.forEach(function(c){
    var a = state.assets[c.ticker]; if (!a) return;
    (a.domestic||[]).forEach(function(x){
      // מיקום תצוגה: קואורדינטת הנכס (אמת/דמו-מג'וטר) אם קיימת, אחרת מרכז העיר
      var lat, lng;
      if (typeof x.lat === 'number' && typeof x.lng === 'number') { lat = x.lat; lng = x.lng; }
      else { var rec = ISRAEL_CITIES.find(function(cc){ return cc.name===x.city; }); if (!rec) return;
             lat = rec.lat + (((x.y||0)%1) - 0.5) * 0.03; lng = rec.lng + (((x.x||0)%1) - 0.5) * 0.03; }
      var lv = (_floodCoState && !_floodCoState.loading) ? floodAssetLevel(x) : 'unknown';
      var ac = ASSET_TYPES[x.type] || {label:'נכס', icon:''};
      var m = L.circleMarker([lat,lng], {radius:4, fillColor:floodAssetColor(lv), fillOpacity:0.9, color:'#fff', weight:1});
      m.bindPopup('<div style="direction:rtl;font-size:12px"><b>' + escapeHtml(c.name) + '</b><br>' + escapeHtml(ac.label) + ' • ' + escapeHtml(x.city||'')
        + (x.real ? ' 📍' : '')
        + (lv!=='unknown' ? '<br>חשיפת הצפה: <b style="color:' + floodLevelColor(lv) + '">' + floodLevelLabel(lv) + '</b>' : '') + '</div>');
      group.addLayer(m);
    });
  });
  group.addTo(_floodMap);
  _floodAssetLayer = group;
}

function initFloodsMap() {
  var el = document.getElementById('floods-map');
  if (!el) return;
  if (typeof L === 'undefined') { setTimeout(initFloodsMap, 300); return; }
  if (_floodMap) { try { _floodMap.remove(); } catch(e) {} _floodMap = null; }

/* ================================================================
   PORTFOLIO ANALYSIS — ניתוח תיק לפי קובץ חברות שהמשתמש מעלה
   התאמה: מספר מנפיק -> מספר נייר (ticker) -> שם חברה
   ================================================================ */
function pfNormName(s) {
  return String(s || '')
    .replace(/["'\u05f3\u05f4.\-_,()\/\\\s]/g, '')
    .replace(/בעמ$/, '')
    .trim();
}

function pfDigits(s) { return String(s == null ? '' : s).replace(/\D/g, ''); }

function pfBuildIndex() {
  var byIssuer = {}, byTicker = {}, byName = {}, nameList = [], issuerCount = 0;
  var byIssuerD = {}, byTickerD = {};
  COMPANIES.forEach(function(c) {
    if (c.issuerNum) {
      byIssuer[String(c.issuerNum).trim()] = c; issuerCount++;
      var di = pfDigits(c.issuerNum); if (di) byIssuerD[di] = c;
    }
    if (c.ticker) {
      byTicker[String(c.ticker).trim()] = c;
      var dt = pfDigits(c.ticker); if (dt) byTickerD[dt] = c;
    }
    var n = pfNormName(c.name);
    if (n) { byName[n] = c; nameList.push({ norm: n, co: c }); }
  });
  return { byIssuer: byIssuer, byTicker: byTicker, byIssuerD: byIssuerD, byTickerD: byTickerD,
           byName: byName, nameList: nameList, issuerCount: issuerCount };
}

/* זיהוי עמודות גמיש לפי "מכיל" (ולא התאמה מדויקת) */
function pfDetectCols(rows) {
  var headers = rows.length ? Object.keys(rows[0]) : [];
  var cols = { issuer:null, sec:null, name:null, weight:null };
  headers.forEach(function(h){ var s=String(h).trim(); if(!cols.issuer && /מנפיק|issuer/i.test(s)) cols.issuer=h; });
  headers.forEach(function(h){ var s=String(h).trim(); if(!cols.sec && /נייר|ני"ע|נ\u05f4ע|סימול|security|ticker/i.test(s)) cols.sec=h; });
  headers.forEach(function(h){ var s=String(h).trim(); if(!cols.weight && /שווי|משקל|אחזק|value|weight/i.test(s)) cols.weight=h; });
  headers.forEach(function(h){ var s=String(h).trim();
    if(!cols.name && h!==cols.issuer && h!==cols.sec && h!==cols.weight && (/שם/.test(s) || /name|company/i.test(s))) cols.name=h; });
  return cols;
}

/* התאמת שם: מדויק -> אחרי הסרת סיומות -> חלקי ייחודי */
function pfMatchName(nm, idx) {
  var n = pfNormName(nm);
  if (!n) return null;
  if (idx.byName[n]) return { co: idx.byName[n], via: 'שם' };
  if (n.length >= 4) {
    var cand = idx.nameList.filter(function(o){
      return o.norm === n || o.norm.indexOf(n) === 0 || n.indexOf(o.norm) === 0;
    });
    if (cand.length === 1) return { co: cand[0].co, via: 'שם (חלקי)' };
  }
  return null;
}

/* קריאת גיליון עם זיהוי חכם של שורת הכותרות (מתמודד עם שורות מטא/כותרת למעלה) */
function pfSheetToRows(ws) {
  var aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  if (!aoa.length) return [];
  var idRe = /מנפיק|נייר|סימול|שם|חברה|ticker|issuer|name|company/i;
  var hi = -1;
  for (var i = 0; i < Math.min(aoa.length, 20); i++) {
    var row = aoa[i] || [];
    var hits = 0;
    row.forEach(function(c){ if (typeof c === 'string' && idRe.test(c)) hits++; });
    if (hits >= 1) { hi = i; break; }
  }
  if (hi < 0) hi = 0;
  var headers = (aoa[hi] || []).map(function(h){ return String(h).trim(); });
  var rows = [];
  for (var r = hi + 1; r < aoa.length; r++) {
    var arr = aoa[r] || [];
    var allEmpty = arr.every(function(v){ return v === '' || v == null; });
    if (allEmpty) continue;
    var obj = {};
    headers.forEach(function(h, j){ if (h) obj[h] = (arr[j] != null ? arr[j] : ''); });
    rows.push(obj);
  }
  return rows;
}

/* פענוח CSV עם זיהוי קידוד: UTF-8 (כולל BOM) ונפילה ל-Windows-1255 (עברית) אם UTF-8 נכשל. */
function decodeCsvBytes(arrayBuffer) {
  var bytes = new Uint8Array(arrayBuffer);
  // BOM של UTF-8
  if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
    return new TextDecoder('utf-8').decode(bytes.subarray(3));
  }
  var utf8 = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
  // תו החלפה (U+FFFD) מעיד על בייטים שאינם UTF-8 תקין — ככל הנראה Windows-1255
  if (utf8.indexOf('�') >= 0) {
    try { return new TextDecoder('windows-1255').decode(bytes); } catch (e) { return utf8; }
  }
  return utf8;
}

function handlePortfolioFile(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var isCsv = /\.csv$/i.test(file.name || '');
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      if (typeof XLSX === 'undefined') throw new Error('ספריית הקריאה (XLSX) לא נטענה — בדוק חיבור אינטרנט ורענן.');
      var wb;
      if (isCsv) {
        // CSV — מפענחים טקסט עם זיהוי קידוד עברי לפני הפרסור
        var text = decodeCsvBytes(e.target.result);
        wb = XLSX.read(text, { type: 'string', raw: false });
      } else {
        var data = new Uint8Array(e.target.result);
        wb = XLSX.read(data, { type: 'array' });
      }
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = pfSheetToRows(ws);
      ingestPortfolio(rows, file.name);
    } catch (err) {
      state.portfolio = { error: 'שגיאה בקריאת הקובץ: ' + err.message, matched: [], unmatched: [] };
      state.activeTab = 'portfolio';
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}

function ingestPortfolio(rows, fileName) {
  var idx = pfBuildIndex();
  var cols = pfDetectCols(rows);
  var matched = [], unmatched = [], hasWeights = false;
  var counts = { 'מספר מנפיק':0, 'מספר נייר':0, 'שם':0, 'שם (חלקי)':0 };
  rows.forEach(function(row) {
    function val(col){ return col ? String(row[col]==null?'':row[col]).trim() : ''; }
    var issuer = val(cols.issuer).replace(/\.0+$/, '');
    var sec    = val(cols.sec).replace(/\.0+$/, '');
    var nm     = val(cols.name);
    var issD = pfDigits(issuer), secD = pfDigits(sec);
    var w = parseFloat(val(cols.weight).replace(/[,\u20aa%\s]/g, ''));
    if (!isNaN(w) && w > 0) hasWeights = true; else w = NaN;

    var co = null, via = '';
    // 1) מספר מנפיק (מדויק ואז ספרות-בלבד)
    if (issuer && idx.byIssuer[issuer]) { co = idx.byIssuer[issuer]; via = 'מספר מנפיק'; }
    if (!co && issD && idx.byIssuerD[issD]) { co = idx.byIssuerD[issD]; via = 'מספר מנפיק'; }
    // 2) מספר נייר
    if (!co && sec && idx.byTicker[sec]) { co = idx.byTicker[sec]; via = 'מספר נייר'; }
    if (!co && secD && idx.byTickerD[secD]) { co = idx.byTickerD[secD]; via = 'מספר נייר'; }
    // 3) הצלבה: מספר המנפיק שבקובץ מול מספר הנייר במאגר ולהיפך
    if (!co && issD && idx.byTickerD[issD]) { co = idx.byTickerD[issD]; via = 'מספר נייר'; }
    if (!co && secD && idx.byIssuerD[secD]) { co = idx.byIssuerD[secD]; via = 'מספר מנפיק'; }
    // 4) שם
    if (!co && nm) { var r = pfMatchName(nm, idx); if (r) { co = r.co; via = r.via; } }

    if (co) {
      counts[via] = (counts[via]||0) + 1;
      matched.push({ co: co, weight: w, via: via, raw: rawRisk(co), fin: finalRisk(co), prep: companyPrepScore(co) });
    } else if (issuer || sec || nm) {
      unmatched.push({ issuer: issuer, sec: sec, name: nm });
    }
  });
  if (!hasWeights) matched.forEach(function(m) { m.weight = 1; });
  else matched.forEach(function(m) { if (isNaN(m.weight)) m.weight = 0; });

  state.portfolio = {
    fileName: fileName, matched: matched, unmatched: unmatched, hasWeights: hasWeights, error: null,
    cols: cols, counts: counts, dbIssuer: idx.issuerCount, rows: rows.length
  };
  state.activeTab = 'portfolio';
  render();
}

function pfClear() { state.portfolio = null; render(); }

/* ייצוא תמונת מצב התיק לקובץ Excel רב-גיליונות (הורדה, ללא תלות בקובץ המחובר). */
function pfExportXlsx() {
  var pf = state.portfolio;
  if (!pf || !pf.matched || !pf.matched.length) { alert('אין נתוני תיק לייצוא. העלו תחילה קובץ תיק והמתינו להתאמה.'); return; }
  if (typeof XLSX === 'undefined') { alert('ספריית הייצוא (XLSX) לא נטענה — בדקו חיבור לאינטרנט ורעננו.'); return; }

  var matched = pf.matched;
  var scenIds = ['warming','flood','extreme_weather','drought','sea_rise'];
  var totalW = matched.reduce(function(a,m){return a+(m.weight||0);},0) || matched.length;
  var wRisk = matched.reduce(function(a,m){return a+m.fin*(m.weight||0);},0)/totalW;
  var simpleRisk = matched.reduce(function(a,m){return a+m.fin;},0)/matched.length;
  var avgPrepP = matched.reduce(function(a,m){return a+(m.prep||0);},0)/matched.length;
  var highShareW = matched.reduce(function(a,m){return a+(m.fin>=3.5?(m.weight||0):0);},0)/totalW*100;
  var highCount = matched.filter(function(m){return m.fin>=3.5;}).length;

  var wb = XLSX.utils.book_new();
  function add(name, rows, headers) {
    var ws = XLSX.utils.json_to_sheet(rows, headers ? { header: headers } : undefined);
    if (headers) ws['!cols'] = headers.map(function(h){ return { wch: Math.max(String(h).length+3, 12) }; });
    XLSX.utils.book_append_sheet(wb, ws, name);
  }

  // 1) סיכום
  var summary = [
    {'מדד':'קובץ מקור','ערך': pf.fileName || ''},
    {'מדד':'תאריך הפקה','ערך': new Date().toLocaleString('he-IL')},
    {'מדד':'חברות שהותאמו','ערך': matched.length},
    {'מדד':'שורות שלא הותאמו','ערך': pf.unmatched.length},
    {'מדד':'שיטת חישוב','ערך': pf.hasWeights ? 'משוקלל לפי שווי/משקל' : 'משקל שווה'},
    {'מדד':'סיכון תיק ' + (pf.hasWeights?'משוקלל':'ממוצע'),'ערך': +(pf.hasWeights?wRisk:simpleRisk).toFixed(2)},
    {'מדד':'חשיפה גבוהה (≥3.5)','ערך': pf.hasWeights ? highShareW.toFixed(0)+'% מהשווי' : highCount+' חברות'},
    {'מדד':'מוכנות ממוצעת','ערך': +avgPrepP.toFixed(2)}
  ];
  if ((state.stressFactor||1) > 1) summary.push({'מדד':'מבחן עקה פעיל','ערך':'+'+Math.round((state.stressFactor-1)*100)+'% (×'+state.stressFactor.toFixed(2)+')'});
  add('סיכום', summary, ['מדד','ערך']);

  // 2) חברות בתיק (כולל ציוני תרחיש)
  var coHeaders = ['שם חברה','ticker','ענף','משקל %','סיכון שורשי','סיכון סופי','מוכנות','שיטת התאמה'];
  scenIds.forEach(function(sid){ coHeaders.push(SCEN_ID_TO_NAME[sid]||sid); });
  var coRows = matched.slice().sort(function(a,b){return (b.fin*(b.weight||0))-(a.fin*(a.weight||0));}).map(function(m){
    var row = {
      'שם חברה': m.co.name, 'ticker': m.co.ticker, 'ענף': m.co.sector||'',
      'משקל %': +((m.weight||0)/totalW*100).toFixed(2),
      'סיכון שורשי': +m.raw.toFixed(2), 'סיכון סופי': +m.fin.toFixed(2),
      'מוכנות': +m.prep.toFixed(2), 'שיטת התאמה': m.via
    };
    scenIds.forEach(function(sid){ row[SCEN_ID_TO_NAME[sid]||sid] = +companyScenarioScore(m.co, sid).toFixed(2); });
    return row;
  });
  add('חברות בתיק', coRows, coHeaders);

  // 3) פיזור ענפי
  var secMap = {};
  matched.forEach(function(m){ var s=m.co.sector||'אחר'; if(!secMap[s])secMap[s]={w:0,n:0,risk:0,wsum:0}; secMap[s].w+=(m.weight||0); secMap[s].n++; secMap[s].risk+=m.fin*(m.weight||0); secMap[s].wsum+=(m.weight||0); });
  var secRows = Object.keys(secMap).map(function(s){ var o=secMap[s]; return {
    'ענף': s, 'מספר חברות': o.n, 'משקל %': +(o.w/totalW*100).toFixed(2), 'סיכון ממוצע': +(o.risk/(o.wsum||1)).toFixed(2)
  };}).sort(function(a,b){return b['משקל %']-a['משקל %'];});
  add('פיזור ענפי', secRows, ['ענף','מספר חברות','משקל %','סיכון ממוצע']);

  // 4) פרופיל תרחישים
  var scenRows = scenIds.map(function(sid){
    var sum=0,wsum=0; matched.forEach(function(m){ var v=companyScenarioScore(m.co,sid); if(v>0){sum+=v*(m.weight||0);wsum+=(m.weight||0);} });
    return {'תרחיש': SCEN_ID_TO_NAME[sid]||sid, 'חשיפת תיק משוקללת': +(wsum>0?sum/wsum:0).toFixed(2)};
  });
  add('פרופיל תרחישים', scenRows, ['תרחיש','חשיפת תיק משוקללת']);

  // 5) שורות שלא הותאמו
  if (pf.unmatched.length) {
    add('לא הותאמו', pf.unmatched.map(function(u){ return {'שם': u.name||'', 'מספר מנפיק': u.issuer||'', 'מספר נייר': u.sec||''}; }), ['שם','מספר מנפיק','מספר נייר']);
  }

  // הורדה
  var buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  var blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var stamp = new Date().toISOString().substring(0,10);
  a.href = url;
  a.download = 'ניתוח_תיק_אקלים_' + stamp + '.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

/* דוח תיק מעוצב חד-עמודי בחלון נפרד — מותאם להדפסה ולשמירה כ-PDF. */
/* ראדר מוכנות התיק מול ממוצע השוק — SVG עצמאי לשילוב בדוח ה-PDF.
   המצולע הירוק = ממוצע מוכנות התיק (משוקלל לפי משקל) לכל קטגוריה;
   המקווקו האפור = ממוצע מוכנות כלל החברות במאגר. */
function pfPrepRadarSVG(matched) {
  var cats = PREP_CATEGORIES.slice();
  var n = cats.length;
  if (n < 3) return '';
  var totalW = matched.reduce(function(a,m){return a+(m.weight||0);},0) || matched.length;
  function pfAvg(catId){
    var s=0,w=0; matched.forEach(function(m){ var ww=(m.weight||0)||1; s+=prepValForCat(m.co,catId)*ww; w+=ww; });
    return w>0 ? s/w : 1;
  }
  function mktAvg(catId){
    var s=0,c=0; COMPANIES.forEach(function(co){ s+=prepValForCat(co,catId); c++; });
    return c>0 ? s/c : 1;
  }
  var W=320,H=280,cx=160,cy=138,maxR=98;
  function shortLabel(s){ return s.length>16 ? s.slice(0,15)+'…' : s; }
  function pt(i,val){ var a=(Math.PI/2)-(2*Math.PI*i/n); var r=(val/5)*maxR; return [cx+r*Math.cos(a), cy-r*Math.sin(a)]; }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:360px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">';
  [1,2,3,4,5].forEach(function(g){ var pts=cats.map(function(_,i){var p=pt(i,g);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '); svg+='<polygon points="'+pts+'" fill="none" stroke="#e2e8f0" stroke-width="0.8"/>'; });
  cats.forEach(function(_,i){ var p=pt(i,5); svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>'; });
  var mktPts=cats.map(function(cat,i){ var p=pt(i, mktAvg(cat.id)); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
  svg+='<polygon points="'+mktPts+'" fill="#64748b" fill-opacity="0.10" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>';
  var pfPts=cats.map(function(cat,i){ var p=pt(i, pfAvg(cat.id)); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
  svg+='<polygon points="'+pfPts+'" fill="#16a34a" fill-opacity="0.18" stroke="#16a34a" stroke-width="2"/>';
  cats.forEach(function(cat,i){ var p=pt(i,6.0); var anchor=(Math.abs(p[0]-cx)<12)?'middle':(p[0]>cx?'start':'end'); svg+='<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" text-anchor="'+anchor+'" font-size="9" fill="#475569" font-family="Arial,Heebo,sans-serif">'+escapeHtml(shortLabel(prepLabelFor(cat)))+'</text>'; });
  svg+='</svg>';
  svg+='<div style="display:flex;gap:14px;font-size:11px;color:#64748b;margin-top:6px;justify-content:center">';
  svg+='<span><span style="display:inline-block;width:16px;height:2px;background:#16a34a;vertical-align:middle;margin-left:4px"></span>מוכנות התיק</span>';
  svg+='<span><span style="display:inline-block;width:16px;border-top:2px dashed #64748b;vertical-align:middle;margin-left:4px"></span>ממוצע השוק</span>';
  svg+='</div>';
  // טבלת פערים
  var tbl='<table style="margin-top:8px"><thead><tr><th>קטגוריית מוכנות</th><th style="text-align:center">התיק</th><th style="text-align:center">השוק</th><th style="text-align:center">פער</th></tr></thead><tbody>';
  cats.forEach(function(cat){
    var pv=pfAvg(cat.id), mv=mktAvg(cat.id), d=pv-mv;
    var dCol=d>0.05?'#16a34a':(d<-0.05?'#dc2626':'#94a3b8'); var arrow=d>0.05?'▲':(d<-0.05?'▼':'•');
    tbl+='<tr><td style="padding:4px 6px">'+escapeHtml(prepLabelFor(cat))+'</td>'
      +'<td style="padding:4px 6px;text-align:center;font-weight:700">'+pv.toFixed(2)+'</td>'
      +'<td style="padding:4px 6px;text-align:center;color:#475569">'+mv.toFixed(2)+'</td>'
      +'<td style="padding:4px 6px;text-align:center;font-weight:700;color:'+dCol+'">'+arrow+' '+Math.abs(d).toFixed(2)+'</td></tr>';
  });
  tbl+='</tbody></table>';
  return '<div class="two"><div style="min-width:300px">'+svg+'</div><div style="min-width:300px">'+tbl
    +'<div class="muted" style="margin-top:6px">פער חיובי (ירוק) = התיק מוכן יותר מממוצע השוק; שלילי (אדום) = פיגור.</div></div></div>';
}

  doc += '<table><thead><tr><th>ענף</th><th style="text-align:center">חברות</th><th style="text-align:center">משקל</th><th style="text-align:center">סיכון</th></tr></thead><tbody>';
  secArr.forEach(function(o){ doc += '<tr><td style="padding:4px 6px">'+esc(o.s)+'</td><td style="padding:4px 6px;text-align:center">'+o.n+'</td><td style="padding:4px 6px;text-align:center">'+o.pct.toFixed(1)+'%</td><td style="padding:4px 6px;text-align:center"><b style="color:'+mapScoreColor(o.risk)+'">'+o.risk.toFixed(2)+'</b></td></tr>'; });
  doc += '</tbody></table></div>';
  doc += '</div>';
  var prepRadar = pfPrepRadarSVG(matched);
  if (prepRadar) { doc += '<h2>מוכנות התיק לפי קטגוריה — מול ממוצע השוק</h2>' + prepRadar; }
  doc += '<h2>תורמי הסיכון המרכזיים'+(sorted.length>15?' (15 מובילים מתוך '+matched.length+')':'')+'</h2>';
  doc += '<table><thead><tr><th>חברה</th><th>ענף</th>'+(pf.hasWeights?'<th style="text-align:center">משקל</th>':'')+'<th style="text-align:center">סיכון שורשי</th><th style="text-align:center">סיכון סופי</th><th style="text-align:center">מוכנות</th></tr></thead><tbody>'+rowsHtml+'</tbody></table>';
  if (pf.unmatched.length) doc += '<div class="muted" style="margin-top:12px">⚠️ '+pf.unmatched.length+' שורות לא הותאמו למאגר ואינן נכללות בניתוח.</div>';
  doc += '<div class="muted" style="margin-top:18px;border-top:1px solid #e2e8f0;padding-top:8px">דשבורד סיכוני אקלים • הנתונים מהווים דוגמה/אומדן בלבד ואינם ייעוץ השקעות.</div>';
  doc += '</body></html>';

  var w = window.open('', '_blank');
  if (!w) { alert('חלון הדוח נחסם. אפשרו חלונות קופצים (pop-ups) עבור עמוד זה ונסו שוב.'); return; }
  w.document.open(); w.document.write(doc); w.document.close();
}

  var pf = state.portfolio;

  // ── כרטיס העלאה ──
  html += '<div class="card" style="direction:rtl">';
  html += '<div class="card-title-row" style="margin-bottom:6px"><span class="card-icon">💼</span><div><h2 style="margin-bottom:2px">ניתוח תיק — סיכון אקלים</h2>';
  html += '<div style="font-size:12px;color:#64748b">העלו קובץ Excel עם רשימת החברות בתיק, וקבלו תמונת מצב של חשיפת התיק לסיכוני אקלים.</div></div></div>';
  html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px">';
  html += '<label for="pf-file" style="display:inline-block;background:#2563eb;color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:8px;cursor:pointer">📁 בחר קובץ Excel</label>';
  html += '<input type="file" id="pf-file" accept=".xlsx,.xls,.csv" onchange="handlePortfolioFile(this)" style="display:none">';
  if (pf && pf.fileName) html += '<span style="font-size:12px;color:#475569">קובץ נטען: <b>' + escapeHtml(pf.fileName) + '</b></span>';
  if (pf) html += '<button onclick="pfClear()" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer">נקה</button>';
  html += '</div>';
  html += '<div style="font-size:11px;color:#94a3b8;margin-top:10px;line-height:1.6">הקובץ צריך לכלול עמודת זיהוי אחת לפחות: <b>מספר מנפיק</b> (מומלץ), <b>מספר נייר</b>, או <b>שם חברה</b>. אופציונלי: עמודת <b>שווי</b>/<b>משקל</b> לחישוב משוקלל. ההתאמה: מספר מנפיק ← מספר נייר ← שם.</div>';
  html += '</div>';

  if (pf && pf.error) {
    html += '<div class="card" style="direction:rtl;border:1px solid #fecaca;background:#fef2f2;color:#991b1b;margin-top:14px">' + escapeHtml(pf.error) + '</div>';
    return html;
  }

  // ── אבחון התאמה ──
  if (pf && pf.cols) {
    var c = pf.cols, cnt = pf.counts || {};
    var nameTot = (cnt['שם']||0) + (cnt['שם (חלקי)']||0);
    html += '<div class="card" style="direction:rtl;margin-top:12px;font-size:12px;color:#475569">';
    html += '<div style="font-weight:700;margin-bottom:6px">🔎 אבחון התאמה</div>';
    html += '<div>עמודות שזוהו בקובץ: '
      + 'מספר מנפיק=' + (c.issuer?'<b>"'+escapeHtml(c.issuer)+'"</b>':'—') + ' • '
      + 'מספר נייר=' + (c.sec?'<b>"'+escapeHtml(c.sec)+'"</b>':'—') + ' • '
      + 'שם=' + (c.name?'<b>"'+escapeHtml(c.name)+'"</b>':'—') + ' • '
      + 'שווי/משקל=' + (c.weight?'<b>"'+escapeHtml(c.weight)+'"</b>':'—') + '</div>';
    html += '<div style="margin-top:4px">שורות בקובץ: <b>' + pf.rows + '</b> • הותאמו: <b>' + pf.matched.length + '</b> '
      + '(מנפיק ' + (cnt['מספר מנפיק']||0) + ' • נייר ' + (cnt['מספר נייר']||0) + ' • שם ' + nameTot + ')</div>';
    if (pf.dbIssuer === 0) {
      html += '<div style="margin-top:8px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:7px 9px;line-height:1.5">⚠️ מאגר החברות עדיין ללא מספרי מנפיק — לכן אי אפשר להתאים לפי מספר מנפיק. מלא את עמודת <b>"מספר מנפיק"</b> בגיליון "חברות" ושמור, או ודא שבקובץ התיק יש עמודת <b>מספר נייר</b>. בינתיים ההתאמה מתבצעת לפי שם.</div>';
    }
    if (!c.issuer && !c.sec && !c.name) {
      html += '<div style="margin-top:8px;color:#991b1b;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:7px 9px">לא זוהתה אף עמודת זיהוי בקובץ. ודא שיש כותרת שמכילה "מנפיק", "נייר", או "שם".</div>';
    }
    html += '</div>';
  }

  if (!pf || !pf.matched || !pf.matched.length) {
    if (pf && pf.unmatched && pf.unmatched.length) {
      html += '<div class="card" style="direction:rtl;margin-top:14px"><h3>לא נמצאו התאמות</h3><div style="font-size:12px;color:#64748b">אף שורה בקובץ לא הותאמה למאגר. ודאו שקיימת עמודת מספר מנפיק / מספר נייר / שם חברה תקינה.</div></div>';
    }
    return html;
  }

  // ── מבחן עקה ברמת תיק + גוף מתעדכן ──
  html += renderStressControl('portfolio');
  html += '<div id="portfolio-body">' + renderPortfolioBody() + '</div>';
  return html;
}

/* גוף ניתוח התיק — KPI, התפלגויות, טבלת תורמי סיכון. מחושב מחדש מ-state בכל רינדור,
   כולל stressFactor, כך שסליידר העקה משפיע על כל ציוני התיק בזמן אמת. */
function renderPortfolioBody() {
  var pf = state.portfolio;
  if (!pf || !pf.matched || !pf.matched.length) return '';
  var html = '';

  // ── חישובים מצרפיים ──
  var matched = pf.matched;
  // חישוב מחדש של סיכון שורשי/סופי לפי מצב העקה הנוכחי (rawRisk/finalRisk קוראים את stressFactor)
  matched.forEach(function(m){ m.raw = rawRisk(m.co); m.fin = finalRisk(m.co); });
  var totalW = matched.reduce(function(a, m) { return a + (m.weight || 0); }, 0) || matched.length;
  var wRisk = matched.reduce(function(a, m) { return a + m.fin * (m.weight || 0); }, 0) / totalW;
  var simpleRisk = matched.reduce(function(a, m) { return a + m.fin; }, 0) / matched.length;
  var avgPrepP = matched.reduce(function(a, m) { return a + (m.prep || 0); }, 0) / matched.length;
  var highShareW = matched.reduce(function(a, m) { return a + (m.fin >= 3.5 ? (m.weight || 0) : 0); }, 0) / totalW * 100;
  var highCount = matched.filter(function(m) { return m.fin >= 3.5; }).length;

  // ── סרגל ייצוא תמונת מצב ──
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px;direction:rtl">';
  html += '<button onclick="pfExportXlsx()" style="background:#16a34a;color:#fff;font-weight:700;font-size:13px;padding:9px 16px;border:none;border-radius:8px;cursor:pointer">📥 ייצוא תמונת מצב (Excel)</button>';
  html += '<button onclick="pfPrintReport()" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;font-weight:700;font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer">🖨️ דוח להדפסה / PDF</button>';
  html += '<span style="font-size:11px;color:#94a3b8">ייצוא דוח Excel רב-גיליונות: סיכום, חברות התיק, פיזור ענפי ופרופיל תרחישים.</span>';
  html += '</div>';

  // ── KPI ──
  html += '<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:16px 0;direction:rtl">';
  html += '<div class="kpi-card"><div class="label">חברות שהותאמו</div><div class="value">' + matched.length + (pf.unmatched.length ? ' <span style="font-size:12px;color:#dc2626">(' + pf.unmatched.length + ' לא הותאמו)</span>' : '') + '</div><div class="sub">מתוך הקובץ שהועלה</div></div>';
  html += '<div class="kpi-card"><div class="label">סיכון תיק ' + (pf.hasWeights ? 'משוקלל' : 'ממוצע') + '</div><div class="value" style="color:' + mapScoreColor(pf.hasWeights ? wRisk : simpleRisk) + '">' + (pf.hasWeights ? wRisk : simpleRisk).toFixed(2) + '</div><div class="sub">' + (pf.hasWeights ? 'לפי שווי/משקל' : 'משקל שווה') + ' • סקאלה 1–5</div></div>';
  html += '<div class="kpi-card"><div class="label">חשיפה גבוהה (≥3.5)</div><div class="value" style="color:#dc2626">' + (pf.hasWeights ? highShareW.toFixed(0) + '%' : highCount) + '</div><div class="sub">' + (pf.hasWeights ? 'מהשווי בתיק' : highCount + ' חברות') + '</div></div>';
  html += '<div class="kpi-card"><div class="label">מוכנות ממוצעת</div><div class="value">' + avgPrepP.toFixed(2) + '</div><div class="sub">בשלות חברות התיק (1–5)</div></div>';
  html += '</div>';

  // ── שתי עמודות: התפלגויות ──
  html += '<div class="grid grid-12" style="gap:16px">';

  // התפלגות סיכון
  var bands = [{lo:1,hi:2,l:'נמוך (1–2)'},{lo:2,hi:3,l:'בינוני-נמוך (2–3)'},{lo:3,hi:3.5,l:'בינוני (3–3.5)'},{lo:3.5,hi:4,l:'גבוה (3.5–4)'},{lo:4,hi:5.01,l:'גבוה מאוד (4+)'}];
  html += '<div class="card col-6" style="min-width:0"><h3 style="font-size:13px">התפלגות סיכון בתיק</h3>';
  var maxBand = 1;
  var bandCounts = bands.map(function(b){ var c=matched.filter(function(m){return m.fin>=b.lo && m.fin<b.hi;}).length; if(c>maxBand)maxBand=c; return c; });
  bands.forEach(function(b,i){
    var c=bandCounts[i];
    var col=mapScoreColor((b.lo+b.hi)/2);
    html += '<div style="margin:8px 0;direction:rtl"><div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:3px"><span>'+b.l+'</span><span style="font-weight:700">'+c+'</span></div>';
    html += '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden"><div style="height:100%;width:'+(c/maxBand*100).toFixed(1)+'%;background:'+col+';border-radius:5px"></div></div></div>';
  });
  html += '</div>';

  // פרופיל תרחישים
  var scenIds=['warming','flood','extreme_weather','drought','sea_rise'];
  html += '<div class="card col-6" style="min-width:0"><h3 style="font-size:13px">פרופיל חשיפת התיק לפי תרחיש</h3>';
  scenIds.forEach(function(sid){
    var sum=0,wsum=0;
    matched.forEach(function(m){ var v=companyScenarioScore(m.co,sid); if(v>0){ sum+=v*(m.weight||0); wsum+=(m.weight||0); } });
    var val=wsum>0?sum/wsum:0;
    var col=mapScoreColor(val);
    var label=SCEN_ID_TO_NAME[sid]||sid;
    html += '<div style="margin:8px 0;direction:rtl"><div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:3px"><span>'+escapeHtml(label)+'</span><span style="font-weight:700">'+val.toFixed(2)+'</span></div>';
    html += '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden"><div style="height:100%;width:'+(val/5*100).toFixed(1)+'%;background:'+col+';border-radius:5px"></div></div></div>';
  });
  html += '</div>';

  // פיזור ענפי
  var secMap={};
  matched.forEach(function(m){ var s=m.co.sector||'אחר'; secMap[s]=(secMap[s]||0)+(m.weight||0); });
  var secArr=Object.keys(secMap).map(function(s){return {s:s,w:secMap[s]};}).sort(function(a,b){return b.w-a.w;});
  html += '<div class="card col-12" style="min-width:0"><h3 style="font-size:13px">פיזור התיק לפי ענף ('+(pf.hasWeights?'לפי שווי':'לפי מספר חברות')+')</h3>';
  var maxSec=secArr.length?secArr[0].w:1;
  secArr.forEach(function(o){
    var pct=(o.w/totalW*100);
    var secMatched=matched.filter(function(m){return (m.co.sector||'אחר')===o.s;});
    var secRisk=secMatched.reduce(function(a,m){return a+m.fin*(m.weight||0);},0)/(secMatched.reduce(function(a,m){return a+(m.weight||0);},0)||1);
    var col=mapScoreColor(secRisk);
    html += '<div style="margin:7px 0;direction:rtl"><div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:3px"><span>'+escapeHtml(o.s)+' <span style="color:#94a3b8">('+secMatched.length+' • סיכון '+secRisk.toFixed(1)+')</span></span><span style="font-weight:700">'+pct.toFixed(1)+'%</span></div>';
    html += '<div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden"><div style="height:100%;width:'+(o.w/maxSec*100).toFixed(1)+'%;background:'+col+';border-radius:5px"></div></div></div>';
  });
  html += '</div>';

  html += '</div>'; // grid

  // ── טבלת תורמי סיכון ──
  var sorted = matched.slice().sort(function(a,b){ return (b.fin*(b.weight||0)) - (a.fin*(a.weight||0)); });
  html += '<div class="card" style="direction:rtl;margin-top:16px"><h3 style="font-size:13px">תורמי הסיכון המרכזיים בתיק</h3>';
  html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">';
  html += '<thead><tr style="text-align:right;color:#64748b;border-bottom:1px solid #e2e8f0">';
  html += '<th style="padding:6px">חברה</th><th style="padding:6px">ענף</th>'+(pf.hasWeights?'<th style="padding:6px">משקל</th>':'')+'<th style="padding:6px">סיכון שורשי</th><th style="padding:6px">סיכון סופי</th><th style="padding:6px">מוכנות</th><th style="padding:6px">התאמה</th></tr></thead><tbody>';
  sorted.slice(0,25).forEach(function(m){
    var col=mapScoreColor(m.fin);
    html += '<tr style="border-bottom:1px solid #f1f5f9">';
    html += '<td style="padding:6px;font-weight:600;color:#0f172a">'+escapeHtml(m.co.name)+'</td>';
    html += '<td style="padding:6px;color:#475569">'+escapeHtml(m.co.sector||'')+'</td>';
    if(pf.hasWeights) html += '<td style="padding:6px;color:#475569">'+(m.weight/totalW*100).toFixed(1)+'%</td>';
    html += '<td style="padding:6px;color:#94a3b8">'+m.raw.toFixed(2)+'</td>';
    html += '<td style="padding:6px"><span style="background:'+col+';color:#fff;font-weight:700;padding:2px 8px;border-radius:5px">'+m.fin.toFixed(2)+'</span></td>';
    html += '<td style="padding:6px;color:#475569">'+m.prep.toFixed(2)+'</td>';
    html += '<td style="padding:6px;color:#94a3b8;font-size:10px">'+escapeHtml(m.via)+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  if (sorted.length>25) html += '<div style="font-size:10px;color:#94a3b8;margin-top:6px">מוצגות 25 החברות בעלות תרומת הסיכון הגבוהה ביותר (מתוך '+matched.length+').</div>';
  html += '</div>';

  // ── רשימת לא-מותאמות ──
  if (pf.unmatched.length) {
    html += '<div class="card" style="direction:rtl;margin-top:16px;border:1px solid #fed7aa;background:#fffbeb"><h3 style="font-size:13px;color:#92400e">⚠️ שורות שלא הותאמו ('+pf.unmatched.length+')</h3>';
    html += '<div style="font-size:11px;color:#78350f;margin-bottom:8px">החברות הבאות לא נמצאו במאגר (מספר מנפיק/נייר שגוי, חברה לא ציבורית, או שם שאינו תואם). מילוי עמודת "מספר מנפיק" במאגר ישפר את ההתאמה.</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    pf.unmatched.slice(0,60).forEach(function(u){
      var lbl=u.name||u.issuer||u.sec;
      html += '<span style="background:#fff;border:1px solid #fde68a;border-radius:6px;padding:3px 8px;font-size:11px;color:#92400e">'+escapeHtml(lbl)+'</span>';
    });
    html += '</div></div>';
  }

  return html;
}

function renderOverviewMarket() {
  const f = state.overviewFilter;
  const baseFiltered = COMPANIES.filter(function(c) {
    if (f.sector !== 'all' && c.sector !== f.sector) return false;
    if (f.subSector !== 'all' && c.subSector !== f.subSector) return false;
    if (f.index !== 'all' && c.index !== f.index) return false;
    return true;
  });
  const filterActive = f.sector !== 'all' || f.subSector !== 'all' || f.index !== 'all';

  // ── Row 1: sector buttons ──
  let html = '<div style="margin-bottom:10px">';
  html += '<div class="sector-btn-row">';
  html += '<button class="sector-btn all-btn' + (f.sector==='all'?' active':'') + '" data-sector-idx="-1">כל הענפים</button>';
  SECTORS.forEach(function(s,idx) {
    html += '<button class="sector-btn' + (f.sector===s?' active':'') + '" data-sector-idx="' + idx + '">' + escapeHtml(s) + '</button>';
  });
  html += '</div></div>';

  // ── Row 2: sub-sector pills (only if sector selected) + index + reset ──
  html += '<div class="ov-filters" style="margin-bottom:16px">';
  if (f.sector !== 'all' && SECTOR_TAXONOMY[f.sector]) {
    html += '<div class="group" style="flex-basis:100%"><label>תת-ענף</label><div style="display:flex;flex-wrap:wrap;gap:5px">';
    html += '<button class="sector-btn all-btn' + (f.subSector==='all'?' active':'') + '" style="flex:none;border-radius:6px" data-subsector-idx="-1">הכל</button>';
    SECTOR_TAXONOMY[f.sector].forEach(function(ss,idx){
      html += '<button class="sector-btn' + (f.subSector===ss?' active':'') + '" style="flex:none;border-radius:6px" data-subsector-idx="' + idx + '" data-subsector-sector="' + escapeHtml(f.sector) + '">' + escapeHtml(ss) + '</button>';
    });
    html += '</div></div>';
  }
  html += '<div class="group"><label>מדד</label><select id="ov-filter-index"><option value="all">כל המדדים</option>';
  INDICES.forEach(function(i) { html += '<option value="' + escapeHtml(i) + '"' + (f.index===i?' selected':'') + '>' + escapeHtml(i) + '</option>'; });
  html += '</select></div>';
  html += '<div class="group"><label>תוצאות</label><div style="font-size:18px;font-weight:700;padding:7px 0">' + baseFiltered.length + ' חברות</div></div>';
  html += '<button class="btn-reset" id="ov-filter-reset">איפוס</button>';
  html += '</div>';

  // ── סליידר מבחן עקה (stress test) ──
  html += renderStressControl();

  // ── גוף מתעדכן (KPI + גרפים) — מתרענן בזמן אמת בעת הזזת סליידר העקה ──
  html += '<div id="market-body">' + renderMarketBody() + '</div>';
  return html;
}

/* קבוצת החברות הפעילה לפי הסינון הנוכחי (משותף לרינדור ולעדכון העקה החי) */
function marketUsedSet() {
  const f = state.overviewFilter;
  const baseFiltered = COMPANIES.filter(function(c) {
    if (f.sector !== 'all' && c.sector !== f.sector) return false;
    if (f.subSector !== 'all' && c.subSector !== f.subSector) return false;
    if (f.index !== 'all' && c.index !== f.index) return false;
    return true;
  });
  const filterActive = f.sector !== 'all' || f.subSector !== 'all' || f.index !== 'all';
  return filterActive ? baseFiltered : COMPANIES;
}

/* גוף תצוגת השוק: KPI + שלושת הגרפים. מחושב מחדש מ-state (כולל stressFactor). */
function renderMarketBody() {
  const usedSet = marketUsedSet();
  if (usedSet.length === 0) {
    return '<div class="card" style="text-align:center;padding:60px 20px;color:#64748b"><div style="font-size:42px">🔍</div><div style="font-size:16px;font-weight:600">אין חברות התואמות לסינון</div></div>';
  }

  const sectorStats = {};
  SECTORS.forEach(function(s){ sectorStats[s]={name:s,total:0,count:0}; });
  usedSet.forEach(function(c){ const sc=finalRisk(c); if(sectorStats[c.sector]){sectorStats[c.sector].total+=sc;sectorStats[c.sector].count++;} });
  const sectorArr = Object.values(sectorStats).filter(function(s){return s.count>0;}).map(function(s){
    return {name:s.name,avgRisk:+(s.total/s.count).toFixed(2),count:s.count};
  }).sort(function(a,b){return b.avgRisk-a.avgRisk;});

  const avgRisk = usedSet.reduce(function(a,c){return a+finalRisk(c);},0)/usedSet.length;
  const highRiskCount = usedSet.filter(function(c){return finalRisk(c)>=3.5;}).length;
  const avgSeverity = Object.values(state.scenarios).reduce(function(a,s){return a+s.severity;},0)/Object.keys(state.scenarios).length;

  // KPIs
  let html = '<div class="grid grid-4 mb-4">';
  html += '<div class="kpi-card"><div class="label">דירוג סיכון ממוצע</div><div class="value" style="color:' + severityColor(Math.round(avgRisk)) + '">' + avgRisk.toFixed(2) + '</div><div class="sub">מתוך 5.0 • ' + usedSet.length + ' חברות</div></div>';
  html += '<div class="kpi-card"><div class="label">חברות בסיכון גבוה</div><div class="value" style="color:#dc2626">' + highRiskCount + '</div><div class="sub">דירוג ≥ 3.5</div></div>';
  html += '<div class="kpi-card"><div class="label">תרחישים פעילים</div><div class="value">' + Object.keys(state.scenarios).length + '</div><div class="sub">חומרה ממוצעת: ' + avgSeverity.toFixed(1) + '</div></div>';
  html += '<div class="kpi-card"><div class="label">ענפים מנותחים</div><div class="value">' + sectorArr.length + '</div><div class="sub">' + (sectorArr.length>0?'בסיכון הגבוה: '+escapeHtml(sectorArr[0].name):'-') + '</div></div>';
  html += '</div>';

  html += '<div class="grid grid-12" style="gap:16px">';
  html += renderChart1_RiskVsPrep(usedSet);
  html += renderChart3_BubbleSector(sectorArr);
  html += renderChart_HeatmapSecScen();
  html += '</div>';
  return html;
}

/* כרטיס בקרת מבחן עקה — מגביר את חומרת כל התרחישים ומעדכן KPI/גרפים בזמן אמת.
   target: 'market' (ברירת מחדל) או 'portfolio' — קובע איזה גוף מתרענן בגרירה. */
function renderStressControl(target) {
  target = target || 'market';
  const pct = Math.round(((state.stressFactor || 1) - 1) * 100);
  const active = pct > 0;
  const desc = target === 'portfolio'
    ? 'הגברת חומרת תרחישי האקלים לבחינת עמידות התיק תחת תנאי קיצון — סיכון התיק, ה-KPI, התפלגות הסיכון ופרופיל התרחישים מתעדכנים בזמן אמת (נב"ת 345, ניתוח תרחישים ברמת תיק).'
    : 'הגברת חומרת תרחישי האקלים לבחינת עמידות התיק תחת תנאי קיצון — בהתאם לדרישת ניתוח התרחישים של נב"ת 345.';
  let html = '<div class="card" style="direction:rtl;margin-bottom:16px;border:1px solid ' + (active ? '#fdba74' : '#e2e8f0') + ';background:' + (active ? '#fff7ed' : '#fff') + '">';
  html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between">';
  html += '<div style="min-width:0"><div style="font-size:14px;font-weight:800;color:#0f172a">🧪 מבחן עקה (Stress Test)</div>';
  html += '<div style="font-size:11px;color:#64748b">' + desc + '</div></div>';
  html += '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">';
  html += '<span style="font-size:11px;color:#64748b">עוצמת עקה</span>';
  html += '<span id="stress-val" style="font-size:20px;font-weight:800;min-width:62px;text-align:center;color:' + (active ? '#ea580c' : '#475569') + '">+' + pct + '%</span>';
  html += '<button onclick="stressReset()" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer">איפוס</button>';
  html += '</div>';
  html += '</div>';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-top:12px">';
  html += '<span style="font-size:11px;color:#94a3b8;flex-shrink:0">בסיס</span>';
  html += '<input type="range" min="0" max="100" step="5" value="' + pct + '" oninput="stressOnInput(this,\'' + target + '\')" onchange="stressOnChange(this)" style="flex:1;accent-color:#ea580c;cursor:pointer">';
  html += '<span style="font-size:11px;color:#94a3b8;flex-shrink:0">קיצון (+100%)</span>';
  html += '</div>';
  html += '<div id="stress-banner" style="display:' + (active ? 'flex' : 'none') + ';align-items:center;gap:6px;margin-top:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:7px;padding:7px 10px;font-size:11px;color:#991b1b">⚠️ <b>מצב מבחן עקה פעיל</b> — כל ציוני הסיכון, מפת החום וה-KPI משקפים תרחיש קיצון מוגבר (×' + (state.stressFactor || 1).toFixed(2) + '), ולא את הבסיס.</div>';
  html += '</div>';
  return html;
}

/* עדכון חי תוך כדי גרירת הסליידר — מרענן רק את גוף הטאב הרלוונטי (ללא רינדור מלא, לגרירה חלקה). */
function stressOnInput(el, target) {
  const pct = +el.value || 0;
  state.stressFactor = 1 + pct / 100;
  const valEl = document.getElementById('stress-val');
  if (valEl) { valEl.textContent = '+' + pct + '%'; valEl.style.color = pct > 0 ? '#ea580c' : '#475569'; }
  const banner = document.getElementById('stress-banner');
  if (banner) { banner.style.display = pct > 0 ? 'flex' : 'none'; banner.innerHTML = '⚠️ <b>מצב מבחן עקה פעיל</b> — כל ציוני הסיכון, מפת החום וה-KPI משקפים תרחיש קיצון מוגבר (×' + state.stressFactor.toFixed(2) + '), ולא את הבסיס.'; }
  if (target === 'portfolio') {
    const pbody = document.getElementById('portfolio-body');
    if (pbody) pbody.innerHTML = renderPortfolioBody();
  } else {
    const body = document.getElementById('market-body');
    if (body) body.innerHTML = renderMarketBody();
  }
}

/* בסיום הגרירה — רינדור מלא לחיבור מחדש של מאזינים וסנכרון מחוון הכותרת. */
function stressOnChange(el) {
  state.stressFactor = 1 + (+el.value || 0) / 100;
  render();
}

function stressReset() {
  state.stressFactor = 1;
  render();
}

/* ── Gauge SVG ── */
function renderGauge(score) {
  var W=160,H=100,cx=80,cy=88,r=62;
  var startAngle=Math.PI, endAngle=0;
  var angle=Math.PI - (score/5)*Math.PI;
  var x=cx+r*Math.cos(angle), y=cy-r*Math.sin(angle);

  function arc(a1,a2,col) {
    var x1=cx+r*Math.cos(a1),y1=cy-r*Math.sin(a1);
    var x2=cx+r*Math.cos(a2),y2=cy-r*Math.sin(a2);
    return '<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 0 1 '+x2+' '+y2+'" stroke="'+col+'" stroke-width="12" fill="none" stroke-linecap="round"/>';
  }

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:160px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">';
  // background arc
  svg+=arc(Math.PI,0,'#f1f5f9');
  // colored segments
  var segs=[[0,0.2,'#22c55e'],[0.2,0.4,'#84cc16'],[0.4,0.6,'#eab308'],[0.6,0.8,'#f97316'],[0.8,1,'#ef4444']];
  segs.forEach(function(s){
    svg+=arc(Math.PI*(1-s[1]),Math.PI*(1-s[0]),s[2]);
  });
  // needle
  svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#1e293b"/>';
  // labels
  svg+='<text x="18" y="'+(cy+14)+'" font-size="9" fill="#64748b" font-family="Arial">1</text>';
  svg+='<text x="'+(W-22)+'" y="'+(cy+14)+'" font-size="9" fill="#64748b" font-family="Arial">5</text>';
  svg+='</svg>';

  svg+='<div class="gauge-value" style="color:'+severityColor(Math.round(score))+'">'+score.toFixed(2)+'</div>';
  svg+='<div class="gauge-label">'+severityLabel(Math.round(score))+'</div>';
  return '<div class="gauge-wrap">'+svg+'</div>';
}

/* ── Radar SVG ── */
function renderRadar(co, sectorCos) {
  var scenIds=['warming','flood','extreme_weather','drought','sea_rise'];
  var scenLabels={warming:'התחממות',flood:'שיטפונות',extreme_weather:'קיצוני',drought:'בצורת',sea_rise:'מפלס ים'};
  var scenIcons={warming:'🌡️',flood:'🌊',extreme_weather:'🌪️',drought:'🏜️',sea_rise:'🌊'};
  var W=260,H=220,cx=130,cy=110,maxR=80;
  var n=scenIds.length;

  function pt(i,val) {
    var a=(Math.PI/2)-(2*Math.PI*i/n);
    var r=(val/5)*maxR;
    return [cx+r*Math.cos(a), cy-r*Math.sin(a)];
  }

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">';

  // grid rings
  [1,2,3,4,5].forEach(function(g){
    var pts=scenIds.map(function(_,i){var p=pt(i,g);return p[0]+','+p[1];}).join(' ');
    svg+='<polygon points="'+pts+'" fill="none" stroke="#e2e8f0" stroke-width="0.8"/>';
  });
  // axes
  scenIds.forEach(function(_,i){
    var p=pt(i,5);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>';
  });

  // sector avg polygon — ממוצע ציון תרחיש על פני חברות הענף (משתמש בציון הסקטור כשאין דירוג ידני)
  var secAvgPts=scenIds.map(function(sid,i){
    var avg;
    if (sectorCos && sectorCos.length) {
      var sum=0, cnt=0;
      sectorCos.forEach(function(c){
        var v=companyScenarioScore(c, sid);
        if (v>0){ sum+=v; cnt++; }
      });
      avg = cnt>0 ? sum/cnt : 1;
    } else {
      avg = sectorScenarioScore(sid, co.sector) || 1;
    }
    var p=pt(i,avg); return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  svg+='<polygon points="'+secAvgPts+'" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>';

  // company polygon — ציון אפקטיבי לכל תרחיש (אם יש דירוג ידני נשקלל, אחרת ציון הענף)
  var coPts=scenIds.map(function(sid,i){
    var val=companyScenarioScore(co, sid);
    if (!val || val<1) val=1; // רצפה ויזואלית כך שהמצולע לא ייעלם
    var p=pt(i,val); return p[0].toFixed(1)+','+p[1].toFixed(1);
  }).join(' ');
  svg+='<polygon points="'+coPts+'" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="2"/>';

  // labels
  scenIds.forEach(function(sid,i){
    var p=pt(i,5.7);
    svg+='<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" text-anchor="middle" font-size="9" fill="#475569" font-family="Arial,Heebo,sans-serif">';
    svg+=scenIcons[sid]+' '+escapeHtml(scenLabels[sid])+'</text>';
  });

  svg+='</svg>';

  // legend
  svg+='<div style="display:flex;gap:12px;font-size:10px;color:#64748b;margin-top:4px;direction:rtl;justify-content:center">';
  svg+='<span><span style="display:inline-block;width:16px;height:2px;background:#dc2626;vertical-align:middle;margin-left:4px"></span>'+escapeHtml(co.name)+'</span>';
  svg+='<span><span style="display:inline-block;width:16px;height:2px;background:#3b82f6;border-top:2px dashed #3b82f6;vertical-align:middle;margin-left:4px"></span>ממוצע ענף</span>';
  svg+='</div>';
  return svg;
}

/* ── ראדר מוכנות: החברה הנבחרת מול ממוצע הענף, לפי קטגוריות מוכנות ── */
function prepValForCat(company, catId) {
  const p = state.exposure[company.ticker] && state.exposure[company.ticker].preparedness;
  const v = p && p[catId];
  return (typeof v === 'number' && v >= 1) ? v : 1;
}
function sectorPrepAvg(sectorCos, catId) {
  if (!sectorCos || !sectorCos.length) return 1;
  let sum = 0;
  sectorCos.forEach(function(c){ sum += prepValForCat(c, catId); });
  return sum / sectorCos.length;
}
function renderPrepRadar(co, sectorCos, cats) {
  var n = cats.length;
  if (n < 3) return ''; // ראדר דורש לפחות 3 צירים
  var W=300,H=260,cx=150,cy=128,maxR=92;
  // קיצור תוויות ארוכות לתצוגה נקייה סביב הראדר
  function shortLabel(s){ return s.length > 14 ? s.slice(0,13) + '…' : s; }
  function pt(i,val){
    var a=(Math.PI/2)-(2*Math.PI*i/n);
    var r=(val/5)*maxR;
    return [cx+r*Math.cos(a), cy-r*Math.sin(a)];
  }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:340px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">';
  // טבעות רשת
  [1,2,3,4,5].forEach(function(g){

    svg+='<polygon points="'+pts+'" fill="none" stroke="#e2e8f0" stroke-width="0.8"/>';
  });
  // צירים
  cats.forEach(function(_,i){ var p=pt(i,5); svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>'; });
  // מצולע ממוצע ענף (אפור מקווקו)
  var secPts=cats.map(function(cat,i){ var p=pt(i, sectorPrepAvg(sectorCos, cat.id)); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
  svg+='<polygon points="'+secPts+'" fill="#64748b" fill-opacity="0.10" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>';
  // מצולע החברה (ירוק)
  var coPts=cats.map(function(cat,i){ var p=pt(i, prepValForCat(co, cat.id)); return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
  svg+='<polygon points="'+coPts+'" fill="#16a34a" fill-opacity="0.18" stroke="#16a34a" stroke-width="2"/>';
  // תוויות צירים
  cats.forEach(function(cat,i){
    var p=pt(i,6.0);
    var anchor = (Math.abs(p[0]-cx) < 12) ? 'middle' : (p[0] > cx ? 'start' : 'end');
    svg+='<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" text-anchor="'+anchor+'" font-size="8.5" fill="#475569" font-family="Arial,Heebo,sans-serif">'+escapeHtml(shortLabel(cat.label))+'</text>';
  });
  svg+='</svg>';
  // מקרא
  svg+='<div style="display:flex;gap:14px;font-size:10px;color:#64748b;margin-top:6px;direction:rtl;justify-content:center">';
  svg+='<span><span style="display:inline-block;width:16px;height:2px;background:#16a34a;vertical-align:middle;margin-left:4px"></span>'+escapeHtml(co.name)+'</span>';
  svg+='<span><span style="display:inline-block;width:16px;border-top:2px dashed #64748b;vertical-align:middle;margin-left:4px"></span>ממוצע ענף '+escapeHtml(co.sector)+'</span>';
  svg+='</div>';
  return svg;
}

/* ================================================================
   גרף 1 — מטריצה: Y=דירוג סיכון, X=רמת מוכנות, נקודה=חברה
   ================================================================ */
function renderChart1_RiskVsPrep(companies) {
  var W=520,H=340,PL=44,PR=16,PT=22,PB=46;
  var cW=W-PL-PR,cH=H-PT-PB;
  var FF='font-family="Arial,Heebo,sans-serif"';
  var palette=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#be185d','#059669','#ea580c','#64748b'];
  var secList=[],secColors={};
  companies.forEach(function(c){if(secList.indexOf(c.sector)===-1)secList.push(c.sector);});
  secList.forEach(function(s,i){secColors[s]=palette[i%palette.length];});

  function fmtMoney(v){
    var a=Math.abs(v);
    if(a>=1e9) return (v/1e9).toFixed(v/1e9>=10?0:1)+'B';
    if(a>=1e6) return (v/1e6).toFixed(v/1e6>=10?0:1)+'M';
    if(a>=1e3) return (v/1e3).toFixed(0)+'K';
    return String(Math.round(v));
  }

  // נקודות עם הון עצמי חיובי (נדרש למיקום על ציר X)
  var pts=[];
  companies.forEach(function(c){
    var eq=+c.equity||0, mc=+c.marketCap||0;
    if(eq>0) pts.push({c:c,eq:eq,mc:mc,fin:finalRisk(c)});
  });

  if(!pts.length){
    return '<div class="card col-6" style="min-width:0"><h3 style="font-size:13px">סיכון מול הון עצמי</h3>'
      +'<div style="font-size:11px;color:#64748b;margin-top:10px;line-height:1.7">להצגת הגרף יש להוסיף לגיליון <b>"חברות"</b> באקסל עמודות <b>הון עצמי</b> ו-<b>שווי שוק</b> (ערכים מספריים).<br>הגרף יצייר בועה לכל חברה: ציר X = הון עצמי (סקאלה לוגריתמית), ציר Y = דירוג סיכון, וגודל הבועה = שווי שוק.</div></div>';
  }

  var eqMin=Infinity,eqMax=-Infinity,mcMin=Infinity,mcMax=-Infinity;
  pts.forEach(function(p){
    if(p.eq<eqMin)eqMin=p.eq; if(p.eq>eqMax)eqMax=p.eq;
    if(p.mc>0){ if(p.mc<mcMin)mcMin=p.mc; if(p.mc>mcMax)mcMax=p.mc; }
  });
  if(mcMin===Infinity){ mcMin=0; mcMax=0; }

  var lMin=Math.log10(eqMin), lMax=Math.log10(eqMax);
  if(lMax-lMin<0.0001){ lMin-=0.5; lMax+=0.5; }
  function xScale(v){ return PL+(Math.log10(v)-lMin)/(lMax-lMin)*cW; }
  function yScale(r){ return PT+(1-(r-1)/4)*cH; }
  function radius(mc){
    if(!(mc>0)||mcMax<=0) return 3.5;
    if(mcMax===mcMin) return 8;
    var t=(Math.sqrt(mc)-Math.sqrt(mcMin))/(Math.sqrt(mcMax)-Math.sqrt(mcMin));
    return 3.5+t*13;
  }

  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">';
  // רצועות סיכון אופקיות
  s+='<rect x="'+PL+'" y="'+yScale(5).toFixed(1)+'" width="'+cW+'" height="'+(yScale(3.5)-yScale(5)).toFixed(1)+'" fill="#fee2e2" opacity="0.45"/>';
  s+='<rect x="'+PL+'" y="'+yScale(3.5).toFixed(1)+'" width="'+cW+'" height="'+(yScale(2.5)-yScale(3.5)).toFixed(1)+'" fill="#fef9c3" opacity="0.45"/>';
  s+='<rect x="'+PL+'" y="'+yScale(2.5).toFixed(1)+'" width="'+cW+'" height="'+(yScale(1)-yScale(2.5)).toFixed(1)+'" fill="#dcfce7" opacity="0.45"/>';
  s+='<text x="'+(PL+cW-3)+'" y="'+(yScale(5)+10).toFixed(1)+'" text-anchor="end" font-size="6.5" fill="#991b1b" '+FF+'>סיכון גבוה</text>';
  s+='<text x="'+(PL+cW-3)+'" y="'+(yScale(3)+3).toFixed(1)+'" text-anchor="end" font-size="6.5" fill="#92400e" '+FF+'>בינוני</text>';
  s+='<text x="'+(PL+cW-3)+'" y="'+(yScale(1.2)).toFixed(1)+'" text-anchor="end" font-size="6.5" fill="#166534" '+FF+'>סיכון נמוך</text>';

  // קווי Y (1-5)
  for(var i=1;i<=5;i++){
    var gy=yScale(i);
    s+='<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(PL+cW)+'" y2="'+gy.toFixed(1)+'" stroke="#e2e8f0" stroke-width="0.7"/>';
    s+='<text x="'+(PL-4)+'" y="'+(gy+3.5).toFixed(1)+'" text-anchor="end" font-size="8" fill="#94a3b8" '+FF+'>'+i+'</text>';
  }
  // קווי X (חזקות של 10)
  var k0=Math.ceil(lMin), k1=Math.floor(lMax), drew=0;
  for(var k=k0;k<=k1;k++){
    var xv=Math.pow(10,k), gx=xScale(xv);
    s+='<line x1="'+gx.toFixed(1)+'" y1="'+PT+'" x2="'+gx.toFixed(1)+'" y2="'+(PT+cH)+'" stroke="#e2e8f0" stroke-width="0.7"/>';

    drew++;
  }
  if(!drew){ // טווח צר — מסמנים קצוות
    [eqMin,eqMax].forEach(function(xv){ var gx=xScale(xv);
      s+='<text x="'+gx.toFixed(1)+'" y="'+(PT+cH+12)+'" text-anchor="middle" font-size="7.5" fill="#94a3b8" '+FF+'>'+fmtMoney(xv)+'</text>'; });

  // בועות — גדולות קודם כדי שהקטנות ילחיצות מעליהן
  pts.sort(function(a,b){return b.mc-a.mc;});

    var cx=xScale(p.eq), cy=yScale(p.fin), r=radius(p.mc);
    var col=secColors[p.c.sector]||'#64748b';
    var isSel=state.matrixSelected===p.c.ticker;

      +' data-matrix-co="'+p.c.ticker+'" style="cursor:pointer">'
      +'<title>'+p.c.name+' | סיכון: '+p.fin.toFixed(2)+' | הון עצמי: '+fmtMoney(p.eq)+' | שווי שוק: '+(p.mc>0?fmtMoney(p.mc):'—')+'</title>'
      +'</circle>';

  });
  s+='</svg>';

  var leg='<div style="display:flex;flex-wrap:wrap;gap:3px 6px;font-size:9px;color:#475569;margin-top:4px;direction:rtl">';
  secList.forEach(function(sec){leg+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+secColors[sec]+';vertical-align:middle;margin-left:2px"></span>'+escapeHtml(sec)+'</span>';});
  leg+='</div>';
  var note = pts.length<companies.length ? ' • '+(companies.length-pts.length)+' ללא הון עצמי לא מוצגות' : '';
  return '<div class="card col-6" style="min-width:0"><h3 style="font-size:13px">סיכון מול הון עצמי</h3><div style="font-size:10px;color:#64748b;margin-bottom:4px">גודל הבועה = שווי שוק • ציר X לוגריתמי • לחץ על חברה לפרטים'+note+'</div>'+s+leg+'</div>';
}

/* ================================================================

function renderChart2_SectorBars(sectorArr) {
  var W=340,H=300,PL=28,PR=10,PT=22,PB=72;
  var cW=W-PL-PR,cH=H-PT-PB;
  var FF='font-family="Arial,Heebo,sans-serif"';
  var n=Math.max(sectorArr.length,1);
  var colW=cW/n,barW=Math.min(32,colW*0.6);

  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">';
  for(var i=0;i<=5;i++){
    var gy=PT+(1-i/5)*cH;
    s+='<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(PL+cW)+'" y2="'+gy.toFixed(1)+'" stroke="#e2e8f0" stroke-width="0.8"/>';
    s+='<text x="'+(PL-3)+'" y="'+(gy+3.5).toFixed(1)+'" text-anchor="end" font-size="8" fill="#94a3b8" '+FF+'>'+i+'</text>';
  }
  s+='<text font-size="9" fill="#334155" font-weight="600" '+FF+' text-anchor="middle" transform="rotate(-90,10,'+(PT+cH/2)+')">דירוג סיכון</text>';

  sectorArr.forEach(function(sec,i){
    var cx=PL+i*colW+colW/2;
    var bh=(sec.avgRisk/5)*cH,by=PT+cH-bh;
    var r=Math.round(sec.avgRisk);
    s+='<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+barW+'" height="'+bh.toFixed(1)+'" fill="'+severityColor(r)+'" rx="3" opacity="0.88"/>';
    s+='<text x="'+cx.toFixed(1)+'" y="'+(by-4).toFixed(1)+'" text-anchor="middle" font-size="9" fill="'+severityColor(r)+'" font-weight="700" '+FF+'>'+sec.avgRisk.toFixed(1)+'</text>';
    var lx=cx,ly=PT+cH+8;
    s+='<text x="'+lx+'" y="'+ly+'" text-anchor="end" font-size="9" fill="#334155" font-weight="600" '+FF+' transform="rotate(-40,'+lx+','+ly+')">'+escapeHtml(sec.name)+'</text>';
    s+='<text x="'+lx+'" y="'+(ly+22)+'" text-anchor="end" font-size="7.5" fill="#94a3b8" '+FF+' transform="rotate(-40,'+lx+','+(ly+22)+')">'+sec.count+' חברות</text>';
  });
  s+='</svg>';
  return '<div class="card col-4" style="min-width:0"><h3 style="font-size:13px">דירוג סיכון לפי ענף</h3><div style="font-size:10px;color:#64748b;margin-bottom:4px">ממוצע חברות הענף</div>'+s+'</div>';

/* ================================================================
   גרף 3 — בועות: X=ממוצע סיכון, Y=ממוצע מוכנות, גודל=מספר חברות
   ================================================================ */
function renderChart3_BubbleSector(sectorArr) {
  var W=520,H=340,PL=36,PR=16,PT=22,PB=44;
  var cW=W-PL-PR,cH=H-PT-PB;
  var FF='font-family="Arial,Heebo,sans-serif"';
  var palette=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#be185d','#059669','#ea580c','#64748b'];
  var maxCount=Math.max.apply(null,sectorArr.map(function(s){return s.count;}));

  function avgPrepSector(secName){
    var cos=COMPANIES.filter(function(c){return c.sector===secName;});
    if(!cos.length)return 2;
    var tot=0,cnt=0;
    cos.forEach(function(c){
      var p=state.exposure[c.ticker]&&state.exposure[c.ticker].preparedness;
      if(p){var v=Object.values(p);if(v.length){tot+=v.reduce(function(a,b){return a+b;},0)/v.length;cnt++;}}
    });
    return cnt>0?tot/cnt:2;
  }

  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">';
  // Quadrants (Y=prep now: 1=top, 5=bottom)
  // top-left:    risk low,  prep low  (1)  → yellow  (need preparation)
  // top-right:   risk high, prep low  (1)  → red    (danger)
  // bottom-left: risk low,  prep high (5)  → green  (good)
  // bottom-right:risk high, prep high (5)  → blue   (managed)
  s+='<rect x="'+PL+'" y="'+PT+'" width="'+(cW/2)+'" height="'+(cH/2)+'" fill="#fef9c3" opacity="0.45"/>';
  s+='<rect x="'+(PL+cW/2)+'" y="'+PT+'" width="'+(cW/2)+'" height="'+(cH/2)+'" fill="#fee2e2" opacity="0.45"/>';
  s+='<rect x="'+PL+'" y="'+(PT+cH/2)+'" width="'+(cW/2)+'" height="'+(cH/2)+'" fill="#dcfce7" opacity="0.45"/>';
  s+='<rect x="'+(PL+cW/2)+'" y="'+(PT+cH/2)+'" width="'+(cW/2)+'" height="'+(cH/2)+'" fill="#dbeafe" opacity="0.45"/>';

  for(var i=0;i<=5;i++){
    var gy=PT+(1-i/5)*cH;
    s+='<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(PL+cW)+'" y2="'+gy.toFixed(1)+'" stroke="#e2e8f0" stroke-width="0.8"/>';
    s+='<text x="'+(PL-3)+'" y="'+(gy+3.5).toFixed(1)+'" text-anchor="end" font-size="8" fill="#94a3b8" '+FF+'>'+(5-i)+'</text>';
    var gx=PL+(i/5)*cW;
    s+='<line x1="'+gx.toFixed(1)+'" y1="'+PT+'" x2="'+gx.toFixed(1)+'" y2="'+(PT+cH)+'" stroke="#e2e8f0" stroke-width="0.8"/>';
    s+='<text x="'+gx.toFixed(1)+'" y="'+(PT+cH+12)+'" text-anchor="middle" font-size="8" fill="#94a3b8" '+FF+'>'+i+'</text>';
  }
  s+='<text x="'+(PL+cW/2)+'" y="'+(H-2)+'" text-anchor="middle" font-size="9" fill="#334155" font-weight="600" '+FF+'>ממוצע דירוג סיכון</text>';
  s+='<text font-size="9" fill="#334155" font-weight="600" '+FF+' text-anchor="middle" transform="rotate(-90,10,'+(PT+cH/2)+')">ממוצע מוכנות</text>';

  var sorted=sectorArr.slice().sort(function(a,b){return b.count-a.count;});
  sorted.forEach(function(sec,i){
    var prep=avgPrepSector(sec.name);
    var risk=sec.avgRisk;
    var cx=PL+((risk-1)/4)*cW,cy=PT+((prep-1)/4)*cH;
    var r=10+(sec.count/maxCount)*24;
    var col=palette[sectorArr.indexOf(sec)%palette.length];
    s+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+r.toFixed(1)+'" fill="'+col+'" fill-opacity="0.65" stroke="'+col+'" stroke-width="1.5"/>';
    var short=sec.name.length>5?sec.name.substring(0,5)+'…':sec.name;
    s+='<text x="'+cx.toFixed(1)+'" y="'+(cy+3).toFixed(1)+'" text-anchor="middle" font-size="8" fill="white" font-weight="700" '+FF+' style="pointer-events:none">'+escapeHtml(short)+'</text>';
    s+='<text x="'+cx.toFixed(1)+'" y="'+(cy+12).toFixed(1)+'" text-anchor="middle" font-size="7" fill="white" '+FF+' style="pointer-events:none">'+sec.count+'</text>';
  });
  s+='</svg>';
  return '<div class="card col-6" style="min-width:0"><h3 style="font-size:13px">מפת סיכון-מוכנות לענף</h3><div style="font-size:10px;color:#64748b;margin-bottom:4px">גודל בועה = מספר חברות</div>'+s+'</div>';
}
