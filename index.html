<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d9488">
<title>רשימת קניות</title>
<style>
:root{
  --teal:#0d9488; --teal-dark:#0f766e; --teal-soft:#ccfbf1;
  --bg:#f4f6f8; --card:#ffffff; --line:#e2e8f0;
  --ink:#0f172a; --muted:#64748b; --soft:#94a3b8;
  --green:#16a34a; --green-soft:#dcfce7;
  --amber:#d97706; --amber-soft:#fef3c7;
  --red:#dc2626; --red-soft:#fee2e2;
  --wa:#25d366; --wa-dark:#128c7e;
  --radius:14px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  font-family:'Heebo','Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
body.has-summary{padding-bottom:calc(150px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}

/* ===== Header ===== */
.topstack{position:sticky;top:0;z-index:30}
header{
  background:linear-gradient(135deg,var(--teal-dark),var(--teal));
  color:#fff;padding:14px 16px calc(12px);
  box-shadow:0 2px 8px rgba(13,148,136,.25);
}
.tripbar{
  background:#0f172a;color:#fff;padding:9px 16px;display:flex;align-items:center;gap:9px;
  font-size:13.5px;font-weight:500;box-shadow:0 2px 8px rgba(15,23,42,.25);
}
.tripbar .ticon{font-size:17px}
.tripbar span:not(.ticon){flex:1}
.tripbar button{
  background:var(--teal);color:#fff;border-radius:999px;width:30px;height:30px;font-size:18px;
  font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
header .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
header .sub{font-size:12.5px;color:#d3f5ef;margin-top:2px}
.iconbtn{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.16);color:#fff;font-size:19px;flex-shrink:0;
}
.iconbtn:active{background:rgba(255,255,255,.3)}
.iconbtn{position:relative}
.hbadge{
  position:absolute;top:-5px;inset-inline-start:-5px;min-width:19px;height:19px;padding:0 5px;
  border-radius:10px;background:var(--red);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--teal-dark);
}

/* chat */
.chatlist{
  max-height:44vh;overflow-y:auto;display:flex;flex-direction:column;gap:9px;
  background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 10px;margin-top:6px;
}
.cmsg{display:flex;flex-direction:column;align-items:flex-start}
.cmsg.mine{align-items:flex-end}
.cbubble{
  background:#fff;border:1px solid var(--line);border-radius:14px 14px 14px 4px;
  padding:8px 13px;max-width:86%;font-size:14.5px;line-height:1.5;
}
.cmsg.mine .cbubble{background:var(--teal-soft);border-color:#99f6e4;border-radius:14px 14px 4px 14px}
.cmeta{font-size:11px;color:var(--soft);margin-top:2px;padding:0 4px}
.creq{font-size:11.5px;font-weight:700;color:#92400e;background:#fef3c7;border-radius:999px;padding:0 8px}
.caddbtn{margin-top:6px;background:var(--teal);color:#fff;border-radius:999px;padding:4px 13px;font-size:12.5px;font-weight:700;display:inline-block}
.cadded{
  display:inline-block;margin-top:6px;background:var(--green-soft);color:#166534;border:1px solid #86efac;
  border-radius:999px;padding:2px 12px;font-size:12px;font-weight:700;
}
.chatinput input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;margin-top:10px;background:#fff}
.chatinput input:focus{border-color:var(--teal)}
.popmsg{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:16.5px;margin:8px 0 2px;line-height:1.6}
.popmsg.reqmsg{background:#fffbeb;border-color:#fcd34d}

/* ===== Tabs (bottom nav) ===== */
nav.tabs{
  position:fixed;bottom:0;right:0;left:0;z-index:40;
  background:var(--card);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 16px rgba(15,23,42,.07);
}
nav.tabs button{
  flex:1;padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--soft);font-size:12px;font-weight:500;position:relative;
}
nav.tabs button .ticon{font-size:22px;line-height:1}
nav.tabs button.active{color:var(--teal-dark);font-weight:700}
nav.tabs button .badge{
  position:absolute;top:4px;inset-inline-start:calc(50% + 8px);
  min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:var(--red);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
}

main{max-width:640px;margin:0 auto;padding:14px 12px 8px}

/* ===== Category cards ===== */
.cat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.cat-head{
  width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;text-align:start;
}
.cat-head .emoji{font-size:22px}
.cat-head .name{font-weight:700;font-size:16.5px;flex:1}
.cat-head .count{
  font-size:12.5px;font-weight:700;color:var(--teal-dark);background:var(--teal-soft);
  border-radius:999px;padding:2px 10px;min-width:30px;text-align:center;
}
.cat-head .count.zero{color:var(--soft);background:#eef2f6}
.cat-head .chev{color:var(--soft);font-size:13px;transition:transform .18s}
.cat.open .cat-head .chev{transform:rotate(-90deg)}
.cat-body{display:none;border-top:1px solid var(--line)}
.cat.open .cat-body{display:block}

/* ===== Item rows (request view) ===== */
.item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f1f5f9;
}
.item:last-of-type{border-bottom:none}
.item .chk{
  width:26px;height:26px;border-radius:8px;border:2px solid #cbd5e1;background:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:all .12s;
}
.item.on .chk{background:var(--teal);border-color:var(--teal)}
.item .txt{flex:1;min-width:0}
.item .nm{font-size:15.5px}
.item.on .nm{font-weight:700;color:var(--teal-dark)}
.item .note-in{
  width:100%;border:none;background:transparent;color:var(--amber);font-size:13px;padding:0;
  outline:none;display:none;
}
.item .note-in::placeholder{color:#d8cba8}
.item.on .note-in{display:block}
.item .qtybtn{
  display:none;flex-shrink:0;border:1.5px solid var(--line);border-radius:10px;
  padding:4px 9px;font-size:12.5px;font-weight:700;color:var(--soft);background:#fff;white-space:nowrap;
}
.item.on .qtybtn{display:block}
.item .qtybtn.has{border-color:var(--teal);color:var(--teal-dark);background:var(--teal-soft)}
.item .del{color:#e2a0a0;font-size:17px;padding:4px 6px;display:none}
body.editmode .item .del{display:block}
body.editmode .item .note-in{display:block}

/* add item row */
.addrow{display:flex;gap:8px;padding:10px 14px;background:#f8fafc;scroll-margin-bottom:170px}
.addrow input{
  flex:1;border:1.5px dashed #cbd5e1;border-radius:10px;padding:8px 12px;background:#fff;outline:none;font-size:14.5px;
}
.addrow input:focus{border-color:var(--teal);border-style:solid}
.addrow button{
  background:var(--teal);color:#fff;border-radius:10px;padding:0 16px;font-weight:700;font-size:14.5px;
}

/* special requests card */
.cat.special{border:1.5px solid #fcd34d;background:#fffdf5}
.cat.special .cat-head .name{color:#92400e}

/* toolbar above list */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pill{
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;
  font-size:13.5px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);
}
.pill.primary{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700}
.pill.warn{color:var(--red)}
body.editmode .pill#editPill{background:var(--amber-soft);border-color:var(--amber);color:var(--amber);font-weight:700}

/* ===== Sticky summary bar (request view) ===== */
.summary{
  position:fixed;bottom:calc(58px + env(safe-area-inset-bottom));right:0;left:0;z-index:35;
  display:flex;justify-content:center;padding:0 12px;pointer-events:none;
}
.summary .inner{
  pointer-events:auto;background:var(--ink);color:#fff;border-radius:999px;padding:10px 10px 10px 18px;
  display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(15,23,42,.35);max-width:640px;width:100%;
  justify-content:space-between;
}
.summary .cnt{font-size:14.5px;font-weight:500}
.summary .cnt b{color:#5eead4}
.summary .send{
  background:var(--wa);color:#fff;border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px;
  display:flex;align-items:center;gap:6px;
}

/* ===== Shopper view ===== */
.progress-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;
}
.progress-card .toprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-card .title{font-weight:700;font-size:16px}
.progress-card .nums{font-size:13.5px;color:var(--muted)}
.progress-card .nums b{color:var(--green);font-size:16px}
.bar{height:10px;background:#e8edf3;border-radius:999px;overflow:hidden}
.bar>div{height:100%;background:linear-gradient(to left,var(--green),#4ade80);border-radius:999px;transition:width .25s;width:0}
.progress-card .who{font-size:13px;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.progress-card .who .askbtn{
  background:var(--wa);color:#fff;border-radius:999px;padding:4px 12px;font-size:12.5px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;
}

.shopcat{margin-bottom:14px}
.shopcat-head{
  width:100%;font-size:14px;color:var(--muted);font-weight:700;margin:0 0 7px;padding:6px 4px;
  display:flex;align-items:center;gap:7px;text-align:start;
}
.shopcat-head .cc{font-size:11.5px;background:#e8edf3;border-radius:999px;padding:1px 8px;color:var(--soft)}
.shopcat-head .sp{flex:1}
.shopcat-head .chev{color:var(--soft);font-size:11px;transition:transform .18s}
.shopcat.closed .shopcat-head .chev{transform:rotate(-90deg)}
.shopcat.closed .shopcat-items{display:none}

/* price button + cart total */
.srow .price{
  align-self:stretch;display:flex;align-items:center;justify-content:center;padding:0 8px;
  min-width:50px;font-size:12.5px;font-weight:700;color:var(--soft);
  border-inline-start:1px solid #f1f5f9;white-space:nowrap;
}
.srow .price.has{color:var(--teal-dark);font-size:13px}
.carttotal{
  margin-top:12px;background:var(--teal-soft);border-radius:10px;padding:9px 14px;
  display:flex;justify-content:space-between;align-items:center;font-size:14.5px;color:var(--teal-dark);
}
.carttotal b{font-size:18px}
.pricechips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pricechips button{
  border:1.5px solid var(--teal);color:var(--teal-dark);border-radius:999px;padding:7px 16px;
  font-weight:700;font-size:15px;background:#f0fdfa;
}
.ocr-status{font-size:13px;color:var(--muted);margin-top:10px;min-height:18px}
.camline{
  display:flex;align-items:center;gap:8px;width:100%;border:1.5px dashed var(--teal);color:var(--teal-dark);
  border-radius:12px;padding:11px 14px;margin-top:12px;font-weight:700;background:#f0fdfa;justify-content:center;
}
.checkline{display:flex;align-items:center;gap:9px;margin-top:14px;font-size:14.5px}
.checkline input{width:20px;height:20px;accent-color:var(--teal)}

/* trip timer + deals */
.tripline{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tripline .startbtn{
  flex:1;background:var(--teal);color:#fff;border-radius:12px;padding:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:7px;min-width:140px;
}
.tripline .timer{
  flex:1;background:#0f172a;color:#5eead4;border-radius:12px;padding:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:7px;font-size:17px;min-width:110px;
  font-variant-numeric:tabular-nums;
}
.tripline .finishbtn{background:var(--green-soft);color:#166534;border:1px solid #86efac;border-radius:12px;padding:10px 14px;font-weight:700}
.tripline .dealsbtn{background:var(--amber-soft);color:#92400e;border:1px solid #fcd34d;border-radius:12px;padding:10px 14px;font-weight:700}

/* history */
.hcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.hhead{width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;text-align:start}
.hhead .hd{flex:1;min-width:0}
.hhead .hdate{font-weight:700;font-size:15.5px}
.hhead .hmeta{font-size:12.5px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.hhead .chev{color:var(--soft);font-size:12px;transition:transform .18s}
.hcard.open .hhead .chev{transform:rotate(-90deg)}
.hbody{display:none;border-top:1px solid var(--line);padding:10px 14px 14px}
.hcard.open .hbody{display:block}
.hitem{display:flex;justify-content:space-between;gap:8px;font-size:14px;padding:5px 0;border-bottom:1px dashed #f1f5f9}
.hitem .hp{color:var(--teal-dark);font-weight:700;white-space:nowrap}
.hitem.notbought .hn{color:var(--soft);text-decoration:line-through}
.hactions{display:flex;gap:8px;margin-top:12px}
.hactions button{flex:1;border-radius:10px;padding:9px;font-weight:700;font-size:14px}
.hactions .imp{background:var(--teal);color:#fff}
.hactions .delh{background:#fff;border:1px solid var(--red-soft);color:var(--red);flex:0 0 auto;padding:9px 14px}

.tripline .timer.live{background:#7f1d1d;color:#fecaca;font-size:14px}

.dbstatus{
  font-size:12.5px;color:var(--muted);background:#f8fafc;border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;margin-bottom:12px;line-height:1.6;
}

/* family board */
.board{background:#fffdf5;border:1.5px solid #fde68a;border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:12px}
.board .btitle{font-weight:700;font-size:15px;margin-bottom:8px;color:#92400e}
.bmsg{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:9px 12px;margin-bottom:7px}
.bmsg .btxt{font-size:15px}
.bmsg .bmeta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--soft);margin-top:4px;gap:8px;flex-wrap:wrap}
.bacts{display:flex;gap:6px}
.bact{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700}
.bact.bdel{background:#fff;border-color:var(--red-soft);color:#e2a0a0}
.bempty{font-size:13px;color:var(--soft);padding:4px 2px}

/* family */
.famcard{background:#f0fdfa;border:1.5px solid #99f6e4;border-radius:12px;padding:14px;margin:6px 0 4px}
.mtitle{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px}
.mavatar{
  width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;
}
.member .mname{flex:1;display:flex;flex-direction:column;line-height:1.3}
.metag{color:var(--teal-dark);font-size:12px;font-weight:700}
.metag.admin{color:#a97b12}
.mwa{font-size:18px;padding:2px 6px}
.mdel{font-size:16px;padding:2px 6px;color:#e2a0a0}
.famtitle{font-weight:700;font-size:15.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.famregion{font-size:12.5px;color:var(--muted);font-weight:500}
.famcode-line{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:10px;flex-wrap:wrap}
.famcode{font-weight:700;font-size:19px;letter-spacing:3px;color:var(--teal-dark);background:#fff;border:1px dashed var(--teal);border-radius:8px;padding:2px 12px;direction:ltr}
.minibtn{background:var(--teal);color:#fff;border-radius:999px;padding:5px 13px;font-size:13px;font-weight:700}
.minibtn.warn{background:#fff;border:1px solid var(--red-soft);color:var(--red)}
.members{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.member{font-size:14px;display:flex;gap:9px;align-items:center}
.member .mphone{font-size:12px;color:var(--soft);direction:ltr}
.selectbox{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;background:#fff;font-family:inherit;font-size:15px;outline:none}
.selectbox:focus{border-color:var(--teal)}

/* new requests during trip */
.newreq{
  background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:10px 14px;
  font-size:13.5px;color:#92400e;margin-bottom:12px;line-height:1.7;
  animation:reqpulse 1.6s ease-in-out 3;
}
@keyframes reqpulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 4px rgba(252,211,77,.4)}}
.newtag{
  display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;
  border-radius:999px;padding:0 8px;font-size:11.5px;font-weight:700;vertical-align:2px;
}

/* path map (S-route) */
.pathcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 10px 6px;margin-bottom:12px}
.pathcard .ptitle{font-weight:700;font-size:15px;margin:0 8px 2px}
.pathcard svg{width:100%;height:auto;display:block}
.pathcard .station{cursor:pointer}
.pathcard .station:active circle{opacity:.8}
.cartmark{animation:bob 1.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.catitem{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #f1f5f9;width:100%;text-align:start;font-size:15.5px}
.catitem .cchk{width:26px;height:26px;border-radius:50%;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.catitem.b .cchk{background:var(--green);border-color:var(--green)}
.catitem.b .cnm{text-decoration:line-through;color:var(--muted)}
.catitem .cnm{flex:1}
.catitem .cpr{color:var(--teal-dark);font-weight:700;font-size:13.5px}
.catitem .cnote{font-size:12px;color:var(--amber)}

/* quantity picker */
.qtycols{display:flex;gap:10px;margin-top:6px}
.qtycol{
  flex:1;max-height:34vh;overflow-y:auto;border:1.5px solid var(--line);border-radius:12px;
  padding:6px;scroll-snap-type:y proximity;
}
.qtycol button{
  display:block;width:100%;text-align:center;padding:9px 6px;border-radius:9px;
  font-size:15.5px;color:var(--muted);scroll-snap-align:center;
}
.qtycol button.sel{background:var(--teal);color:#fff;font-weight:700}
.qtycol-label{font-size:12px;font-weight:700;color:var(--soft);text-align:center;margin-bottom:4px}
.qtybadge{
  display:inline-block;background:var(--teal-soft);color:var(--teal-dark);border-radius:999px;
  padding:0 9px;font-size:12.5px;font-weight:700;vertical-align:2px;white-space:nowrap;
}
.basisrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.basisrow button{
  border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13.5px;background:#fff;
}
.basisrow button.sel{border-color:var(--teal);background:var(--teal-soft);color:var(--teal-dark);font-weight:700}
#priceCalc{font-size:13.5px;color:var(--teal-dark);font-weight:700;margin-top:8px;min-height:18px}

/* store picker */
.storelist{max-height:38vh;overflow-y:auto;margin-top:10px}
.storerow{
  display:flex;align-items:center;gap:8px;width:100%;text-align:start;
  border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:7px;
  background:#fff;font-size:14.5px;
}
.storerow:active{background:var(--teal-soft)}
.storerow .sregion{margin-inline-start:auto;font-size:12px;color:var(--soft)}
#storeSearch{
  width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;background:#fff;
}
#storeSearch:focus{border-color:var(--teal)}
.tripstore{
  font-size:13.5px;color:var(--teal-dark);font-weight:700;margin:-2px 0 8px;
  display:flex;align-items:center;gap:4px;
}
.benchtbl tr.mychain td{background:#f0fdfa}

/* benchmark */
.bench{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
.bench .btitle{font-weight:700;font-size:15.5px;margin-bottom:8px}
.benchtbl{width:100%;border-collapse:collapse;font-size:13.5px}
.benchtbl th,.benchtbl td{padding:6px 8px;text-align:center;border-bottom:1px solid #f1f5f9}
.benchtbl td:first-child{text-align:start;color:var(--muted)}
.benchtbl th{color:var(--soft);font-size:12px}
.benchtbl td:nth-child(2){font-weight:700;color:var(--teal-dark)}

/* deals modal */
.deal{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px}
.deal .demoji{font-size:24px}
.deal .dtxt{flex:1;min-width:0}
.deal .dname{font-weight:700;font-size:14.5px}
.deal .ddesc{font-size:12.5px;color:var(--muted)}
.deal .dtag{background:var(--red);color:#fff;border-radius:8px;padding:2px 8px;font-size:12px;font-weight:700;white-space:nowrap}
.srow{
  background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:7px;
  display:flex;align-items:center;gap:4px;overflow:hidden;
}
.srow .main-tap{
  flex:1;display:flex;align-items:center;gap:12px;padding:13px 14px;text-align:start;min-width:0;
}
.srow .bigchk{
  width:30px;height:30px;border-radius:50%;border:2.5px solid #cbd5e1;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;transition:all .15s;
}
.srow .stxt{flex:1;min-width:0}
.srow .snm{font-size:16.5px;font-weight:500}
.srow .snote{font-size:13px;color:var(--amber);display:flex;align-items:center;gap:4px}
.srow .ask{
  align-self:stretch;display:flex;align-items:center;padding:0 13px;color:var(--wa-dark);font-size:21px;
  border-inline-start:1px solid #f1f5f9;
}
.srow.done{opacity:.55}
.srow.done .bigchk{background:var(--green);border-color:var(--green)}
.srow.done .snm{text-decoration:line-through;color:var(--muted);font-weight:400}
.srow.special-item{border:1.5px solid #fcd34d}

.empty{
  text-align:center;padding:48px 20px;color:var(--soft);
}
.empty .big{font-size:52px;margin-bottom:10px}
.empty p{font-size:15px;max-width:280px;margin:0 auto}
.empty .gobtn{
  margin-top:16px;background:var(--teal);color:#fff;border-radius:999px;padding:10px 22px;font-weight:700;
}

.done-banner{
  background:var(--green-soft);border:1.5px solid #86efac;border-radius:var(--radius);
  padding:16px;text-align:center;margin-bottom:12px;
}
.done-banner .t{font-weight:700;color:#166534;font-size:17px;margin-bottom:8px}
.done-banner .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.done-banner button{border-radius:999px;padding:8px 18px;font-weight:700;font-size:14px}
.done-banner .wa-b{background:var(--wa);color:#fff}
.done-banner .rs-b{background:#fff;border:1px solid #86efac;color:#166534}

/* ===== Modal ===== */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:60;display:none;
  align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:640px;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  animation:slideup .2s ease;
}
@keyframes slideup{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.modal h2{font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.modal .msub{font-size:13.5px;color:var(--muted);margin-bottom:16px}
.modal label{display:block;font-size:13.5px;font-weight:700;color:var(--muted);margin:14px 0 5px}
.modal input[type=text],.modal input[type=tel],.modal textarea{
  width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;background:#fff;
}
.modal input:focus,.modal textarea:focus{border-color:var(--teal)}
.modal .hint{font-size:12px;color:var(--soft);margin-top:4px}
.modal .btnrow{display:flex;gap:10px;margin-top:20px}
.modal .btnrow button{flex:1;border-radius:12px;padding:12px;font-weight:700;font-size:15px}
.modal .primary{background:var(--teal);color:#fff}
.modal .wa-btn{background:var(--wa);color:#fff;display:flex;align-items:center;justify-content:center;gap:7px}
.modal .ghost{background:#eef2f6;color:var(--muted)}
.qopt{
  display:block;width:100%;text-align:start;border:1.5px solid var(--line);border-radius:12px;
  padding:11px 14px;margin-bottom:8px;font-size:14.5px;background:#fff;
}
.qopt.sel{border-color:var(--wa-dark);background:#f0fdf4;font-weight:700}
.danger-zone{margin-top:22px;border-top:1px dashed var(--line);padding-top:16px}
.danger-zone button{
  width:100%;border:1.5px solid var(--red-soft);background:#fff;color:var(--red);
  border-radius:12px;padding:11px;font-weight:700;
}
.toast{
  position:fixed;bottom:calc(120px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;border-radius:999px;padding:9px 20px;font-size:14px;z-index:80;
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.toast.show{opacity:1}
.wa-ic{width:18px;height:18px;flex-shrink:0}

const LANG_KEY = 'shopping-app-lang-v1';
function detectLang(){
  const p = (navigator.language || 'he').slice(0,2).toLowerCase();
  return ['he','en','ru','ar','zh'].includes(p) ? p : 'he';
}
let lang = localStorage.getItem(LANG_KEY) || detectLang();
function L(key, vars){
  let s = (T[lang] && T[lang][key]) ?? T.he[key] ?? key;
  if(vars) for(const k in vars) s = s.split('{'+k+'}').join(vars[k]);
  return s;
}
function dispName(it){ return (it && typeof it.name === 'object') ? (it.name[lang] || it.name.he) : (it && it.name); }
function dispNote(it){ return (it && typeof it.note === 'object') ? (it.note[lang] || it.note.he) : (it && it.note) || ''; }
function dispCat(c){ return (c && typeof c.name === 'object') ? (c.name[lang] || c.name.he) : (c && c.name); }
function catalogIndex(){
  const idx = {};
  state.cats.forEach(c => c.items.forEach(it => {
    const names = typeof it.name === 'object' ? Object.values(it.name) : [it.name];
    names.forEach(n => { if(n) idx[n.trim()] = it; });
  }));
  return idx;
}
function applyDir(){
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';
  document.title = L('appTitle');
  const elAt = $('#appTitle'); if(elAt) elAt.textContent = L('appTitle');
  const elCb = $('#chatBtn'); if(elCb) elCb.title = L('btnFamilyChat');
  const elSb = $('#settingsBtn'); if(elSb) elSb.title = L('btnSettings');
  const elSl = $('#sendListText'); if(elSl) elSl.textContent = L('sendListBtn');
  const elTr = $('#tabRequestText'); if(elTr) elTr.textContent = L('tabRequest');
  const elTs = $('#tabShopText'); if(elTs) elTs.textContent = L('tabShop');
  const elTh = $('#tabHistoryText'); if(elTh) elTh.textContent = L('tabHistory');
  updateTripBar();
}
function setLang(code){
  lang = code;
  localStorage.setItem(LANG_KEY, code);
  applyDir();
  if($('#overlay').classList.contains('show') && $('#modalBox').dataset.modal === 'settings') openSettings();
  else render();
}

const LS_KEY = 'shopping-app-v1';
let state = null;
let view = 'request';
let openCats = {};
let shopClosed = {};

/* ---------- state ---------- */
function freshState(){
  let uid = 1;
  const cats = SEED.map(c => ({
    id: c.id, name: c.name, emoji: c.emoji,
    items: c.items.map(([name, note, need]) => ({
      id: 'i' + (uid++), name, note, need: !!need, bought: false
    }))
  }));
  cats.push({ id:'special', name:N('בקשות מיוחדות','Special Requests','Особые запросы','طلبات خاصة','特殊需求'), emoji:'⭐', special:true, items:[] });
  return { v:2, cats, settings:{ reqName:'', reqPhone:'' }, trip:{ startedAt:null }, history:[], board:[], chat:[] };
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const old = JSON.parse(raw);
      if(old && old.v === 2) state = old;
      else if(old && old.v === 1){ state = migrateV1(old); }
    }
  }catch(e){}
  if(!state) state = freshState();
  if(!state.trip) state.trip = { startedAt:null };
  if(!Array.isArray(state.history)) state.history = [];
  if(!Array.isArray(state.board)) state.board = [];
  if(!Array.isArray(state.chat)) state.chat = [];
  state.cats.forEach(c => c.items.forEach(it => { if(it.qty) it.qty.u = normUnit(it.qty.u); }));
  saveLocalOnly(); // בלי לקדם updatedAt — טעינת דף לא "דורסת" שינויים מהענן
}
/* מיגרציה מגרסה 1: הקטלוג אורגן מחדש (פיצול ירקות לתתי-קטגוריות) —
   סימונים, הערות, מחירים ומוצרים שנוספו ידנית נשמרים. */
function migrateV1(old){
  const st = freshState();
  if(old.settings) st.settings = old.settings;
  const byName = {};
  st.cats.forEach(c => c.items.forEach(it => {
    const names = typeof it.name === 'object' ? Object.values(it.name) : [it.name];
    names.forEach(n => { if(n) byName[n.trim()] = it; });
  }));
  (old.cats || []).forEach(oc => (oc.items || []).forEach(oi => {
    const name = (oi.name || '').trim();
    if(!name) return;
    const t = byName[name];
    if(t){
      t.need = !!oi.need; t.bought = !!oi.bought;
      if(oi.note) t.note = oi.note;
      if(oi.price != null) t.price = oi.price;
    }else{
      const cat = st.cats.find(c => c.id === oc.id) || st.cats.find(c => c.id === 'veg');
      cat.items.push({
        id: 'i' + Date.now() + Math.floor(Math.random()*1e6),
        name, note: oi.note || '', need: !!oi.need, bought: !!oi.bought,
        ...(oi.price != null ? {price: oi.price} : {})
      });
    }
  }));
  return st;
}
function save(){
  state.updatedAt = Date.now();
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  schedulePush();
}
function saveLocalOnly(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

  'צפון':'north', 'חיפה והקריות':'haifa', 'השרון':'sharon', 'גוש דן':'gushdan',
  'ירושלים והסביבה':'jerusalem', 'שפלה':'shfela', 'דרום':'south', 'אחר':'other',
};
function regionLabel(key){ return L('region_' + key); }
function normRegion(r){ return REGION_KEYS.includes(r) ? r : (LEGACY_REGION_MAP[r] || 'other'); }
let fam = null;
let pushTimer = null;

function famLoad(){
  try{ fam = JSON.parse(localStorage.getItem(FAM_KEY)); }catch(e){ fam = null; }
  if(fam && fam.region){ const nr = normRegion(fam.region); if(nr !== fam.region){ fam.region = nr; famSave(); } }
}
function famSave(){ if(fam) localStorage.setItem(FAM_KEY, JSON.stringify(fam)); else localStorage.removeItem(FAM_KEY); }
async function apiGet(op, params){
  const q = new URLSearchParams(Object.assign({op}, params || {}));
  const r = await fetch('/api?' + q.toString());
  return r.json();
}
async function apiPost(op, body){
  const r = await fetch('/api?op=' + op, {
    method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body || {})
  });
  return r.json();
}
function schedulePush(){
  if(!fam) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushList, 1200);
}
async function pushList(){
  if(!fam) return;
  clearTimeout(pushTimer);
  try{
    const res = await apiPost('putList', {
      familyId: fam.familyId, memberId: fam.memberId, byName: fam.myName,
      updatedAt: state.updatedAt || 0,
      data: { cats: state.cats, trip: state.trip, board: state.board, chat: state.chat }
    });
    if(res && res.stale && res.remote) applyRemote(res.remote);
  }catch(e){ /* אין רשת — יסונכרן בהמשך */ }
}
async function pullList(){
  if(!fam) return;
  try{
    const res = await apiGet('getList', { familyId: fam.familyId });
    if(res && res.list) applyRemote(res.list);
  }catch(e){}
}
function applyRemote(remote){
  if(!remote || !remote.data) return;
  if(!(remote.updatedAt > (state.updatedAt || 0))) return;
  const prevTrip = state.trip && state.trip.startedAt;
  const prevNeeded = new Set(neededItems().map(x => x.it.id));
  const prevBoard = new Set((state.board || []).map(b => b.id));
  const prevChat = new Set((state.chat || []).map(c => c.id));
  state.cats = remote.data.cats || state.cats;
  state.cats.forEach(c => c.items.forEach(it => { if(it.qty) it.qty.u = normUnit(it.qty.u); }));
  state.trip = remote.data.trip || { startedAt:null };
  if(Array.isArray(remote.data.board)) state.board = remote.data.board;
  if(Array.isArray(remote.data.chat)) state.chat = remote.data.chat;
  state.updatedAt = remote.updatedAt;
  saveLocalOnly();
  // התראה על הודעה חדשה בלוח המודעות (מבני משפחה אחרים)
  const freshMsgs = (state.board || []).filter(b =>
    !prevBoard.has(b.id) && (!fam || b.byId !== fam.memberId));
  if(freshMsgs.length){
    if(navigator.vibrate) navigator.vibrate(150);
    const b = freshMsgs[0];
    toast(L('boardNotifyToast', {by: b.by || L('familyMember'), text: b.text.slice(0, 60)}), 5000);
  }
  // הודעת צ'אט חדשה מבן משפחה → חלון קופץ (או רענון הצ'אט אם הוא פתוח)
  const freshChat = (state.chat || []).filter(c =>
    !prevChat.has(c.id) && (!fam || c.fromId !== fam.memberId) && chatVisible(c));
  if(freshChat.length){
    if(navigator.vibrate) navigator.vibrate([120, 60, 120]);
    const listSendForMe = freshChat.find(c => c.listSend && fam && c.to === fam.memberId);
    if(listSendForMe && !$('#overlay').classList.contains('show')){
      listSendPopup(listSendForMe);
    }else{
      const chatList = $('#overlay').classList.contains('show') ? document.getElementById('chatList') : null;
      if(chatList){
        chatList.innerHTML = chatMsgsHTML();
        chatList.scrollTop = chatList.scrollHeight;
        markChatSeen();
      }else if($('#overlay').classList.contains('show')){
        const c = freshChat[0];
        toast(L('chatNotifyToast', {from: c.from || '', text: c.text.slice(0, 50)}), 5000);
      }else{
        chatPopup(freshChat[0]);
      }
    }
  }
  if(!prevTrip && state.trip.startedAt && fam && state.trip.shopperId && state.trip.shopperId !== fam.memberId){
    toast(L('shoppingStartedToast', {name: state.trip.shopperName || L('shopper')}));
  }
  // התראה לקונה: בקשות שנוספו מרחוק בזמן הקנייה
  if(state.trip.startedAt && isShopper()){
    const fresh = neededItems().filter(x =>
      !prevNeeded.has(x.it.id) &&
      (!fam || x.it.addedById !== fam.memberId));
    if(fresh.length){
      if(navigator.vibrate) navigator.vibrate(200);
      if(fresh.length === 1){
        const x = fresh[0];
        toast(L('singleRequestToast', {by: x.it.addedBy || L('familyMember'), name: dispName(x.it), cat: dispCat(x.cat)}), 5000);
      }else{
        toast(L('multiRequestToast', {n: fresh.length}), 5000);
      }
    }
  }
  render();
}
/* בקשות שנוספו על-ידי אחרים אחרי שהקנייה התחילה וטרם נאספו */
function newRequests(){
  if(!state.trip.startedAt) return [];
  return neededItems().filter(x =>
    !x.it.bought && x.it.addedAt && x.it.addedAt > state.trip.startedAt &&
    (!fam || x.it.addedById !== fam.memberId));
}
function isNewReq(it){
  return state.trip.startedAt && !it.bought && it.addedAt && it.addedAt > state.trip.startedAt &&
    (!fam || it.addedById !== fam.memberId);
}
setInterval(() => { if(fam) pullList(); }, 8000);
document.addEventListener('visibilitychange', () => { if(!document.hidden && fam) pullList(); });

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
function esc(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function neededItems(){
  const out = [];
  state.cats.forEach(c => c.items.forEach(it => { if(it.need) out.push({cat:c, it}); }));
  return out;
}
function findItem(id){
  for(const c of state.cats){ const it = c.items.find(i => i.id === id); if(it) return {cat:c, it}; }
  return null;
}
function toast(msg, ms){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h = setTimeout(() => t.classList.remove('show'), ms || 2200);
}
function normPhone(p){
  let d = String(p||'').replace(/\D/g,'');
  if(d.startsWith('00')) d = d.slice(2);
  if(d.startsWith('0')) d = '972' + d.slice(1);
  return d;
}
function waLink(text, phone){
  const t = encodeURIComponent(text);
  const p = normPhone(phone);
  return p ? `https://wa.me/${p}?text=${t}` : `https://wa.me/?text=${t}`;
}
function openWA(text, phone){ window.open(waLink(text, phone), '_blank'); }

/* ===== בורר כמות/משקל ===== */
const UNIT_KEYS = ['unit', 'kg', 'gram', 'pack', 'bag', 'bottle', 'liter'];
const LEGACY_UNIT_MAP = { 'יח\'':'unit', 'ק"ג':'kg', 'גרם':'gram', 'חבילה':'pack', 'שקית':'bag', 'בקבוק':'bottle', 'ליטר':'liter' };
function normUnit(u){ return UNIT_KEYS.includes(u) ? u : (LEGACY_UNIT_MAP[u] || 'unit'); }
function unitLabel(u){ return L('unit_' + u); }
const UNIT_AMOUNTS = {
  unit:   Array.from({length:30}, (_,i) => i + 1),
  kg:     [0.25, 0.5, 0.75, 1, 1.5, 2, 2.5, 3, 4, 5],
  gram:   [50, 100, 150, 200, 250, 300, 350, 400, 500, 600, 700, 800, 900],
  pack:   Array.from({length:10}, (_,i) => i + 1),
  bag:    Array.from({length:10}, (_,i) => i + 1),
  bottle: Array.from({length:12}, (_,i) => i + 1),
  liter:  [0.5, 1, 1.5, 2, 3, 4, 6],
};
function amountLabel(a, u){
  if(u === 'kg'){
    if(a === 0.25) return L('amt_quarter');
    if(a === 0.5) return L('amt_half');
    if(a === 0.75) return '¾';
  }
  return String(a);
}
function fmtQty(q){ const u = normUnit(q.u); return amountLabel(q.a, u) + ' ' + unitLabel(u); }
let qtyItemId = null, qtySelA = 1, qtySelU = 'unit';
function openQtyModal(id){
  const f = findItem(id); if(!f) return;
  qtyItemId = id;
  qtySelU = f.it.qty ? normUnit(f.it.qty.u) : 'unit';
  qtySelA = f.it.qty ? f.it.qty.a : UNIT_AMOUNTS[qtySelU][0];
  const box = $('#modalBox');
  box.innerHTML = `
    <h2>${esc(L('qtyTitle', {name: dispName(f.it)}))}</h2>
    <div class="msub">${esc(L('qtySub'))}</div>
    <div class="qtycols">
      <div style="flex:1">
        <div class="qtycol-label">${esc(L('qtyAmountLabel'))}</div>
        <div class="qtycol" id="qtyAmounts"></div>
      </div>
      <div style="flex:1">
        <div class="qtycol-label">${esc(L('qtyUnitLabel'))}</div>
        <div class="qtycol" id="qtyUnits">
          ${UNIT_KEYS.map(u => `<button class="${u === qtySelU ? 'sel' : ''}" data-u="${u}" onclick="pickQtyUnit('${u}')">${esc(unitLabel(u))}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="btnrow">
      <button class="ghost" onclick="clearQty()">${esc(L('noQty'))}</button>
      <button class="ghost" onclick="closeModal()">${esc(L('cancel'))}</button>
      <button class="primary" onclick="saveQty()">${esc(L('save'))}</button>
    </div>`;
  renderQtyAmounts();
  $('#overlay').classList.add('show');
  setTimeout(() => { const s = document.querySelector('#qtyAmounts .sel'); if(s) s.scrollIntoView({block:'center'}); }, 60);
}
function renderQtyAmounts(){
  const el = document.getElementById('qtyAmounts');
  const amounts = UNIT_AMOUNTS[qtySelU] || [1];
  if(!amounts.includes(qtySelA)) qtySelA = amounts[0];
  el.innerHTML = amounts.map(a =>
    `<button class="${a === qtySelA ? 'sel' : ''}" onclick="pickQtyAmount(${a})">${esc(amountLabel(a, qtySelU))}</button>`).join('');
}
function pickQtyUnit(u){
  qtySelU = u;
  document.querySelectorAll('#qtyUnits button').forEach(b => b.classList.toggle('sel', b.dataset.u === u));
  renderQtyAmounts();
}
function pickQtyAmount(a){
  qtySelA = a;
  document.querySelectorAll('#qtyAmounts button').forEach(b => b.classList.toggle('sel', b.textContent === amountLabel(a, qtySelU)));
}
function saveQty(){
  const f = findItem(qtyItemId); if(!f) return;
  f.it.qty = { a: qtySelA, u: qtySelU };
  save(); closeModal(); render();
  toast(L('qtySavedToast', {name: dispName(f.it), qty: fmtQty(f.it.qty)}));
}
function clearQty(){
  const f = findItem(qtyItemId); if(!f) return;
  delete f.it.qty;
  save(); closeModal(); render();
}

/* ===== לוח מודעות משפחתי ===== */
function fmtAgo(ts){
  if(!ts) return '';
  const m = Math.floor((Date.now() - ts) / 60000);
  if(m < 1) return L('now');
  if(m < 60) return L('minAgo', {m});
  const h = Math.floor(m / 60);
  if(h < 24) return L('hourAgo', {h});
  const d = new Date(ts);
  return d.getDate() + '/' + (d.getMonth() + 1);
}
function postBoard(){
  const inp = $('#boardIn');
  const text = (inp.value || '').trim();
  if(!text){ inp.focus(); return; }
  state.board.unshift({
    id: 'b' + Date.now() + Math.floor(Math.random()*1e4),
    text: text.slice(0, 200),
    by: fam ? fam.myName : (state.settings.reqName || ''),
    byId: fam ? fam.memberId : null,
    at: Date.now()
  });
  if(state.board.length > 30) state.board.length = 30;
  save(); pushList(); render();
  toast(L('boardPosted'));
}
function delBoard(id){
  state.board = state.board.filter(b => b.id !== id);
  save(); pushList(); render();
}
/* חילוץ שם מוצר מטקסט חופשי: "אבא תקנה לי רסק עגבניות" → "רסק עגבניות" */
function extractProductName(text){
  const stop = new Set(['אבא','אמא','תקנה','תקני','תקנו','תביא','תביאי','תביאו','לי','לנו','גם','בבקשה',
                        'צריך','צריכים','צריכה','חסר','חסרים','חסרה','נא','לקנות','את','משהו','אפשר','בדרך']);
  let words = String(text).replace(/[.,!?…]+/g, ' ').trim().split(/\s+/);
  while(words.length > 1 && stop.has(words[0])) words.shift();
  return words.join(' ').trim() || String(text).trim();
}
/* הוספת בקשה לרשימה: אם המוצר בקטלוג — מסומן בקטגוריה שלו; אחרת לבקשות מיוחדות */
function addRequestToList(rawText, byName){
  const name = extractProductName(rawText);
  const idx = catalogIndex();
  const found = idx[name];
  if(found){
    const foundCat = state.cats.find(c => c.items.includes(found));
    found.need = true; found.bought = false; markAdded(found);
    if(byName) found.addedBy = byName;
    toast(L('matchedToast', {name: dispName(found), cat: dispCat(foundCat)}));
  }else{
    const sp = state.cats.find(c => c.id === 'special');
    const item = { id:'i' + Date.now() + Math.floor(Math.random()*1e4), name, note: byName ? L('specialNoteBy', {name: byName}) : '', need:true, bought:false };
    markAdded(item);
    if(byName) item.addedBy = byName;
    sp.items.push(item);
    toast(L('addedSpecialToast', {name}));
  }
  save(); pushList(); render();
  return name;
}
function boardToList(id){
  const b = state.board.find(x => x.id === id); if(!b) return;
  addRequestToList(b.text, b.by);
  state.board = state.board.filter(x => x.id !== id);
  save(); pushList(); render();
}

/* ===== צ'אט משפחתי ===== */
const CHAT_SEEN_KEY = 'shopping-chat-seen';
let lastChatSeen = +(localStorage.getItem(CHAT_SEEN_KEY) || 0);
function markChatSeen(){
  lastChatSeen = Date.now();
  localStorage.setItem(CHAT_SEEN_KEY, lastChatSeen);
  updateChatBadge();
}
function updateChatBadge(){
  const btn = document.getElementById('chatBtn');
  const b = document.getElementById('chatBadge');
  if(!btn || !b) return;
  btn.style.display = fam ? 'flex' : 'none';
  const n = fam ? (state.chat || []).filter(m => m.fromId !== fam.memberId && m.at > lastChatSeen && chatVisible(m)).length : 0;
  b.style.display = n ? 'flex' : 'none';
  b.textContent = n;
}
function chatMsgsHTML(){
  const visible = (state.chat || []).filter(chatVisible);
  if(!visible.length){
    return `<div class="hint" style="padding:8px 4px">${esc(L('chatEmpty'))}</div>`;
  }
  return visible.slice().reverse().map(m => {
    const mine = fam && m.fromId === fam.memberId;
    return `
    <div class="cmsg ${mine ? 'mine' : ''}">
      <div class="cbubble">
        ${m.listSend ? `<span class="creq">${esc(L('listSendTag'))}</span><br>` : (m.req ? `<span class="creq">${esc(L('productRequestTag'))}</span><br>` : '')}
        ${esc(m.text)}
        ${m.listSend ? `<br><button class="caddbtn" onclick="closeModal();setView('shop')">${esc(L('openListBtn'))}</button>` : (m.req ? (m.added
          ? `<br><span class="cadded">${esc(L('addedToList'))}${m.addedByName ? esc(L('addedToListBy', {name: m.addedByName})) : ''}</span>`
          : `<br><button class="caddbtn" onclick="chatAddToList('${m.id}')">${esc(L('addToListBtn'))}</button>`) : '')}
      </div>
      <div class="cmeta">${esc(m.from || '')} · ${fmtAgo(m.at)}</div>
    </div>`;
  }).join('');
}
function openChat(focusInput){
  if(!fam){ toast(L('chatUnavailable')); return; }
  markChatSeen();
  const box = $('#modalBox');

/* ===== מפת מסלול בצורת S: תחנה לכל קטגוריה, סמן קונה, ספירה 2/5 ===== */
function pathMapSVG(){
  const stations = state.cats
    .map(c => ({ c, items: c.items.filter(i => i.need) }))
    .filter(x => x.items.length)
    .map(x => ({
      id: x.c.id, emoji: x.c.emoji, col: catCol(x.c),
      done: x.items.filter(i => i.bought).length, total: x.items.length
    }));
  if(!stations.length) return '';
  const allDone = stations.every(s => s.done === s.total);
  // מיקום הקונה: התחנה הראשונה שעוד לא הושלמה (או הדגל בסוף)
  let currIdx = stations.findIndex(s => s.done < s.total);
  if(currIdx === -1) currIdx = stations.length; // בדגל הסיום

  const perRow = 3, W = 360, m = 46, rowH = 92, y0 = 48;
  const xs = [88, 180, 272];
  const nNodes = stations.length + 1; // + דגל סיום
  const rows = Math.ceil(nNodes / perRow);
  const H = y0 + (rows - 1) * rowH + 52;
  const pt = i => {
    const r = Math.floor(i / perRow), k = i % perRow;
    const xIdx = (r % 2 === 0) ? (perRow - 1 - k) : k; // מתחילים מימין, כמו קריאה בעברית
    return { x: xs[xIdx], y: y0 + r * rowH };
  };
  // ציור הדרך: קו לאורך כל שורה + פניית פרסה מעוגלת בין שורות
  let d = '';
  for(let r = 0; r < rows; r++){
    const y = y0 + r * rowH;
    const [xa, xb] = (r % 2 === 0) ? [W - m, m] : [m, W - m];
    d += (r === 0 ? `M ${xa} ${y} ` : '') + `L ${xb} ${y} `;
    if(r < rows - 1){
      const sweep = (xb === m) ? 1 : 0;
      d += `A ${rowH/2} ${rowH/2} 0 0 ${sweep} ${xb} ${y + rowH} `;
    }
  }
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <path d="${d}" stroke="#e2e8f0" stroke-width="26" fill="none" stroke-linecap="round"/>
    <path d="${d}" stroke="#fff" stroke-width="3" stroke-dasharray="9 12" fill="none" stroke-linecap="round"/>`;
  stations.forEach((s, i) => {
    const p = pt(i);
    const complete = s.done === s.total;
    const isCurr = i === currIdx;
    const ring = complete ? 'var(--green)' : s.col.ac;
    const fill = complete ? 'var(--green-soft)' : s.col.bg;
    svg += `<g class="station" onclick="openCatItems('${s.id}')">`;
    if(isCurr) svg += `<circle cx="${p.x}" cy="${p.y}" r="29" fill="none" stroke="${s.col.ac}" stroke-width="2" stroke-dasharray="5 5" opacity=".7"/>`;
    svg += `
      <circle cx="${p.x}" cy="${p.y}" r="22" fill="${fill}" stroke="${ring}" stroke-width="2.5"/>
      <text x="${p.x}" y="${p.y + 6}" text-anchor="middle" font-size="18">${complete ? '✅' : s.emoji}</text>
      <rect x="${p.x - 20}" y="${p.y + 26}" width="40" height="19" rx="9.5" fill="${complete ? 'var(--green)' : s.col.ac}"/>
      <text x="${p.x}" y="${p.y + 39.5}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff" direction="ltr">${s.done}/${s.total}</text>
    </g>`;
    if(isCurr) svg += `<text class="cartmark" x="${p.x}" y="${p.y - 34}" text-anchor="middle" font-size="24">🛒</text>`;
  });
  // דגל סיום
  const f = pt(stations.length);
  svg += `<g>
    <circle cx="${f.x}" cy="${f.y}" r="22" fill="${allDone ? 'var(--green-soft)' : '#f1f5f9'}" stroke="${allDone ? 'var(--green)' : '#cbd5e1'}" stroke-width="2.5" ${allDone ? '' : 'stroke-dasharray="4 4"'}/>
    <text x="${f.x}" y="${f.y + 6}" text-anchor="middle" font-size="18">${allDone ? '🎉' : '🏁'}</text>
  </g>`;
  if(currIdx === stations.length) svg += `<text class="cartmark" x="${f.x}" y="${f.y - 34}" text-anchor="middle" font-size="24">🛒</text>`;
  svg += `</svg>`;
  return svg;
}

  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  const p = n => String(n).padStart(2, '0');
  return h ? h + ':' + p(m) + ':' + p(ss) : m + ':' + p(ss);
}

function fmtPrice(n){ return (Math.round(n * 100) / 100).toFixed(2); }

}
/* בסיסי מחיר לפי סוג היחידה: המחיר על המדף הוא לרוב לק"ג / ל-100 גרם / ליחידה */
function priceBases(qty){
  if(!qty) return [];
  const u = normUnit(qty.u);
  const isWeight = u === 'kg' || u === 'gram';
  if(isWeight){
    return [
      { k:'total', label:L('perAllQty', {qty: fmtQty(qty)}) },
      { k:'kg',    label:L('kgBasis') },
      { k:'100g',  label:L('per100g') },
    ];
  }
  return [
    { k:'total', label:L('perAllQty', {qty: fmtQty(qty)}) },
    { k:'unit',  label:L('perUnit', {unit: u === 'unit' ? L('unitWord') : unitLabel(u)}) },
  ];
}
function priceFromBasis(val, basis, qty){
  if(!qty || basis === 'total') return val;
  const u = normUnit(qty.u);
  if(basis === 'kg')   return u === 'kg' ? val * qty.a : val * qty.a / 1000;
  if(basis === '100g') return u === 'gram' ? val * qty.a / 100 : val * qty.a * 10;
  if(basis === 'unit') return val * qty.a;
  return val;
}

  const val = parseFloat(raw);
  if(!raw || isNaN(val) || val <= 0 || val >= 10000){ toast(L('invalidPrice')); return; }
  const total = priceFromBasis(val, priceBasis, f.it.qty);

/* --- OCR: זיהוי המחיר מתוך צילום התווית (tesseract.js נטען רק בשימוש ראשון) --- */
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(loadTesseract._p) return loadTesseract._p;
  loadTesseract._p = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
    s.onload = res;
    s.onerror = () => { loadTesseract._p = null; rej(new Error('load failed')); };
    document.head.appendChild(s);
  });
  return loadTesseract._p;
}
function extractPrices(text){
  const found = [];
  const dec = text.match(/\d{1,4}[.,]\d{2}(?!\d)/g) || [];
  dec.forEach(m => found.push(parseFloat(m.replace(',', '.'))));
  if(found.length < 2){
    (text.match(/(?<![\d.,])\d{1,3}(?![\d.,])/g) || []).forEach(m => found.push(parseFloat(m)));
  }
  const seen = new Set();
  return found
    .filter(v => v >= 0.5 && v < 1000)
    .filter(v => { const k = v.toFixed(2); if(seen.has(k)) return false; seen.add(k); return true; })
    .sort((a,b) => (Number.isInteger(b) ? 0 : 1) - (Number.isInteger(a) ? 0 : 1))
    .slice(0, 5);
}
async function onPriceFile(inp){
  const file = inp.files && inp.files[0];
  if(!file) return;
  const st = $('#ocrStatus'), chips = $('#ocrChips');
  chips.innerHTML = '';
  st.textContent = L('loadingOcrEngine');
  try{ await loadTesseract(); }
  catch(e){ st.textContent = L('ocrNoInternet'); return; }
  st.textContent = L('ocrScanning');
  try{
    const r = await Tesseract.recognize(file, 'eng');
    const cands = extractPrices(r.data.text || '');
    if(!cands.length){
      st.textContent = L('ocrNotFound');
      return;
    }
    st.textContent = L('ocrConfirm');
    chips.innerHTML = cands.map(v =>
      `<button onclick="$('#priceIn').value='${fmtPrice(v)}'">₪${fmtPrice(v)}</button>`).join('');
    if(cands.length === 1) $('#priceIn').value = fmtPrice(cands[0]);
  }catch(e){
    st.textContent = L('ocrFailed');
  }
  inp.value = '';
}

/* ===== WhatsApp ===== */
function listAsText(){
  const d = new Date();
  const ds = d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
  let out = L('listHeader', {date: ds}) + '\n';
  state.cats.forEach(c => {
    const items = c.items.filter(i => i.need);
    if(!items.length) return;
    out += '\n*' + c.emoji + ' ' + dispCat(c) + '*\n';
    items.forEach(i => { out += '▫️ ' + dispName(i) + (i.qty ? ' — ' + fmtQty(i.qty) : '') + (dispNote(i) ? ' _(' + dispNote(i) + ')_' : '') + '\n'; });
  });
  const url = location.href.split('#')[0];
  out += '\n' + L('interactiveListLink', {url});
  return out;
}
function sendList(){
  if(!neededItems().length){ toast(L('listEmptyToast2')); return; }
  if(!fam || !famOthers().length){ openWA(listAsText(), ''); return; }
  openSendListModal();
}
/* ===== שליחת הרשימה לקונה נבחר: בחירת בן משפחה ← בחירת ערוץ שליחה ===== */
let sendListTarget = null;
function openSendListModal(){
  sendListTarget = null;
  const box = $('#modalBox');
  box.innerHTML = `
    <h2>${esc(L('sendListTitle'))}</h2>
    <div class="msub">${esc(L('sendListSub'))}</div>
    ${famOthers().map(m => `<button class="qopt" data-id="${esc(m.id)}" onclick="pickSendTarget('${esc(m.id)}')">${esc(m.name)}</button>`).join('')}
    <div class="btnrow">
      <button class="ghost" onclick="closeModal()">${esc(L('cancel'))}</button>
      <button class="primary" onclick="confirmSendTarget()">${esc(L('nextBtn'))}</button>
    </div>`;
  $('#overlay').classList.add('show');
}
function pickSendTarget(id){
  sendListTarget = id;
  document.querySelectorAll('#modalBox .qopt').forEach(b => b.classList.toggle('sel', b.dataset.id === id));
}
function confirmSendTarget(){
  if(!sendListTarget){ toast(L('pickPersonPrompt')); return; }
  const target = famOthers().find(m => m.id === sendListTarget);
  if(target) openSendChannelModal(target);
}
function openSendChannelModal(target){
  const box = $('#modalBox');
  box.innerHTML = `
    <h2>${esc(L('sendChannelTitle', {name: target.name}))}</h2>
    <div class="msub">${esc(L('sendChannelSub'))}</div>
    <div class="btnrow" style="flex-direction:column">
      <button class="primary" onclick="doSendList('${esc(target.id)}','app')">${esc(L('sendViaAppBtn'))}</button>
      <button class="primary" style="background:var(--wa)" onclick="doSendList('${esc(target.id)}','wa')">${esc(L('sendViaWaBtn'))}</button>
      <button class="ghost" onclick="doSendList('${esc(target.id)}','both')">${esc(L('sendViaBothBtn'))}</button>
    </div>
    <div class="btnrow">
      <button class="ghost" onclick="openSendListModal()">${esc(L('back'))}</button>
    </div>`;
  $('#overlay').classList.add('show');
}
function doSendList(targetId, channel){
  const target = famOthers().find(m => m.id === targetId);
  if(!target) return;
  if(channel === 'app' || channel === 'both'){
    pushChatMsg(L('listSendMsg', {name: fam.myName}), false, { to: target.id, toName: target.name, listSend: true });
  }
  if(channel === 'wa' || channel === 'both'){
    openWA(listAsText(), target.phone || '');
  }
  closeModal();
  if(channel === 'app') toast(L('sentInAppToast', {name: target.name}));
}
function askGeneral(){ openQuestionModal(null); }
function askAbout(id){
  const f = findItem(id); if(!f) return;
  openQuestionModal(f.it);
}
function notifyDone(){
  const name = state.settings.reqName;
  const total = cartTotal();
  const dur = state.trip.startedAt ? fmtDur(Date.now() - state.trip.startedAt) : null;
  const st = state.trip.store;
  openWA(L('doneMsg')
    + (st ? '\n' + L('tripStore', {chain: st.chain, name: st.name ? ' ' + st.name : ''}) : '')
    + (total > 0 ? '\n' + L('totalByPrices', {total: fmtPrice(total)}) : '')
    + (dur ? '\n' + L('tripDuration', {dur}) : '')
    + (name ? '\n' + L('canResetNote', {name}) : ''), state.settings.reqPhone);
}

/* ---------- question modal ---------- */
let qSelected = 0;
function openQuestionModal(item){
  const iname = item ? dispName(item) : '';
  const templates = item ? [
    L('qMissing', {name: iname}), L('qBrandSize', {name: iname}),
    L('qHowMuch', {name: iname}), L('qExpensive', {name: iname}),
  ] : [ L('qInStore'), L('qAlmostDone') ];
  const hasPhone = !!state.settings.reqPhone;
  qSelected = 0;
  const box = $('#modalBox');
  box.innerHTML = `
    <h2>${esc(L('qToTitle', {name: state.settings.reqName || L('listOwnerDefault')}))}</h2>
    <div class="msub">${item ? L('regardingItem', {name: '<b>'+esc(iname)+'</b>'}) + (dispNote(item) ? esc(L('noteInParens', {note: dispNote(item)})) : '') : esc(L('generalQuestion'))}</div>
    ${templates.map((tpl,i) => `<button class="qopt ${i===0?'sel':''}" data-i="${i}" onclick="pickQ(${i})">${esc(tpl)}</button>`).join('')}
    <label>${esc(L('freeTextLabel'))}</label>
    <textarea id="qFree" rows="2" placeholder="${esc(L('freeTextPlaceholder'))}" oninput="pickQ(-1)"></textarea>
    ${famOthers().length ? `
    <label>${esc(L('sendToWhomLabel'))}</label>
    <select id="qTarget" class="selectbox">
      ${famOthers().map(m => `<option value="${esc(m.phone || '')}">${esc(m.name)}${m.phone ? '' : esc(L('noPhoneSuffix'))}</option>`).join('')}
      ${state.settings.reqPhone && !famOthers().some(m => normPhone(m.phone) === normPhone(state.settings.reqPhone))
        ? `<option value="${esc(state.settings.reqPhone)}">${esc(state.settings.reqName || L('listOwnerDefault'))}</option>` : ''}
    </select>` : ''}
    ${hasPhone || famOthers().length ? '' : `<div class="hint">${esc(L('tipSetPhone'))}</div>`}
    <div class="btnrow">
      <button class="ghost" onclick="closeModal()">${esc(L('cancel'))}</button>
      <button class="wa-btn" onclick="sendQ()">
        <svg class="wa-ic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm5.4 14.1c-.2.7-1.3 1.3-1.8 1.3-.5.1-1 .2-3.4-.7-2.9-1.2-4.7-4.1-4.9-4.3-.1-.2-1.1-1.5-1.1-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.4l.9 2.1c.1.2.1.4 0 .6l-.4.6-.5.5c-.2.2-.3.3-.1.6.2.3.9 1.5 2 2.4 1.4 1.2 2.5 1.6 2.8 1.7.3.1.5.1.7-.1l1-1.2c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.5.3.1.1.1.7-.2 1.4z"/></svg>
        ${esc(L('sendWaBtn'))}
      </button>
    </div>`;
  box.dataset.templates = JSON.stringify(templates);
  $('#overlay').classList.add('show');
}
function pickQ(i){
  qSelected = i;
  document.querySelectorAll('.qopt').forEach(b => b.classList.toggle('sel', +b.dataset.i === i));
}
function famOthers(){
  if(!fam || !fam.members) return [];
  return fam.members.filter(m => m.id !== fam.memberId);
}
function sendQ(){
  const templates = JSON.parse($('#modalBox').dataset.templates || '[]');
  const free = ($('#qFree') && $('#qFree').value.trim()) || '';
  let msg = qSelected === -1 ? free : (templates[qSelected] || free);
  if(!msg){ toast(L('pickQOrWrite')); return; }
  msg = '🛒 ' + msg;
  const target = $('#qTarget') ? $('#qTarget').value : state.settings.reqPhone;
  closeModal();
  openWA(msg, target || state.settings.reqPhone);
}

/* ---------- settings modal (כולל משפחה) ---------- */
function openSettings(){
  const s = state.settings;
  const box = $('#modalBox');
  box.dataset.modal = 'settings';
  let famHtml;
  if(fam){
    famHtml = `
    <div class="famcard">
      <div class="famtitle">${esc(L('familyOf', {name: fam.familyName}))} <span class="famregion">📍 ${esc(regionLabel(fam.region))}</span></div>
      <div class="famcode-line">
        ${esc(L('joinCodeLabel'))}<span class="famcode">${esc(fam.code)}</span>
        <button class="minibtn" onclick="shareFamilyCode()">${esc(L('shareBtn'))}</button>
      </div>
      <div class="mtitle">${esc(L('registeredMembers', {n: (fam.members || []).length}))}</div>
      <div class="members" id="famMembers">${membersHTML()}</div>
      ${(fam.members || []).length < 2 ? `<div class="hint">${esc(L('onlyYouHint'))}</div>` : ''}
      <div class="hint">${esc(L('syncHint'))}</div>
      ${!fam.adminMemberId ? `<button class="minibtn" style="margin-top:8px" onclick="claimAdmin()">${esc(L('claimAdminBtn'))}</button>` : ''}
      <button class="minibtn warn" style="margin-top:8px" onclick="leaveFamily()">${esc(L('leaveFamilyBtn'))}</button>
    </div>`;
  }else{
    famHtml = `
    <div class="famcard">
      <div class="famtitle">${esc(L('familyTitle'))}</div>
      <div class="hint" style="margin-bottom:10px">${esc(L('familyIntro'))}</div>
      <div class="btnrow" style="margin-top:0">
        <button class="primary" onclick="openFamilyForm('create')">${esc(L('createFamilyBtn'))}</button>
        <button class="ghost" onclick="openFamilyForm('join')">${esc(L('joinFamilyBtn'))}</button>
      </div>
    </div>`;
  }
  const LANG_NAMES = {he:'עברית', en:'English', ru:'Русский', ar:'العربية', zh:'中文'};
  const langHtml = `
    <div class="msub" style="margin-top:0">${esc(L('languageLabel'))}</div>
    <div class="basisrow" style="margin-bottom:6px">
      ${Object.keys(LANG_NAMES).map(code => `<button class="${code===lang?'sel':''}" onclick="setLang('${code}')">${LANG_NAMES[code]}</button>`).join('')}
    </div>`;
  box.innerHTML = `
    <h2>${esc(L('settingsTitle'))}</h2>
    ${langHtml}
    <div class="dbstatus" id="dbStatus">${esc(L('checkingServer'))}</div>
    ${famHtml}
    <div class="msub" style="margin-top:18px">${esc(L('whoFillsHint'))}</div>
    <label>${esc(L('listOwnerNameLabel'))}</label>
    <input type="text" id="setName" value="${esc(s.reqName)}" placeholder="${esc(L('listOwnerNamePlaceholder'))}">
    <label>${esc(L('listOwnerPhoneLabel'))}</label>
    <input type="tel" id="setPhone" value="${esc(s.reqPhone)}" placeholder="${esc(L('phonePlaceholder'))}" style="direction:ltr;text-align:right">
    <div class="hint">${esc(L('phoneHint'))}</div>
    <div class="btnrow">
      <button class="ghost" onclick="closeModal()">${esc(L('cancel'))}</button>
      <button class="primary" onclick="saveSettings()">${esc(L('save'))}</button>
    </div>
    <div class="danger-zone">
      <button onclick="factoryReset()">${esc(L('factoryResetBtn'))}</button>
      <div class="hint" style="margin-top:6px">${esc(L('factoryResetHint'))}</div>
    </div>`;
  $('#overlay').classList.add('show');
  if(fam) refreshFamily();
  checkDbStatus();
}
async function checkDbStatus(){
  const el = document.getElementById('dbStatus');
  if(!el) return;
  try{
    const res = await apiGet('status', {});
    if(res && res.ok){
      el.innerHTML = res.db ? L('dbConnected') : L('dbNotConnected');
    }else{
      el.innerHTML = L('dbError', {err: esc((res && res.error) || '')});
    }
  }catch(e){
    el.innerHTML = L('dbUnavailable');
  }
}
function membersHTML(){
  const iAmAdmin = fam.adminMemberId && fam.adminMemberId === fam.memberId;
  return (fam.members || []).map(m => {
    const me = m.id === fam.memberId;
    const isAdmin = fam.adminMemberId === m.id;
    const joined = m.joinedAt ? new Date(m.joinedAt) : null;
    return `
    <div class="member">
      <span class="mavatar">${esc((m.name || '?').trim().charAt(0))}</span>
      <span class="mname">${esc(m.name)}${me ? ' <span class="metag">' + esc(L('me')) + '</span>' : ''}${isAdmin ? ' <span class="metag admin">👑 ' + esc(L('adminTag')) + '</span>' : ''}
        <span class="mphone">${esc(m.phone || L('noPhone'))}${joined ? esc(L('joinedOn', {d: joined.getDate() + '/' + (joined.getMonth()+1)})) : ''}</span>
      </span>
      ${(!me && m.phone) ? `<button class="mwa" onclick="openWA('${esc(L('hiWave'))}', '${esc(m.phone)}')" title="${esc(L('waTo', {name: m.name}))}">💬</button>` : ''}
      ${(!me && iAmAdmin) ? `<button class="mdel" onclick="removeMember('${esc(m.id)}', '${esc(m.name).replace(/'/g, "\\'")}')" title="${esc(L('removeMemberTitle'))}">🗑</button>` : ''}
    </div>`;
  }).join('');
}
async function refreshFamily(){
  try{
    const res = await apiGet('getFamily', { familyId: fam.familyId });
    if(res && res.ok && res.family){
      fam.members = res.family.members;
      fam.familyName = res.family.name;
      fam.region = normRegion(res.family.region);
      fam.adminMemberId = res.family.adminMemberId || null;
      famSave();
      const el = document.getElementById('famMembers');
      if(el) el.innerHTML = membersHTML();
    }
  }catch(e){}
}
async function claimAdmin(){
  try{
    const res = await apiPost('claimAdmin', { familyId: fam.familyId, memberId: fam.memberId });
    if(!res || !res.ok){ toast('⚠️ ' + ((res && res.error) || L('somethingWrong'))); return; }
    fam.adminMemberId = res.family.adminMemberId || fam.memberId;
    famSave();
    toast(L('becameAdminToast'));
    openSettings();
  }catch(e){
    toast(L('noServerConn'));
  }
}
async function removeMember(targetId, name){
  if(!confirm(L('removeMemberConfirm', {name}))) return;
  try{
    const res = await apiPost('removeMember', { familyId: fam.familyId, memberId: fam.memberId, targetId });
    if(!res || !res.ok){ toast('⚠️ ' + ((res && res.error) || L('somethingWrong'))); return; }
    fam.members = (fam.members || []).filter(m => m.id !== targetId);
    famSave();
    toast(L('memberRemovedToast', {name}));
    openSettings();
  }catch(e){
    toast(L('noServerConn'));
  }
}
function openFamilyForm(mode){
  const box = $('#modalBox');
  box.innerHTML = `
    <h2>${mode === 'create' ? esc(L('createFamilyTitle')) : esc(L('joinFamilyTitle'))}</h2>
    <div class="msub">${mode === 'create' ? esc(L('createFamilySub')) : esc(L('joinFamilySub'))}</div>
    ${mode === 'create' ? `
      <label>${esc(L('familyNameLabel'))}</label>
      <input type="text" id="famName" placeholder="${esc(L('familyNamePlaceholder'))}">
      <label>${esc(L('residenceRegionLabel'))}</label>
      <select id="famRegion" class="selectbox">${REGION_KEYS.map(r => `<option value="${r}">${esc(regionLabel(r))}</option>`).join('')}</select>
    ` : `
      <label>${esc(L('familyCodeLabel'))}</label>
      <input type="text" id="famCode" placeholder="X7K2ML" style="direction:ltr;text-align:center;font-size:20px;letter-spacing:4px;text-transform:uppercase" maxlength="6">
    `}
    <label>${esc(L('yourNameLabel'))}</label>
    <input type="text" id="famMyName" placeholder="${esc(L('yourNamePlaceholder'))}">
    <label>${esc(L('yourPhoneLabel'))}</label>
    <input type="tel" id="famMyPhone" placeholder="${esc(L('phonePlaceholder'))}" style="direction:ltr;text-align:right">
    <div class="ocr-status" id="famStatus"></div>
    <div class="btnrow">
      <button class="ghost" onclick="openSettings()">${esc(L('back'))}</button>
      <button class="primary" onclick="submitFamily('${mode}')">${mode === 'create' ? esc(L('createFamilyShortBtn')) : esc(L('joinFamilyShortBtn'))}</button>
    </div>`;
  $('#overlay').classList.add('show');
}
async function submitFamily(mode){
  const myName = ($('#famMyName').value || '').trim();
  const myPhone = ($('#famMyPhone').value || '').trim();
  const st = $('#famStatus');
  if(!myName){ st.textContent = L('fillNamePrompt'); return; }
  st.textContent = L('oneMoment');
  try{
    let res;
    if(mode === 'create'){
      const familyName = ($('#famName').value || '').trim() || L('myFamilyDefault');
      const region = $('#famRegion').value;
      res = await apiPost('createFamily', { familyName, region, userName: myName, phone: myPhone });
    }else{
      const code = ($('#famCode').value || '').trim().toUpperCase();
      if(!code){ st.textContent = L('fillCodePrompt'); return; }
      res = await apiPost('joinFamily', { code, userName: myName, phone: myPhone });
    }
    if(!res || !res.ok){ st.textContent = '⚠️ ' + ((res && res.error) || L('somethingWrong')); return; }
    fam = {
      familyId: res.family.id, memberId: res.memberId, code: res.family.code,
      familyName: res.family.name, region: normRegion(res.family.region),
      members: res.family.members, adminMemberId: res.family.adminMemberId || null, myName
    };
    famSave();
    if(!state.settings.reqName){ state.settings.reqName = myName; state.settings.reqPhone = myPhone; }
    if(mode === 'create') pushList(); else await pullList();
    save();
    closeModal(); render();
    toast(mode === 'create' ? L('familyCreatedToast', {code: fam.code}) : L('joinedFamilyToast', {name: fam.familyName}));
    if(mode === 'create') setTimeout(openSettings, 600);
  }catch(e){
    st.textContent = L('noServerConn');
  }
}
function shareFamilyCode(){
  openWA(L('shareCodeMsg', {name: fam.familyName, url: location.origin, code: fam.code}), '');
}
function leaveFamily(){
  if(!confirm(L('leaveConfirm'))) return;
  fam = null; famSave();
  closeModal(); render();
  toast(L('leftFamilyToast'));
}
function saveSettings(){
  state.settings.reqName = $('#setName').value.trim();
  state.settings.reqPhone = $('#setPhone').value.trim();
  save(); closeModal(); render();
  toast(L('settingsSavedToast'));
}
function factoryReset(){
  if(!confirm(L('factoryResetConfirm'))) return;
  const s = state.settings;
  state = freshState();
  state.settings = s;
  save(); closeModal(); render();
  toast(L('catalogResetToast'));
}
function closeModal(){
  $('#overlay').classList.remove('show');
  $('#modalBox').innerHTML = ''; // ניקוי — שלא יישאר DOM ישן (צ'אט נסתר וכו')
}

/* ---------- init ---------- */
$('#settingsBtn').addEventListener('click', openSettings);
$('#sendListBtn').addEventListener('click', sendList);
$('#overlay').addEventListener('click', e => { if(e.target === e.currentTarget) closeModal(); });
applyDir();
famLoad();
load();
render();
if(fam) pullList();
</script>
</body>
